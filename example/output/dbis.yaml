noteContent_mv: |-
  ADL ist eine Webseite für klassische dänische Literatur und gibt die Möglichkeit, die Texte zu studieren, die hier in einen integrierten literaturhistorischen und dokumentarischen Aspekt integriert sind. (Die Titel sind oft als Faksimile oder Textdatei errreichbar.) Sämtliche Texte über die Autoren sind von Experten mit Spezialwissen verfasst. Es sind alle Perioden repräsentiert, vom 12. Jahrhundert (Saxo) bis 1938 (Georg Brandes, Thøger Larsen und Gustaf Munch-Petersen als einige der neueren Autoren).<br />
  Mit Hinblick auf das Urheberrecht kann ADL grundsätzlich nur Zugang zu Texten geben, deren Verfasser vor mehr als 70 Jahren verstorben sind.<br />
  <br />
  Suche ist möglich nach:
  <ul>
  <li>Autor*in (Forfatter)</li>
  <li>Zeitraum (Periode)</li>
  <li>Buchtitel (Titel)</li>
  <li>Freitext in Text, Verfasserporträt und Titel (Søg)</li>
  </ul>
