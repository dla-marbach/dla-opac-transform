noteContent_mv: |-
  Das neue Portal Die DDR im Schmalfilm ist ein erweiterndes Projekt zur <a href="https://dbis.uni-regensburg.de/resources/103397">Open Memory Box</a>, die als Teilprojekt des ZZF im Rahmen des BMBF-Verbundprojekts <a href="https://dbis.uni-regensburg.de/resources/105516">Das mediale Erbe der DDR</a> entstanden ist. Auf dem Portal stellen Wissenschaftler*innen unterschiedlicher Disziplinen in Form von zahlreichen Essays ihre Perspektiven auf die privaten Schmalfilmaufnahmen aus der ehemaligen DDR dar.<br /><br />
  Die Beiträge bieten einen Blick aus der aktuellen Forschungsperspektive und eine fundierte Kontextualisierung der Privataufnahmen. Olaf Berg erklärt in einer Einführung u.a. das kuratorische Konzept hinter dem Portal. Laurence McFalls erläutert als Mitinitiator der Open Memory Box die Entstehung Sammlung und ihrer Präsentationsform.<br /><br />Die Essaysammlung wird während der Projektlaufzeit fortlaufend ergänzt.
