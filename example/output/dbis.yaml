noteContent_mv: "Alcuin ist eine Forschungsdatenbank, die neben biographischen Daten vor allem Informationen zu den Texten der mittelalterlichen Magistri und gelehrten Autoren enthält: Quellen, Überlieferung, Rezeption, bemerkenswerte Eigentümlichkeiten.<br>\r\nDer zeitliche Rahmen umfasst ungefähr das Jahrtausend von 500 bis 1500 nach Christus. Den Kern bilden die Autoren philosophischer Texte, aber naturgemäß auch alle solche, die von philosophischem Interesse und Belang sind.<br>\r\nAlcuin berücksichtigt aber nicht nur lateinisch schreibende Autoren, sondern auch deren Quellen (Avicenna Latinus etc.). Auf diese Weise kann man direkt etwas über die Verbreitung dieser Quellentexte und den Zeitpunkt ihrer Übersetzung erfahren.<br>\r\nDie Datenbank soll in erster Linie den erreichten Stand der Forschung sowie ihren Fortgang dokumentieren."
