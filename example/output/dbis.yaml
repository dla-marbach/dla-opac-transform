noteContent_mv: 'Umfassende und vollständig kommentierte Bibliographie von Textausgaben und Forschungen auf dem Gebiet der arabischen Bibel. Die historischen Übersetzungen der Bibel ins Arabische umfassen unzählige Manuskripte und Fragmente aus dem Mittelalter, die in Klöstern im gesamten Nahen Osten und in Bibliotheken auf der ganzen Welt zu finden sind, sowie frühe und aktuelle Drucke, die in Europa und im arabischsprachigen Raum hergestellt wurden. Diese Übersetzungen wurden von Juden, Christen und Samaritanern angefertigt und auch von Muslimen in ihren Gesprächen mit Mitgliedern der anderen abrahamitischen Religionen verwendet. Arabische Versionen der Bibel wurden auch aus biblischem Material in vielen verschiedenen Ausgangssprachen übersetzt, darunter Hebräisch, Aramäisch (Jüdisch, Aramäisch und Syrisch), Latein, Griechisch, Koptisch. Diese Bibliographie der arabischen Bibel zielt darauf ab, die bisherige Forschungsgeschichte zu erfassen und die gesamte Breite dieser Übersetzungen abzudecken, ganz im Sinne des ursprünglichen Forschungsprojekts Biblia Arabica: The Bible in Arabic among Jews, Christians and Muslims'
schemaVersion: 0.16.0
