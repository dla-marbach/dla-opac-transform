noteContent_mv: |-
  Asinius. Database of Classical and Christian Literature sammelt Referenzen auf moderne Editionen, Übersetzungen und Kommentare antiker Literatur (8. Jh. v. bis 6. Jh. n. Chr.). Dabei verweist die Datenbank sowohl auf gedruckte Ausgaben wie auf Onlinemedien. Diese Datenbank ist im Open Access verfügbar und möchte ein leicht benutzbares und weithin verlinktes Werkzeug für die Arbeit mit antiken literarischen Quellen für die verschiedenen Altertumswissenschaften bieten.
  Derzeit ist die Sammlung auf griechische und lateinische Literatur beschränkt (Stand bei Veröffentlichung Dez. 2024: über 500 antike Autoren und 2500 antike literarische Werke);  eine Erweiterung um antike christliche Literatur in Syrisch, Koptisch, Armenisch usw. ist geplant (<a href="https://www.asinius.gwi.uni-muenchen.de/about-the-project/">Umfang der Datenbank</a>).
