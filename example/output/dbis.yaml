noteContent_mv: "Das Virtuelle Kupferstichkabinett ist ein DFG-gefördertes Kooperationsprojekt des Herzog Anton Ulrich-Museums (HAUM) in Braunschweig und der Herzog August Bibliothek (HAB) in Wolfenbüttel.\r\nZiel des Projektes ist die virtuelle Zusammenführung repräsentativer Teile der Graphiksammlungen der beiden Institutionen, darunter ehemals zusammengehörige herzogliche Bestände, die heute verteilt im Herzog Anton Ulrich-Museum und in der Herzog August Bibliothek liegen. Der Schwerpunkt der Auswahl liegt auf Druckgraphik bis zum Jahre 1800. Im Kupferstichkabinett des Herzog Anton Ulrich-Museums steht bei der Erfassung die deutsche Graphik von den Einblattholzschnitten des 15. Jahrhunderts bis zur Epochengrenze um 1800 im Mittelpunkt. In der Herzog August Bibliothek bildet der wichtige Zusammenhang von Graphik und Buch im europäischen Kontext einen Schwerpunkt. \r\nInsgesamt sollen rund 40.000 graphische Blätter digitalisiert und umfänglich, u.a. auch mit Iconclassnotationen erschlossen werden."
