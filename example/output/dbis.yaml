noteContent_mv: "Das Luxemburger Autorenlexikon stellt Leben, Schaffen und Werk der Schriftsteller vor, die seit 1815 im literarischen Leben Luxemburgs gewirkt haben. Es bietet Lesern und Wissenschaftlern eine nützliche biografische und bibliografische Material- und Datensammlung sowie einen Überblick über die werkgeschichtliche Entwicklung und die literarhistorische Einordnung der Literatur in und aus Luxemburg. Hier sind zu finden mehr als 1.000 literarische Autoren mit ihren Pseudonymen und Namensvarianten sowie mehr als 5.000 Werke in 12 Sprachen. Das illustrierte Autorenlexikon gibt ebenfalls Auskunft über Literaturpreise, Übersetzungen, Vertonungen, Verfilmungen und archivalische Nachweise.<br>\r\nDas Luxemburger Autorenlexikon stellt jene Autorinnen und Autoren vor, die unabhängig von der Sprache und von der Staatsbürgerschaft, in Luxemburg veröffentlicht oder auf das literarische Leben gewirkt haben, und mindestens eine selbständige veröffentlichte literarische Monografie aufweisen oder aktiv am Literaturbetrieb in Luxemburg teilgenommen haben."
