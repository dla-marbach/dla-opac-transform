  Historisch-kritisch angelegte Edition der von 1910 bis 1932 publizierten Zeitschrift für avantgardistische Kunst und Kultur „Der Sturm“. Im Fokus der Zeitschrift stehen Expressionismus, Dadaismus, Futurismus und Kubismus. Das Projekt „Sturm-Edition“ widmet sich ferner der Sammlung von bereits digitalisierten Veröffentlichungen des gesamten Sturm-Unternehmens, zu welchem auch eine Galerie, ein Theaterjahrbuch sowie ein Verlag aber auch Briefverkehr von avantgardistischen Künstlern, die mit der Zeitschrift verbunden waren, gehören. Alle dabei erhobenen Forschungsdaten werden den wissenschaftlichen Fach-Communities unter freien Lizenzen zur Verfügung gestellt.
  Der Zugriff auf die Quellen erfolgt nach Quellen- , bzw. Medienart. Die Datenbank wird weiter ausgebaut.
