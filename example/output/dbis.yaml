noteContent_mv: Das Digitale Archiv jüdischer Autorinnen und Autoren in Berlin 1933–1945 (DAjAB) erfasst in über 1.000 Bio-Bibliographien Schriftstellerinnen und Schriftsteller jüdischer Herkunft, die seit 1933 unter den besonderen Bedingungen antisemitischer Ausgrenzung und Verfolgung durch die nationalsozialistische Politik und Kulturpolitik in Berlin lebten und arbeiteten. Es stellt darüber hinaus seltene, nach 1945 nicht wieder aufgelegte, zeitgenössische Primärtexte sowie Originaldokumente, Fotos und Interviews für Forschung, Lehre und eine größere Öffentlichkeit bereit.
noteRequirements_mv:
  - |-
    Auf der Startseite des Portals werden in einem 7min Präsentationsfilm (deutsch/englisch) die inhaltliche Ausrichtung und der strukturelle Aufbau des „Digitalen Archivs jüdischer Autorinnen und Autoren in Berlin 1933–1945“ (DAjAB) zusammenfassend dargestellt. Eine ausführliche Projektbeschreibung ist zudem in der Fußzeile der DAjAB-Startseite einsehbar. Sie rekapituliert zudem den Forschungsstand beim Aufbau des Portals sowie dessen grundlegendes Anliegen.<br />
