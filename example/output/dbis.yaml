noteContent_mv: |-
  Die aktuelle Ausgabe von Johannes Hirschbergers vielbenutzter Geschichte der Philosophie ist nur eines von insgesamt zwölf Standardwerken zur Geschichte der Philosophie, die auf dieser CD-ROM ungekürzt wiedergegeben werden. Hegels klassische Vorlesungen über die Geschichte der Philosophie und Heines brillanter Essay zur deutschen Geistesgeschichte finden sich in dieser Volltextbibliothek ebenso wie die bekannten Handbücher von Wilhelm Windelband und Karl Vorländer und die gesuchten philosophiegeschichtlichen Lexika von Rudolf Eisler und Fritz Mauthner.<br /><br />
  <b>Inhalt im Einzelnen:</b><br />
  <ul>
  <li>Darstellungen:<ul>
  <li>Hegel, Georg Wilhelm Friedrich: Vorlesungen über die Geschichte der Philosophie</li>
  <li>Schelling, Friedrich Wilhelm Joseph: Zur Geschichte der neueren Philosophie</li>
  <li>Feuerbach, Ludwig: Geschichte der neuern Philosophie von Bacon von Verulam bis Benedikt Spinoza</li>
  <li>Heine, Heinrich: Zur Geschichte der Religion und Philosophie in Deutschland</li>
  </ul></li>

  <li>Handbücher:<ul>
  <li>Lange, Friedrich Albert: Geschichte des Materialismus und Kritik seiner Bedeutung in der Gegenwart</li>
  <li>Windelband, Wilhelm: Lehrbuch der Geschichte der Philosophie</li>
  <li>Vorländer, Karl: Geschichte der Philosophie</li>
  <li>Hirschberger, Johannes: Geschichte der Philosophie (Band I: Altertum und Mittelalter. Band II: Neuzeit und Gegenwart)</li>
  </ul></li>

  <li>Lexika:<ul>
  <li>Kirchner, Friedrich / Michaëlis, Carl: Wörterbuch der philosophischen Grundbegriffe</li>
  <li>Eisler, Rudolf: Wörterbuch der philosophischen Begriffe</li>
  <li>Eisler, Rudolf: Philosophen-Lexikon</li>
  <li>Mauthner, Fritz: Wörterbuch der Philosophie</li>
  </ul></li>

  </ul>
  (Digitale Bibliothek ; 3)
