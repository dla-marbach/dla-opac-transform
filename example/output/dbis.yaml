noteContent_mv: "Die Datenbank <b>OLC Philosophie</b> erschließt Inhaltsverzeichnisse von philosophischen Zeitschriften. Sie ist ein fachbezogener Ausschnitt aus der Datenbank Online Contents. Die UB Erlangen-Nürnberg ergänzt die Datenbank laufend durch weitere Inhaltsverzeichnisse philosophischer Zeitschriften.<br />\nZurzeit (Stand: Juli 2020) werden etwa 548 Zeitschriftentitel ausgewertet, in der Regel ab dem Erscheinungsjahr 1993. Damit weist die Datenbank im über 339.080 Aufsätze und Rezensionen nach.<br /><br />\nSachlich umfasst die Datenbank die abendländische Philosophietradition bis zur Gegenwart: \n<ul>\n<li>\nsystematische Philosophie (Ethik, Ästhetik, Metaphysik, Philosophie des Geistes, Sprachphilosophie etc.)</li>\n<li>abendländische Philosophiegeschichte von der Antike bis zur Gegenwart</li>\n</ul>\nBestellungen über die Online-Fernleihe oder den Dokumentlieferdienst subito sind möglich!"
