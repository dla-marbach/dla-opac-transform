noteContent_mv: |-
  "Digitalne kolekcije" ist das Online-Portal zu den Sammlungen digitalisierter Materialien der National- und Universitätsbibliothek Bosnien-Herzegowinas in Sarajevo (NUB BiH). Es ermöglicht eine einheitliche Suche nach historischen digitalisierten Materialien der NUB BiH. E-Books und E-Zeitschriften sind nicht enthalten! Alle Digitalisate stehen unter öffentlicher Urheberrechtslizenz (Creative Commons (CC)–Lizenz), die eine kostenlose Nutzung und Verbreitung ansonsten urheberrechtlich geschützter Werke ermöglicht. Suchkategorien für die Recherche sind: <ul>
  <li>Periodika (Zeitschriften, Kalender, Zeitungen)</li>
  <li>Alte/seltene Bücher</li>
  <li>Handschriften (überwiegend orientalische Handschriften in türkischer, arabischer oder persischer Sprache)</li>
  <li>Kartographischen Materialien (Karten, Atlanten)</li>
  <li>Graphischer Sammlung (Bildbände, Plakate, Postkarten)</li>
  <li>Spezialsammlungen (Musikalia, im Aufbau)</li></ul>
