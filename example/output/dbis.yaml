noteContent_mv: "Die German Early Cinema Databases sammelt Informationen zum Filmbestand, zum Filmverleih, zu Filmvorführungen und zur Rezeption in Deutschland im Zeitraum von 1895 bis 1926. Sie entstand aus dem Forschungsprojekt „Visuelle Gemeinschaften: Verhältnisse des Lokalen, Nationalen und Globalen im frühen Kino“ (“Visual Communities: Relationships of the Local, National, and Global in Early Cinema“), das von der Deutschen Forschungsgemeinschaft (DFG) gefördert wird und seinen Sitz an der Universität zu Köln hat. Kostenfreien Zugriff erhält man auf folgende Einzeldatenbanken:<br /><br />\r\n- Fairground Cinema Database / Siegen Database of Itinerant Cinemas 1896-1926 / Siegener Wanderkino-Datenbank: Informationen über das Wanderkino Deutschlands und benachbarter Länder<br />\r\n- Documents Collection: ca. 5000 Volltexte über die Frühzeit des Kinos in Deutschland der Jahre 1895-1914, darunter zahlreiche Publikationen, die sich nicht explizit mit Film beschäftigen, darunter allgemeine Zeitungen und Zeitschriften<br />\r\n- Film Supply and Programme Databases: Informationen zu ca. 45.000 Filmen, die zwischen 1895 und 1920 in Deutschland verfügbar waren bzw. im entsprechenden Produktionsland sowie ca. 1200 Kino-Filmprogramme aus Zeitungen neun deutscher Städte"
