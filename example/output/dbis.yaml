noteContent_mv: |-
  „Franconica“ präsentiert einzigartige Handschriften, seltene Drucke und Grafiken aus den Sondersammlungen der Universitätsbibliothek Würzburg. „Franconica“ richtet sich einerseits an die Forschenden und gibt andererseits allen Interessierten die Möglichkeit, die Schätze der Universitätsbibliothek Würzburg digital zu erleben und auf diese Weise mehr über die Herkunft und die kulturgeschichtliche Bedeutung der Objekte für die Region Mainfranken zu erfahren.<br />
  Unter „Medien“ sind aktuell Digitalisate von Handschriften, Inkunabeln, Drucke und Grafiken zu finden. <br />
  „Kollektionen“ versammeln inhaltlich zusammengehörige Objekte wie zum Beispiel die digitalisierten Handschriften der „Würzburger Dombibliothek“.<br />
  „Franconica“ befindet sich zurzeit im Aufbau. Das Portal wird technisch und inhaltlich von der Universitätsbibliothek Würzburg betreut. Nach und nach werden alle Objekte, die sich auf den Portalen <a href="http://franconica.uni-wuerzburg.de/ub/index.html">Franconica Online</a> und <a href="http://vb.uni-wuerzburg.de/ub/index.html">Virtuelle Bibliothek Würzburg</a> befinden, nach „Franconica“ migriert.<br />
