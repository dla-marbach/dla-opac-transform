filterType_mv: Daten
noteContent_mv: "Die Edition Hannah Arendt. Kritische Gesamtausgabe macht sämtliche Schriften der Autorin mit Ausnahme der Briefe zugänglich (<a href=\"https://hannah-arendt-edition.net/about/timetable?lang=de\">Editionsplan</a>). \n\nDie Kritische Gesamtausgabe präsentiert Hannah Arendts Texte vollständig, kommentiert und in der Vielfalt der Sprachen, in denen sie verfasst wurden. Die Edition stellt sämtliche von Hannah Arendt zu Lebzeiten veröffentlichten Werke (Monographien, Essaysammlungen, Artikel, Interviews etc.) sowie tausende Seiten unveröffentlichter Dokumente aus dem Nachlass (Typoskripte, Notizen, Vorfassungen und Umarbeitungen) zur Verfügung, und zwar in den jeweiligen Originalsprachen der Texte (deutsch, englisch, französisch, jiddisch).\n\nDie Website Hannah Arendt. Kritische Gesamtausgabe bietet einen einzigartigen Blick in die Denk- und Schreibprozesse der Autorin: Die Entstehungsstadien ihrer Schriften können erstmals, soweit Zeugnisse vorliegen, nachvollzogen werden. Der Editionsvorgang bleibt dabei bis hin zu einzelnen Entzifferungs- und Deutungsentscheidungen nachprüfbar. Der letzte Band der Gesamtausgabe ist für 2032 angekündigt."
