noteContent_mv: "Als Ergebnis eines vierjährigen DFG-Projekts ist eine Online-Datenbank zu westlichen und zentralasiatischen Pracht- und Luxuseinbänden aus den Beständen der Bayerischen Staatsbibliothek nun online verfügbar.\r\n<br />Anhand eines Corpus von 59 westlichen Prachteinbänden des Mittelalters und der Neuzeit sowie von 96 tibetischen Buchdeckeln wurde ein modularer Standard der Beschreibung dieser eigenständigen Kunstobjekte entwickelt. Begleitend wurden die Objekte in einem kamerabasierten Workflow unter Einbeziehung der Ergebnisse der Erschließung digitalisiert und eine Standardsequenz von Aufnahmen für diese Objektgattung entwickelt. Ausgewählte Objekte der beiden Sammlungen wurden zudem vom Institut für Bestandserhaltung und Restaurierung (IBR) der Bayerischen Staatsbibliothek materialwissenschaftlich und kunsttechnologisch ausschließlich mit berührungslosen und zerstörungsfreien Verfahren zur Bestimmung von Farbmitteln, Metallen und Schmucksteinen analysiert."
