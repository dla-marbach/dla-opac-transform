noteContent_mv: |-
  Das Lin|gu|is|tik-Portal bietet Fachinformationen zu allen Bereichen der Sprachwissenschaft, von Allgemeiner und Vergleichender Linguistik über die größeren europäischen Einzelphilologien bis hin zu kleinen, bedrohten oder alten Sprachen. <br />
  Sie finden wissenschaftlich relevante gedruckte und digitale Informationen über die folgenden Einstiege:
  <ul>
  <li>Link-Verzeichnis (Linksammlung wissenschaftlich relevanter Ressourcen zu den verschiedenen Disziplinen der Sprachwissenschaft und zur Linguistik der Einzelphilologien)</li>
  <li>Kataloge (Suche in ausgewählten Katalogen, Bibliografien, Online-Quellen und Open-Access-Verzeichnissen)</li>
  <li>Zeitschriften-Verzeichnis (über 2000 elektronische Zeitschriften zur Sprachwissenschaft)</li>
  <li>Datenbank-Verzeichnis (über 500 Linguistik-Datenbanken, thematisch und sprachlich sortiert)</li>
  <li>Forschung (dokumentiert werden alle Forschungsvorhaben mit eigener Webseite aus den Bereichen Allgemeine und Vergleichende Sprachwissenschaft, Indogermanistik und historische Linguistik)</li>
  <li>Wörterbuch-Verzeichnis (über 1300 Online-Wörterbücher)</li>
  <li>Neuerwerbungen</li>

  </ul>
  <p>
  Das Lin|gu|is|tik-Portal entsteht in Kooperation zwischen der Universitätsbibliothek J. C. Senckenberg Frankfurt a. M. (Projektleitung) und dem Institut für Deutsche Sprache (IDS) Mannheim, dem Linguistik-Server Essen (LinseLinks), sowie der AG Angewandte Computerlinguistik (ACoLi) des Instituts für Informatik, Goethe-Universität Frankfurt a.M.</p>
