noteContent_mv: "Die Online Library of Liberty (OLL) ist eine umfangreiche digitale Bibliothek mit wissenschaftlichen Werken zu den Themen individuelle Freiheit und freie Märkte. Von Kunst und Wirtschaft bis hin zu Recht und politischer Theorie bietet die OLL eine kuratierte Sammlung von Ressourcen, die kostenlos zur Verfügung stehen.<br>\r\n\r\nZiel der OLL ist es, das Interesse an und das Verständnis für das Ideal einer Gesellschaft freier und verantwortungsbewusster Individuen zu fördern. Insbesondere befassen wir uns mit Ideen über individuelle Freiheit, eine begrenzte verfassungsmäßige Regierung, freie Märkte und Frieden."
