filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Ab 2001 wurden im Rahmen eines DFG-Projektes in Kooperation mit der Bayerischen Staatsbibliothek (BSB) alle bis dahin erschienenen Regestenbände retrodigitalisiert. Seitdem steht RI Online der breiten Öffentlichkeit zur Verfügung. RI Online bietet Zugang zur <b>Regestendatenbank</b>, in der sich alle seit 1839 erschienenen  Bände der Regesta Imperii im Volltext finden. Recherchierbar sind somit mehr als 140.000 Regesten von Herrscher- und Papsturkunden von den Karolingern bis hin zu Maximilian I. (751-1519). <p>

  Der <b>RI OPAC</b> ist eine frei zugängliche, alle Fachdisziplinen berücksichtigende Literaturdatenbank für die mediävistische Forschung des gesamten europäischen Sprachraums. Es ist hier die in den Regestenpublikationen zitierte Literatur zu finden. Berücksichtigt werden Publikationen vom 16. Jahrhundert bis heute. Inzwischen (Stand 04 2020) sind über 2,3 Millionen Titel, davon allein 1,8 Millionen Aufsätze, erfasst. Durch regelmäßige Updates wird der OPAC fortlaufend aktualisiert und erweitert. <br />
  Der systematische Thesaurus ermöglicht es, sich Einträge in der Datenbank nach Themenbereichen, Zeitabschnitten oder regionaler Zuordnung anzeigen zu lassen und so gezielt Spezialliteratur zu suchen. Im Thesaurusbereich „Autoren“ werden GND-Verknüpfungen angeboten. Durch die zielgenauen Verlinkungen zum KVK (bei Monographien und Sammelbänden), beziehungsweise zur ZDB (bei Zeitschriften) ermöglicht es der RI-OPAC darüber hinaus Bestandsangaben auch für unselbstständiges Schrifttum zu ermitteln. Auch auf frei zugängliche Digitalisate wird verwiesen.</p>
