noteContent_mv: In ZweiDat (Zweifelsfälle-Datenbank) werden maßgebliche Quellentexte erfasst, die sich mit sprachlichen Zweifelsfällen und vergleichbaren Normproblemen des Deutschen beschäftigen. Bei den bearbeiteten Texten handelt es sich um normierende Texte, die als Bestandteile des neuhochdeutschen Sprachkodex gelten können. Durch die systematische Aufarbeitung der Texte lässt sich für die jüngere Geschichte des Deutschen sowie seine Gegenwart ermitteln, über welche Sprachvarianten nachgedacht wird und was nach Ansicht viel gelesener Autoren als gutes und richtiges Deutsch (Standarddeutsch) gelten soll. Die Datenbank enthält eine systematische Klassifikation zentraler Zweifelsfälle sowie weitere Analyse-Komponenten, die zur sprachwissenschaftlichen Erforschung von Zweifelsfällen und ihrer Kodifizierung herangezogen werden können. Die Erstellung der Datenbank ist noch nicht abgeschlossen. Sie wird kontinuierlich erweitert.
