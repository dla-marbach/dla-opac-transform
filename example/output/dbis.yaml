noteContent_mv: "Die Bibliographie umfasst alle veröffentlichten Werke norwegischer Belletristikautor*innen, die im Ausland und/oder hauptsächlich für ein ausländisches Publikum veröffentlicht wurden. \r\n<br>\r\nSachliteratur wird nur insoweit abgedeckt, als sie Teil einer Autor*inenschaft ist, bei der es sich hauptsächlich um Belletristik handelt, oder wenn automatisch generierte Auszüge aus Übersetzungen aus der Nationalbibliographie auch Sachliteratur enthalten. Einbezogen sind alle Auflagen und Auflagen, auch solche, die in Anthologien, Zeitschriften, Zeitungen oder anderen Medien veröffentlicht wurden.\r\n<br>\r\nDie Bibliographie umfasst keine Texte über norwegische Autor*innen oder Werke im Ausland.\r\n<br>\r\n„Norwegisch“ bezeichnet Autor*innen, die zum Zeitpunkt der Veröffentlichung in Norwegen geboren wurden und/oder in Norwegen leben."
