noteContent_mv: "Die Datenbank verzeichnet die orientalischen Handschriften der Forschungsbibliothek Gotha der Universität Erfurt. <br />\r\nDie Handschriften werden seit 2015 kontinuierlich in einer Anwendung der von der Staatsbibliothek zu Berlin – Preußischer Kulturbesitz verwendeten Datenbank Orient-Digital erfasst. Die Datenbank geht auf eine Entwicklung des Orientalischen Instituts der Universität Leipzig und des Universitätsrechenzentrums Leipzig zurück.\r\n<br />\r\nAuf der Grundlage der von Wilhelm Pertsch angefertigten Handschriftenkataloge sowie in Anlehnung an die von der KOHD - Katalogisierung der orientalischen Handschriften in Deutschland entwickelten und international anerkannten Richtlinien werden zunächst Kurzkatalogisate mit den wichtigsten bibliographischen Informationen erstellt. <br />\r\nLangfristiges Ziel ist es, alle orientalischen Handschriften der Bibliothek tiefenerschlossen und digital zu präsentieren. <br />\r\nMit ihren ca. 3.500 Handschriften bewahrt die Bibliothek eine der größten Sammlungen in der Bundesrepublik Deutschland. Sie bildet einen Querschnitt durch alle Richtungen islamischer Gelehrsamkeit über einen Zeitraum von mehr als 800 Jahren."
