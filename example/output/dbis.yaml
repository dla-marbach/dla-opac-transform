noteContent_mv: |-
  Das Teuchos-Zentrum für Handschriften- und Textforschung der Universität Hamburg entwickelt eine elektronische Arbeitsumgebung für die philologische Grundlagenforschung zur Unterstützung der Arbeitsabläufe bei der wissenschaftlichen Edition antiker Texte mit Schwerpunkt Gräzistik. Auf ihrer Website bietet Teuchos Zugriff zu 2 Datenbanken:<br />
  <ul>
  <li>Fachwissenschaftliche Handschriftenbeschreibungen<br />
  Im Mittelpunkt stehen die Textüberlieferungen zu Aristoteles Graecus mit präzisen Beschreibungen der mittelalterlich-byzantinischen und renaissancezeitlichen Manuskripte der Aristoteles-Tradition. Hinzu kommt die Handschriftenkunde mit der Palimpsestforschung, mit Fragen zu Materialien wie Pergament und Papier und damit auch zu Wasserzeichen.</li>
  <li>Gelehrtengeschichtliche Prosopographie<br />
  Hier werden die im Teuchos-Projekt komplett neu erstellten Biographien insbesondere von Textforschern des 19. Jahrhunderts aus der Feder Wilt-Aden Schröders publiziert.</li></ul>
