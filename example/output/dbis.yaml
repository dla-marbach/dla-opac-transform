noteContent_mv: "Das Digitalisierungsprojekt präsentiert den Zeitraum 1945,22.Juli - 1994,5.Juli. Die Datenbank mit Originaldigitalisaten bietet eine Volltextsuche sowie eine Kalenderblattfunktion. Sie ist Teil des Portals DDR-Presse. \n\nDie Zeitung „Neue Zeit“ war die Parteizeitung der CDU in der DDR und erschien erstmals am 22. Juli 1945. Sie wird im DDR-Zeitungsportal exemplarisch für die Presse der Blockparteien in der DDR präsentiert.  Auch wenn sie in der gesamten Presselandschaft der DDR eine untergeordnete Rolle spielte, war die „Neue Zeit“ die auflagenstärkste Zeitung der vier Blockparteien.\n\nSie wies einen konfessionell-kirchlichen Bezug auf und sollte die Bevölkerungsgruppen ansprechen, die durch das Neue Deutschland und die SED-Bezirkszeitungen nicht erreicht wurden. Die „Neue Zeit“ erschien bis zum 5. Juli 1994. Die Auflagenhöhe umfasste im Jahr 1988 ca. 113.000 Exemplare. Insgesamt umfasst die Neue Zeit von 1945 bis 1994 etwa 158.100 Einzelseiten."
