noteContent_mv: "Die Bildnissammlung des Frankfurter Weinhändlers Friedrich Nicolas Manskopf (1869-1928) gliedert sich in vier Teile, von denen zwei als Digitalisate zur Verfügung stehen: rund 12.500 Fotografien und 4.900 Stück Druckgrafik. Die rund 1.000 Karikaturen der Sammlung und die ca. 20.000 Porträtreproduktionen aus Zeitungen und Zeitschriften wurden nicht in das Projekt mit einbezogen.<br>\r\nDargestellt sind Komponisten, Instrumentalisten, Sänger, Schauspieler, Regisseure, Dramatiker, Tänzer, überwiegend in Einzel-, seltener in Gruppenporträts, außerdem Szenenfotos, Theateransichten, allegorische Darstellungen von Musik und Theater u.a. Die Sammlung Druckgrafik stammt aus der Zeit von ca. 1550 bis 1928, die Fotosammlung aus der Zeit von ca. 1860 bis 1944, da sie auch nach dem Tode Manskopfs noch ergänzt wurde."
schemaVersion: 0.16.0
source: AK
