filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Die Datenbank umfasst Nachweise von mehr als 500 Schriftstellernachlässen und literarischen Überlieferungen, die in über 75 Archiven (Staats-, Kommunal-, Kirchen-, Firmen-, Bibliotheks-, Museums-, Literatur-, Stiftungs- und Privatarchive) in Westfalen aufbewahrt werden. Das Portal bietet kostenlos Recherche-Möglichkeiten im gesamten Datenbestand. Das Projekt geht zurück auf eine Initiative der Literaturkommission für Westfalen, des Westfälischen Literaturarchivs und des LiteraturRats NRW, die sich in jüngerer Zeit verstärkt um die literarische Nachlasspflege in der Region bemühen.<br>\r\nDas Portal basiert auf einer flächendeckenden Umfrage bei potentiellen aufbewahrenden Institutionen von literarischen Nachlässen in Westfalen. Mithilfe mehrerer Fragebögen sind Existenz, Art und Umfang literarischer Nachlässe in der Region ermittelt worden. Es konnten so die Ergebnisse der Datenbasis Literarische Nachlässe in NRW. Ein Bestandsverzeichnis? (Bearb.: Dagmar Rohnke-Rostalski. Wiesbaden 1995) aktualisiert, ergänzt, korrigiert und präzisiert werden. Gleichzeitig ist es gelungen, viele Bestände neu nachzuweisen und zu verzeichnen.<br>\r\nAusschlaggebend für die Aufnahme der Nachlässe ist nicht die regionale Herkunft oder Zugehörigkeit der Autorinnen und Autoren, sondern allein die geografische Lage der Archive in Westfalen. Die entstandene Datenbank ist eine wesentliche und wichtige Erweiterung der nachlassbezogenen Angaben des ?Westfälischen Autorenlexikons?, mit dem die neue Datenbank eng verzahnt ist. Dort werden auch diejenigen Angaben bereitgehalten, die die Aufbewahrung von Nachlassmaterialien außerhalb Westfalens betreffen."
