noteContent_mv: Thomas Manns Nachlassbibliothek im Thomas-Mann-Archiv der ETH-Bibliothek Zürich umfasst ca. 4.300 Exemplare, darunter Bücher, Zeitschriften, Zeitungsartikel und Typoskripte. Sie enthält Werke des Schriftstellers in deutscher Sprache und in Übersetzung, Sekundärliteratur zu Leben und Werk Thomas Manns, Werke fremder Autorinnen und Autoren, Wörterbücher und Enzyklopädien. Das älteste Buch stammt aus dem Jahr 1682, das jüngste Werk ist 1962 erschienen.<br/> Viele der Exemplare enthalten Stiftspuren von der Hand Thomas Manns und von Dritten, darüber hinaus Widmungen, Einlagen und andere Gebrauchsspuren. Im Rahmen des vom Schweizerischen Nationalfonds (SNF) geförderten und vom Thomas-Mann-Archiv, der ETH-Bibliothek und der Professur für Literatur- und Kulturwissenschaft umgesetzten Kooperationsprojekts wurden diese Spuren digitalisiert, erschlossen und, im Fall der schriftlichen Stiftspuren von Thomas Manns Hand, transkribiert. Die Datenbank zu Thomas Manns Nachlassbibliothek macht die Phänomene sichtbar und anhand von eigens am Material entwickelten Erschliessungskategorien durchsuchbar.
