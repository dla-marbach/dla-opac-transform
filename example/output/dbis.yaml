noteContent_mv: "Das Thomas-Mann-Archiv an der ETH-Bibliothek macht rund 2000 rechtefreie Bilder öffentlich zugänglich. <br>\r\nDie inhaltlichen Schwerpunkte umfassen Porträts von Thomas Mann und von Mitgliedern der Familie Mann-Pringsheim sowie Familiensituationen und Ferienaufenthalte u. a. in Nidden. Ausserdem werden öffentliche Auftritte wie Vortragsreisen nach Osteuropa oder New York sowie auch die Zeit des Exils in der Schweiz und in den USA dokumentiert.<br>\r\nDie Fotografien decken einen Zeitraum von der Mitte des 19. Jahrhunderts bis in die 1950er Jahre ab. Teilweise wird auch bisher Unbekanntes veröffentlicht, beispielsweise Aufnahmen der Geschwister und der (weiblichen) Verwandtschaft Katia Manns oder Fotoalben.\r\n\r\nDie rund 2000 rechtefreien Fotografien können unter Angabe des korrekten Bildnachweises frei genutzt werden und stehen hochaufgelöst zum Download zur Verfügung. Noch nicht rechtefreie Bilder können im Lesesaal des <a href=\"http://www.tma.ethz.ch/\">Thomas-Mann-Archivs</a> recherchiert und eingesehen werden (Bestand insgesamt ca. 6000 Bilder)."
