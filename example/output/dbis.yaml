noteContent_mv: |-
  Die Herzog August Bibliothek Wolfenbüttel koordiniert seit Oktober 2017 den Fachinformationsdienst Buch-, Bibliotheks- und Informationswissenschaft im Rahmen des DFG-geförderten Programms „Fachinformationsdienste für die Wissenschaft“. Die Entwicklung des Nachweisportals erfolgt in enger Kooperation mit der Universitätsbibliothek Leipzig.
  In einem zentralen Nachweisportal können Forschende Spezialliteratur zu den FID-Fächern recherchieren. Auch Digital Humanities, historische Hilfs- und Grundwissenschaften sowie Restaurierungswissenschaften werden berücksichtigt, sofern sie einen direkten Bezug zu den BBI-Disziplinen haben. Besonderes Augenmerk liegt auf interdisziplinärer und internationaler Forschungsliteratur. Der FID lizenziert fachspezifische Datenbanken und E-Books, die den Forschenden über das Portal zugänglich sind. Es ermöglicht zudem die Speicherung von Suchen, die Erstellung von Favoritenlisten und die Vergabe von Tags. Das Angebot wird stetig um neue Funktionen erweitert.
