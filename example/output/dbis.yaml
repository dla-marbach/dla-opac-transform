noteContent_mv: |-
  Die Open Access Datenbank zielt darauf ab, ausführliche bibliographische Beschreibungen aller von Christopher Plantin (ca. 1520–1589) in Antwerpen und von seiner Beamten in Leiden bis zu seinem Tod am 1. Juli 1589 gedruckten und veröffentlichten Ausgaben zu liefern. The Plantin Press Online enthält bibliographische Daten, seine Korrespondenz und das Plantin-Archiv in Antwerpen sowie Verbindungen zu digitalen Reproduktionen. Basierend auf der gedruckten Ausgabe, die von Léon Voet in Zusammenarbeit mit Jenny Voet-Grisolle (Amsterdam, 1980–1983) zusammengestellt wurde, enthält dieses Open-Access-Forschungsinstrument die neuesten bibliografischen Erkenntnisse sowie Korrekturen in der Druckausgabe.
  Diese digitale Ressource wird in Zusammenarbeit mit dem <a href="https://museumplantinmoretus.be/en">Museum Plantin-Moretus </a> veröffentlicht und kontinuierlich aktualisiert.
