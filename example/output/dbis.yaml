noteContent_mv: "Die Forschungsbibliothek Gotha bewahrt über 11.500 Handschriften europäischer und orientalischer Provenienz, die rund 1300 Jahre verschiedener Handschriftenkulturen repräsentieren. Sie erwirbt nach wie vor Handschriften und Nachlassmaterialien entsprechend ihrem Sammlungsprofil.<br>\r\n\r\nSeit der Gründung der Bibliothek im Jahre 1647 wurde der Bestand sukzessive durch Erwerbungen und Schenkungen erweitert. Hervorzuheben ist dabei das Engagement von Herzog Ernst I. (1601–1675), durch den im Dreißigjährigen Krieg auch Handschriften als Beutekunst aus Mainz, Würzburg und München nach Gotha gelangten. Herzog Ernst II. (1745–1804) erwarb zahlreiche kostbare Handschriften, wobei er unter anderem dem geschäftstüchtigen französischen Benediktinermönch Jean-Baptiste Maugérard (1735–1815) rund 50 wertvolle mittelalterliche Stücke aus so bedeutenden Klöstern und Skriptorien wie Echternach und Murbach abkaufte. Auch ein Großteil der Sammlung an orientalischen Handschriften wurde in seinem Auftrag von Ulrich Jasper Seetzen (1767–1811) im Orient erworben. Ein weiterer bestandsprägender Sammlungskern sind die über 11.130 Auswandererbriefe, die seit den 1980er Jahren auf Veranlassung von Prof. Dr. Wolfgang Helbich gesammelt und von Prof. Dr. Ursula Lehmkuhl wissenschaftlich betreut werden.<br>\r\n\r\nDer Schwerpunkt der Handschriftensammlung liegt im Bereich der frühneuzeitlichen Handschriften, die vor allem durch das Herzoghaus von Sachsen-Gotha-Altenburg erworben worden sind. Den Kern der Handschriftensammlung bilden die so genannten Reformationshandschriften, die im 16. Jahrhundert entstanden sind und vor allem durch Herzog Ernst I. und Herzog Friedrich II. von Sachsen-Gotha-Altenburg in die Herzogliche Bibliothek gelangten. Die Handschriftensammlung ist universal ausgerichtet, so dass sie das Wissen der Frühen Neuzeit in seinen reichen Facettierungen trefflich widerspiegelt. Rund 1.400 Musikalien überliefern zudem das reiche musikalische Leben der Zeit, darunter Werke der Komponistenfamilie Bach, der böhmischen und thüringischen Musikgeschichte sowie der Gothaer Hofkapelle."
