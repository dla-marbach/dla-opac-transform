noteContent_mv: Die jiddische literarische Zeitschrift Sovetish heymland. Tsvey khadoshimdiker literarish-kinstlerisher zshurnal. Organ fun shrayber farband fun kh.s.s.r. (zweimonatige literarisch-künstlerische Zeitschrift, Organ des Schriftstellerverbandes der UdSSR) erschien in 30 Jahrgängen zwischen 1961-1991. Sie blieb, von 1965 an, als monatliche Veröffentlichung bis 1991 das einzige publizistische kulturelle Medium und öffentliche Forum der jiddisch sprechenden Minderheit in der Sowjetunion. Als Teil des DFG-Projekt Sovetish heymland (<a href=https://www.slav.uni-heidelberg.de/SovetishHeymland.html target=blank> https://www.slav.uni-heidelberg.de/SovetishHeymland.html</A>) verzeichnet die bibliographische Datenbank alle Aufsätze der Zeitschrift und ermöglicht eine Suche nach Autoren, Titeln und Themen. Die Bibliographie wird vom Slavischen Institut der Universität Heidelberg in Kooperation mit der Universitätsbibliothek Heidelberg betrieben
