filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Im Projekt Festkultur-Online - Deutsche Drucke des 17. Jahrhunderts zur Festkultur des Barock hat die Herzog August Bibliothek 314 Drucke digitalisiert und auf Seitenebene inhaltlich erschlossen. Das Projekt erfolgte in enger Kooperation mit dem nach Wolfenbütteler Vorbild durchgeführten Digitalisierungsprojekt der University of Warwick/British Library. Daten zu 253 Drucken aus diesem Projekt wurden ebenfalls eingespielt, so dass insgesamt 567 Drucke für die Recherche zur Verfügung stehen. \r\n<br>Die 314 Drucke aus Wolfenbüttel stammen vor allem aus dem deutschen Sprachraum von der Mitte des 16. bis Anfang des 18. Jahrhunderts. Bei den Drucken des Warwick/British Library-Projektes liegt der Schwerpunkt bei französischen, italienischen und englischen Festbeschreibungen von 1475 bis 1700. \r\n<br>Hauptkriterium für die Aufnahme eines Titels in die Datenbank war, dass das fragliche Werk (Festbeschreibung, Libretto, Drama, etc.) einem konkreten Anlass zuzuordnen ist (Geburtstag, Einzug, etc.). Des weiteren wurden einzelne Werke ausgewählt, die im weiteren Sinne mit frühneuzeitlichen Festen in Verbindung zu bringen sind oder die zum Verständnis der frühneuzeitlichen Festkultur beitragen.\r\n<!--Im Rahmen des Projektes Deutscher Drucke des 17. Jahrhunderts zur Festkultur des Barock hat die Herzog August Bibliothek 344 Drucke digitalisiert. In dem auf diesen Vorarbeiten fußenden Projekt Festkultur online soll einerseits die inhaltliche Erschließung realisiert, andererseits mit dem nach Wolfenbütteler Vorbild initiierten Digitalisierungsprojekt der University of Warwick/British Library ein Verfahren erprobt werden, verteilt liegende Bestände zur frühneuzeitlichen Festkultur nach gemeinsamen Richtlinien zu indexieren und zugänglich zu machen.-->"
schemaVersion: 0.16.0
source: AK
