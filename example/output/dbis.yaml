  Seit 2013 wird das Wörterbuch als <a href="https://adw-goe.de/forschung/forschungsprojekte-akademienprogramm/fruehneuhochdeutsches-woerterbuch/woerterbuch/">Forschungsprojekt</a> der Akademie der Wissenschaften zu Göttingen fortgeführt; es soll bis zum Jahr 2027 abgeschlossen werden. Die gedruckten Lieferungen sind nach einer Sperrfrist von jeweils zehn (vor 2013 erschienen) bzw. vier Jahren (2013 oder später erschienen) bei FWB-online frei zugänglich. Die <a href="https://fwb-online.de/az">A-Z-Liste</a> zeigt, welche Abschnitte des Alphabets bereits online sind und  ermöglicht das Blättern im Wörterbuch.<br /><br />
