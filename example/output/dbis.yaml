noteContent_mv: "Die Deutsche Aussprachedatenbank (DAD) ist Teil eines Forschungsprojekts an der Martin-Luther-Universität Halle-Wittenberg. Da sie aus dem Wörterverzeichnis des Deutschen Aussprachewörterbuchs (DAWB, Krech et al. 2009) hervorgegangen ist, gibt die Deutsche Aussprachedatenbank den aktuellen Stand der halleschen Aussprachekodifizierung wieder.\r\n<br>\r\nDas Nachschlagewerk wendet sich vor allem an Berufssprecher*innen im engeren Sinn, also z. B. an Sprecher*innen in den überregionalen Rundfunkmedien, an Schauspieler*innen und Rezitator*innen. Ebenso gehören Lehrende im Bereich Deutsch als Fremdsprache, Sänger*innen und Gesangspädagog*innen sowie sprachheiltherapeutisch und -pädagogisch Tätige zur Zielgruppe. Darüber hinaus ist es für Wissenschaftler*innen interessant, denn es dient der Dokumentation eines bestimmten Standes der Ausspracheentwicklung (der Standardsprache der Bundesrepublik Deutschland)."
