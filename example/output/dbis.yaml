noteContent_mv: |-
  Der Fachinformationsdienst Benelux / Low Countries Studies (FID Benelux) ist ein seit 2016 bestehender Service der Universitäts- und Landesbibliothek Münster im Rahmen des DFG-geförderten Programms der „Fachinformationsdienste für die Wissenschaft“. Die Fachinformationsdienste ergänzen die Informationsinfrastrukturen der Hochschulen und Forschungseinrichtungen durch überregionale Dienstleistungen für den Spezialbedarf. Innerhalb dieses Systems fungiert der FID Benelux als zentrale Anlaufstelle für forschungsrelevante Literatur und Informationen über die Kultur und Gesellschaft der Beneluxländer sowie forschungsunterstützende Services für diesen Bereich.
  <p>
  Das FID Benelux-Portal umfasst unter anderem folgende Komponenten:
  <br />
  eine Suchmaschine zur Literaturrecherche, ein Verzeichnis der Beneluxforschung im deutschsprachigen Raum, ein Blog als interaktive Plattform für die Fachkommunikation, einen Open-Access-Publikationsdienst, einen Digitalisierungsservice, einen Cloud-Speicher für kollaboratives Arbeiten sowie weitere Unterstützungsangebote im Bereich wissenschaftlicher und bibliothekarischer Arbeitsprozesse.
  </p>
