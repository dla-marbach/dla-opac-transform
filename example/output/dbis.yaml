noteContent_mv: |-
  Joachim Ringelnatz (1883-1934) hat als Humorist, Erzähler, Kabarettist und Zeichner ein facettenreiches Werk hinterlassen. Die vorliegende CD-ROM präsentiert auf 5.553 Bildschirmseiten das Gesamtwerk des Dichters, dessen Hauptschaffenszeit in den Weimarer Jahren liegt und von den Nationalsozialisten jäh beendet wurde. Die Ausgabe basiert auf der von Walter Pape herausgegebenen und ausführlich kommentierten siebenbändigen Edition (Diogenes). Sie enthält neben allen Werken - darunter viele erstmals aus dem Nachlass veröffentlicht - eine umfangreiche Auswahl aus den Briefen, faksimilierte Original-Handschriften und gut 230 Zeichnungen und Gemälde.<br />
