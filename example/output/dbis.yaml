noteContent_mv: Das Portal widmet sich den DDR-Tageszeitungen als historischen Medien und macht sie als Recherche-Material durch eine vollständige Digitalisierung im Internet frei zugänglich. Dabei wird durch die umfassende <a href="https://dbis.uni-regensburg.de/resources/11636">Digitalisierung der Zeitungen „Neues Deutschland“, „Berliner Zeitung“ und „Neue Zeit“</a> ein bedeutender Teil der Presse in der DDR als Quelle im Internet für die Forschung bereitgestellt und die Auseinandersetzung mit DDR-Medien gefördert. Neben der digitalen Erschließung von zeithistorischem Material verlangt der Umgang mit diesen Quellen eine quellenkritische Begleitung und komplexe medienhistorische Einordnung. Die Forschungsumgebung redaktionell betreuter Texte soll daher durch einen wachsenden Umfang an Einführungstexten einen methodisch reflektierten Zugang zum Themenkomplex DDR-Pressegeschichte ermöglichen.<br /><br />Die ein- und weiterführenden Aufsätze werden von Experten der Geschichts-, Medien- und Kommunikationswissenschaften verfasst. Neben dem Fachpublikum ist zugleich ein breiter Nutzerkreis im Internet angesprochen. Daher werden den Nutzern, die über keine Erfahrung in der Rezeption der DDR-spezifischen Pressetexte verfügen, Hinweise für einen methodisch reflektierten Umgang mit den digitalisierten Pressematerialien angeboten. Neben den Einführungstexten wird das Portal zudem Dokumente wie z.B. wichtige Beschlüsse und Richtlinien der SED zur Pressepolitik sowie politische Anweisungen zugänglich machen.
