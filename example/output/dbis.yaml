noteContent_mv: "Jet ist eine amerikanische illustrierte Zeitschrift, die wöchentlich erscheint. 1951 von John H. Johnson in Chicago ursprünglich als „The Weekly Negro News Magazine“ begründet, berichtete es von Anfang an als Nachrichtenmagazin aus allen Bereichen des afroamerikanischen Lebens (u. a. über Auslandsnachrichten, Kultur, Wirtschaft, Sport, Medizin, Religion usw.). Auch dokumentierte Jet mit Berichten über die Ermordung des 14-jährigen Emmett Till, den „Montgomery Bus Boycott“ oder Martin Luther King die schwarze Bürgerrechtsbewegung. Als Lifestyle-Magazin konzipiert erreicht es heute eine Auflage von ca. 800.000 Exemplaren.<br /><br />\r\nVia Google Books lassen sich kostenfrei die gesamten Jahrgänge von November 1951 bis Oktober 2008 einsehen. Sowohl alle Zeitschriftenhefte als auch einzelne Ausgaben können nach Stichworten durchsucht werden. Auch lassen sich Permalinks erzeugen. Das Kopieren, Abspeichern oder Ausdrucken ist nicht möglich."
