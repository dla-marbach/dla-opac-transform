noteContent_mv: |
  Eighteenth Century Collections Online bieten auf der Grundlage des English Short Title Catalogue einen Zugang zu über 180.000 Titeln von primär in Großbritannien erschienenen Büchern, Pamphleten, Essays und Einblattdrucken. Die E-Book-Sammlung beinhaltet fachlich Werke aus der Geschichte, Geographie, den Schönen Künsten, den Sozialwissenschaften, Sprache und Literatur, Theologie und Philosophie, Recht sowie Medizin, Naturwissenschaft und Technik. Nahezu 40 Millionen Seiten können auf der Basis einer Volltextsuche mit einfachen und erweiterten Sucheinstiegen recherchiert werden.
  <br />ECCO II setzt 2010 die bereits als Nationallizenz der 1. Runde erworbene Datenbank Eighteenth Century Collections Online (ECCO I) unter einer neuen gemeinsamen Oberfläche fort.
