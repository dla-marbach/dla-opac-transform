noteContent_mv: "<b>Austro-Dok</b> ist eine Sammlung von Medienberichten mit dem Schwerpunkt der österreichischen Innen- und Wirtschaftspolitik aus den 70er, 80er und 90er Jahren und eine wesentliche Quellensammlung zur österreichischen Zeitgeschichte. In der Referenzdatenbank Austro-Dok online der Fachbereichsbibliothek Zeitgeschichte und des Instituts für Zeitgeschichte der Universität Wien werden diese Daten nun frei zur Verfügung gestellt. <br><br>\r\nDie in der Referenzdatenbank ausgewerteten Medienberichte selbst liegen in Form von Mikrofiche (etwa 10.000 Stück, mit weit über 400.000 Einzelbildern) vor, die in der Fachbereichsbibliothek Zeitgeschichte eingesehen werden können. Ein ebenso zur Austro-Dok gehörender Audio- bzw. Film- und Videobestand wurde an die Österreichische Mediathek bzw. an das ORF-Archiv übergeben. Eine kleine Auswahl steht digitalisiert an der Fachbereichsbibliothek Zeitgeschichte zur Verfügung."
