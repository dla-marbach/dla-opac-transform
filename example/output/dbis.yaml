noteContent_mv: "Im Aufbau befindliches Online-Portal, das am Robert Musil-Institut in Klagenfurt entwickelt wird. Zeitgleich mit der Veröffentlichung der einzelnen Bände der „Musil-Gesamtausgabe“ (Verlag <a href = http://www.jungundjung.at/content.php?id=2&b_id=248>Jung und Jung</a>) sollen die entsprechenden Teile parallel online veröffentlicht werden.<br />\r\nGegenwärtig enthält das Portal bereits alle Teile von Musils unvollendetem Hauptwerk „Der Mann ohne Eigenschaften“ (Stand: 10/2021), die 1930 und 1932 veröffentlicht wurden. Zu den Nachlassteilen des Romans werden nach und nach textgenetische Dossiers mit den Fassungen zu jedem Romankapitel sowie hypertextuelle Strukturen für die Navigation, Recherche und Datenbanken mit archivalischen und philologischen Informationen hinzugefügt. Ebenfalls geplant ist ein Online-Kommentar, das als umfassendes  Informationssystems für LeserInnen der Gesamtausgabe fungieren soll (mit Erläuterungen zu Werkfiguren, Eigennamen, Realien, zum historischen Hintergrund, zur Wortgeschichte usw.)."
