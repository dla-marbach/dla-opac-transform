noteContent_mv: |-
  Das Webportal MENALIB („Middle East Virtual Library“) bündelt als Virtuelle Fachbibliothek alle Serviceleistungen des Fachinformationsdienstes (FID) Nahost-, Nordafrika- und Islamstudien.<br /><br />
  Menalib bietet folgende Recherchemöglichkeiten:
  <ul>
  <li>Suche in den Halleschen Orientbeständen über das  Discovery System Ha:Lit</li>
  <li>Metasuche in einschlägigen überregionalen Katalogen</li>
  <li>Volltextsuche in MENAdoc – dem Open-Access-Repositorium des FID</li>
  <li>Nachweis lizensierter E-Books und Datenbanken</li>
  <li>Chronologischer Nachweis aller gedruckten und elektronischen Neuerwerbungen</li>
  <li>Recherche in Fachbibliographien</li>
  </ul><br />
  Weitere Serviceleistungen von MENALIB sind:
  <ul>
  <li>News mit aktuellen redaktionellen Artikeln</li>
  <li>Hilfe beim Forschungsdatenmanagement (im Aufbau)</li>
  <li>Open-Access-Publizieren auf MENAdoc</li>
  <li>Bestellungen per Fernleihe oder Dokumente-Lieferdienst</li>
  <li>Digitalisierungswünsche</li>
  <li>Erwerbungsvorschläge</li>
  <li>Veranstaltungskalender</li>
  <li>Newsletter</li>
  </ul>
