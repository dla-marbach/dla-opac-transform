noteContent_mv: 'Die Bibliographie der deutschen Sprach- und Literaturwissenschaft Online (BDSL Online) verzeichnet vorrangig Sekundärliteratur zur germanistischen Literaturwissenschaft, die Sprachwissenschaft wird nur in Auswahl berücksichtigt. Außen vor bleiben auch Beiträge aus den Gebieten der Germanistik, die sich mittlerweile als eigenständige Fächer etabliert haben sowie Primärliteratur, sofern diese nicht in Ausgaben erscheint, die durch Kommentierung oder Begleittexten von besonderem Interesse sind. Ausgewertet werden Monographien, Sammelwerke sowie Print- und e-only-Zeitschriften, ein besonderes Augenmerk liegt dabei auf der grauen Literatur, die nicht im Buchhandel erhältlich ist (z.B. Privatdrucke oder Jahrbücher literarischer Vereinigungen). Online recherchierbar sind Publikationen ab dem Erscheinungsjahr 1985, jährlich kommen ca. 15.000 Titelaufnahmen hinzu. Aktuell sind rund 523.000 Titeldaten nachgewiesen (Stand: Februar 2023). Neben der Datenbank, die seit jeher auf dem germanistischen Sammelschwerpunkt der Universitätsbibliothek Frankfurt/Main gründet, besteht die traditionelle Buchausgabe weiter, die erstmalig 1957 im Klostermann Verlag erschienen ist und oftmals noch nach ihren Begründern Eppelsheimer-Köttelwesch genannt wird.'
