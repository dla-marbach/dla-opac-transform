noteContent_mv: |-
  Die vorliegende CD-Rom verfolgt die Entwicklung der Autobiographie vom 18. bis zum beginnenden 20. Jahrhundert. Sie bietet auf über 80.000 Bildschirmseiten rund 180 autobiographische Werke. Neben Schriftstellern kommen dabei Forscher, Ingenieure, Schauspieler, Künstler, Musiker, Industrielle und Politiker zu Wort, deren Lebensläufe Einblicke ins Private gewähren und zugleich wichtige Zeugnisse der Zeitgeschichte sind. Überdies dokumentiert die Auswahl, daß auch in gesellschaftlichen Randgruppen die Autobiographie immer wieder der Selbstbehauptung diente: in der Lebensbeschreibung von Frauen, Arbeitern, Sträflingen und politisch Verfolgten bis hin zu Daniel Paul Schrebers Denkwürdigkeiten eines Nervenkranken.<br />
