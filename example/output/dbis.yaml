    Das Personen-Wiki der SLuB wurde per 31.12.2016 als solches eingestellt und die Personendaten seitdem sukzessive in die <a href="http://swb.bsz-bw.de/DB=2.104/SET=1/TTL=1/START_WELCOME">Gemeinsame Normdatei - GND</a> eingestellt. Die bis dato verfügbaren Daten sind jedoch im Internet Archive eingespeist und dort weiterhin recherchierbar.
    <br />
