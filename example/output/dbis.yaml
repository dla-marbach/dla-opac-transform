noteContent_mv: "Die Stefan George-Bibliographie online ist als grundlegendes Recherchemittel für alle konzipiert, die zu Stefan George, dem George-Kreis und angrenzenden Forschungsfeldern arbeiten.<br>\r\n\r\nNachgewiesen werden sämtliche Veröffentlichungen der Werke und Übersetzungen Stefan Georges, die von George begründeten Zeitschriften und Reihen sowie eine große Sammlung der Werke der mit George in Verbindung stehenden Autoren. Weiterhin werden die Auseinandersetzung mit Stefan George und dem George-Kreis in der Presse, die Forschungsliteratur über Stefan George und den George-Kreis sowie Übersetzungen von Georges Werken in andere Sprachen erschlossen. Zudem sind in der Bibliographie die Titel aus Georges Bibliothek und Druckschriften aus den im Stefan George Archiv liegenden Nachlässen aus Georges Umfeld nachgewiesen.<br>\r\n\r\nDie Bibliographie ist damit auch Bestandverzeichnis der Druckschriften im Stefan George Archiv. Alle in der Datenbank verzeichnete Literatur ist im Stefan George Archiv oder in der Württembergischen Landesbibliothek vorhanden und kann vor Ort benutzt werden.\r\n<br> Umzug 2023 in den k10plus-Katalog. Bitte in der erweiterten Suche die entsprechende Datenbank auswählen."
