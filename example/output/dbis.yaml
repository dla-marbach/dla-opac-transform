filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Mit der Edition Briefe an Goethe. Gesamtausgabe in Regestform (RA) werden annähernd 20.000 Briefe, von denen mehr als 90% im Goethe- und Schiller-Archiv aufbewahrt werden, inhaltlich erschlossen und der Forschung  zugänglich gemacht. Briefregesten und dazu Personen- und Werkregister ermöglichen den Nutzern die rasche und gezielte Auswahl der für ihre jeweilige Fragestellung relevanten Briefe und führen zu den Handschriften und Druckorten hin. \r\n\r\nDas einzelne Regest vermittelt den sachlichen Gehalt des zugrunde liegenden Briefes. Es informiert in knapper, immanent erläuternder Form über die im Brief angesprochenen Themen, Personen und Werke. Die Regesten werden in chronologischer Folge präsentiert und sowohl in den Zusammenhang der Goetheschen persönlichen Korrespondenz gestellt als auch zueinander in Beziehung gesetzt.\r\n<br>\r\nBisher sind neun Regestbände erschienen und dazu ein Ergänzungsband zu den Bänden 1-5 mit je einem kumulierenden Briefschreiberverzeichnis und einem Register der erwähnten Personen, erstmals einem Goethe-Werkregister, einem allgemeinen Werkregister und einem Verzeichnis der Absendeorte. \r\n<br>\r\nDie vorliegenden Bände enthalten ca. 14.000 Regesten, das sind knapp 1.600 regestierte Briefe pro Band. Die Personenregister weisen mit zum Teil ausführlichen biographischen Informationen derzeit insgesamt etwa 16.000 historische Personen nach, die allgemeinen Werkregister insgesamt ca. 7.000 Titel von rund 3.100 Autoren und etwa 1.000 verfasserlose Werke. \r\n<br>\r\nKorrekturen und Ergänzungen werden in die Online-Version eingearbeitet.<br>\r\nStand: Oktober 2020"
