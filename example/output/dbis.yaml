noteContent_mv: Am 21. Oktober 1931 starb Arthur Schnitzler. In den 20 Monaten, die auf seinen Tod folgten, verfasste Clara Katharina Pollaczek, geborene Loeb, ihre Erinnerungen an das Kennenlernen in jungen Jahren und vor allem an die gemeinsame Zeit seit Februar 1923, während der sie seine zentrale Lebenspartnerin war. Sie fügte Briefe und Tagebucheinträge und teilweise auch andere Quellen zusammen und versah sie gelegentlich mit überleitenden Texten. Das Typoskript, für die postume Veröffentlichung vorgesehen, umfasst 990 von Schnitzlers Sekretärin Frieda Pollak getippte Seiten und blieb nach Clara Katharina Pollaczeks Tod am 22. Juli 1951 siebzig Jahre lang unveröffentlicht. Bis zur vorliegenden Publikation war es zwar der Forschung bekannt, konnte aber nur in ihrem Teilnachlass in der Wienbibliothek im Rathaus eingesehen werden. Hier wird eine digitale Ausgabe des Manuskripts in einer Rohfassung vorgelegt, die nur teilweise fehlerbereinigt ist.
