noteContent_mv: "<i>Women in Book History Bibliography</i>, herausgegeben von Cait Coker and Kate Ozment, verzeichnet Sekundärliteratur (Bücher, Buchkapitel, Aufsätze) zu Schriftstellerinnen und Frauen im Buchwesen mit dem Schwerpunkt Frühmoderne (1500 - 1800) in England und einem zusätzlichen Schwerpunkt USA. Darüber hinaus wird jedoch auch Literatur mit einem zeitlichen Bezug ab dem 11. Jahrhundert und einem geographischen Bezug zu anderen Ländern weltweit aufgeführt. <br /> \nDie Bibliographie verfügt über eine Suchfunktion mit der Möglichkeit, die Recherche über folgende Filter einzugrenzen: People, Locations, Languages,Publishers, Fields, Periods. Die Rechercheergebnisse sowie die gesamte Datenbank können exportiert werden.<br />\nDie Datenbank wird hinsichtlich Berichtszeitraum, geographischem Bezug und Sprache ständig erweitert."
