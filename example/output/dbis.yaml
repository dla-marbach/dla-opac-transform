noteContent_mv: 'In den letzten Jahren wurden von mehreren Forschungsprojekten biographische und literarische Dokumente von Arthur Schnitzler (1862–1931) digitalisiert und ediert. Diese Webseite versucht sich erstmals an einer projektübergreifenden Verlinkung dieser Materialien. Über eine einfache Benutzeroberfläche können Informationen zu jedem Tag von Schnitzlers (Erwachsenen-)Leben abgerufen werden. Derzeit sind insgesamt über 50.000 Daten aufgenommen. Arthur Schnitzler: Chronik ist ein Ausgangspunkt. Der eigentliche Nutzen der Webseite findet sich in den verlinkten digitalen Ressourcen, die es ermöglichen, umfassende Recherchen zum Leben und Werk Arthur Schnitzlers für jeden Tag seines Lebens durchzuführen.'
