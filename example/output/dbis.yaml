noteContent_mv: |-
  Das Österreichische Filmmuseum (ÖFM) beherbergt eine Reihe wichtiger Sammlungen, die das kulturelle Phänomen Film beleuchten und verständlich machen. Die Bibliothek des Filmmuseums ist die umfangreichste Filmfachbibliothek in Österreich.
  <br />
  Folgende Sammlungsbereiche sind online recherchierbar (Auswahl):
  <ul>
  <li> <b>Bibliothek / Buchsuche: </b> <br />
  Rund 28.000 Bücher zum Thema Film </li>
  <li> <b>Schriftgutsammlung:</b> <br />
  Materialien und Dokumente, die einen Film von Anfang an begleiten, z. B. Treatments, Drehbücher, Werbematerialien, Pressehefte, Filmkritiken, Zeitungsausschnitte etc. </li>
  <li> <b>Zeitschriftensammlung: </b><br />
  über 400 Filmzeitschriften in mehr als 20 Sprachen, mit gescanntem Cover </li>
  <li> <b>Sammlung Dziga Vertov:</b> <br />
  Umfangreichste Sammlung von Dziga Vertovs Filmen außerhalb Russlands, die zudem zahlreiche weitere Dokumente umfasst, z. B. schriftliche Originale, Fotos etc. </li>
  <li> <b>Schlemmer-Filmkadersammlung:</b> <br />
  Über 2.200 Filmkader und -fragmente, vor allem von Filmen aus den Jahren 1910 bis 1920 – viele dieser Filme gelten heute als verloren </li>
  </ul>
