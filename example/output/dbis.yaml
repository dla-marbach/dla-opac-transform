noteContent_mv: "Das Projekt Digitalisierung der Amtspresse Preußens ist Teil des ZEitungsinFormationsYStem (ZEFYS) der Staatsbibliothek zu Berlin. Als Faksimilie und recherchierbarer Volltext wird die auflagenstärkste und einflussreichste politischen Presse im letzten Drittel des 19. Jahrhunderts zur Verfügung gestellt. <br />Hierzu gehören:\r\n<ul>\r\n<li>Provinzial-Correspondenz (PC) (1863-1884)\r\n<br />und ihr Quasi-Nachfolger</li>\r\n<li>Neueste Mittheilungen (NM) (1882-1894)</li>\r\n<li>Teltower Kreisblatt (TK) (1856-1896).</li>\r\n</ul>\r\n\r\nZudem wurden die Zeitungen durch einen Sach-, Personen- und Ortsindex erschlossen und mit einem ausführlichen Sachkommentar zu ihrer Geschichte versehen."
