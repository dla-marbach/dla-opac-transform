displayAddition2: 1847-1900
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Die Stiftung Weimarer Klassik und Kunstsammlungen beabsichtigt, sämtliche derzeit bekannte überlieferte Briefe von und an Friedrich Nietzsche der internationalen Forschung in einem Verzeichnis im Internet zugänglich zu machen. Wesentlicher Bezugspunkt dafür ist die Kritische Gesamtausgabe des Briefwechsels von Friedrich Nietzsche (KGB). Das Verzeichnis geht aber über die bisher vorgelegten Bände dieser Gesamtausgabe hinaus. So bietet es auch Angaben zur Korrespondenz aus der Zeit nach dem Zusammenbruch Nietzsches bis zu seinem Tode. Es weist die Briefe von Franziska Nietzsche nach, die sie in den siebziger Jahren an Sohn und Tochter gemeinsam nach Basel geschrieben hat. Auch Stammbucheinträge und die sogenannten Urabschriften, die Elisabeth Förster-Nietzsche von angeblich später gestohlenen oder durch die Mutter vernichteten Briefen ihres Bruders anfertigte, werden verzeichnet, desgleichen Visitenkarten und Widmungen.<br>\r\nNachgewiesen werden Ausfertigungen, Dispositionen und Konzepte von Briefen sowie Abschriften, die für die Textüberlieferung der Briefe relevant sind. Auch Couverts sind erfasst. Zur leichteren Orientierung werden das Briefincipit und die Briefnummer der Kritischen Gesamtausgabe (KGB) mit dem jeweiligen Druckort mitgeteilt."
