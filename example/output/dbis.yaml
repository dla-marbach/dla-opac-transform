noteContent_mv: "Die <i>Library of Latin Texts</i>, hervorgegangen aus der <i>Cetedoc Library of Christian Latin Texts</i> (CLCLT), stellt die umfassendste Sammlung lateinischer Texte dar. Die Datenbank enthält Texte von den Anfängen der lateinischen Literatur (Livius Andronicus, 240 v. Chr.) bis zum 2. Vatikanischen Konzil (1962 - 1965); sie deckt sowohl die klassische Periode, als auch Werke der Kirchenväter, mittelalterliche lateinische Literatur oder auch Texte der Reformation und Gegenreformation ab; Texte aus <i>Corpus Christianorum / Series Latina</i> und <i>Continuatio Mediaevalis</i> sowie einer weiteren großen Anzahl von Ausgaben des <i>Corpus Scriptorum Ecclesiasticorum Latinorum</i>, der <i>Patrologia Latina</i>, der <i>Sources Chrétiennes</i> und der <i>Opera Sancti Bernardi</i>; <i>Biblia Sacra Vulgata</i> und die pseudepigraphischen Schriften des Alten Testaments sind verfügbar. \n<br />Verfügbar in folgenden Sprachen: Englisch, Französisch, Deutsch und Italienisch.\n<br />\n<b>Ab Februar 2015</b> neu hinzukommende Inhalte sind von der Nationallizenz <b>nicht mehr abgedeckt</b>."
