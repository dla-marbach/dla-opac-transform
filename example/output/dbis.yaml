noteContent_mv: "Das sogenannte <b>„Gaupresse“-Archiv Wien (Archiv des Gaupresse-Amtes der NSDAP-Gauleitung Wien)</b> ist im Wesentlichen eine Zeitungsausschnittsammlung der NSDAP-Gauleitung Wien, die in über 600 Kartons als Sondersammlung der Fachbereichsbibliothek Zeitgeschichte der Universität Wien gelagert ist und im Rahmen eines mehrjährigen Forschungsprojekts digitalisiert wurde. <br><br>\r\n\r\nDer Zugriff auf diese Lehrplattform steht grundsätzlich jedem ab Vollendung des 18. Lebensjahres offen, jedoch sind die Abfrage und Verwendung der Archivinhalte ausschließlich und nur für Zwecke des Unterrichts, der Lehre und der Forschung zulässig.<br><br>\r\n\r\nVor der Benutzung der Archivinhalte muss eine Registrierung durchgeführt und den Benutzungsbestimmungen zugestimmt werden. Die dabei erhobenen Daten (Vornamen, Nachname, Geburtsdatum, Anschrift, Organisation, E-Mail und Forschungszweck) werden vom Team der Forschungsplattform bearbeitet. Die Nutzung kann auch beschränkt oder untersagt werden."
