noteContent_mv: "Biblia Sacra ist ein Nachweisinstrument von Bibeldrucken aus dem Zeitraum 1477 bis 1800 aus den Niederlanden und aus Belgien. Berücksichtigung finden sowohl Ausgaben als auch einzelne Exemplare. Die Datenbank bietet ausführliche Beschreibungen unter buch- und druckgeschichtlichen Aspekten (Drucker, Typographie, Ikonographie, Verbreitung, Provenienzen, Einband; auch zur Text- und Editionsgeschichte)  sowie eine große Zahl digitaler Reproduktionen (mit Transkriptionen). Weiterhin wird Sekundärliteratur zu den einzelnen Drucken verzeichnet. \r\n<br>Der Zugriff auf die nachgewiesenen Drucke ist über eine einfache und eine erweiterte Suche sowie über eine Browsing-Struktur möglich; für Illustrationen ist auch eine Suche/ein Browsing über die IconClass-Klassifikation möglich."
