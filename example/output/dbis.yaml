noteContent_mv: "Die 2005 vom Verein für dänische Sprache und Literatur (DSL), der Carlsberg-Stiftung und dem dänischen Kulturministerium ins Leben gerufene Website bietet freien Zugriff auf folgende Nachschlagewerke:<br /><br />\r\n- Den Danske Ordbog (DDO): „Das Dänische Wörterbuch“ beschreibt den dänischen Wortschatz von 1955 bis heute und wird laufend aktualisiert. Es gibt Auskunft über die Schreibweise von Wörtern, deren Flexion, Aussprache, Herkunft, Bedeutung und Verwendung. Es basiert auf dem gleichnamigen zwischen 2003 und 2005 erschienenen Werk in sechs Bänden.<br /><br />\r\n- Ordbog over det danske Sprog (ODS): umfangreichstes Wörterbuch der dänischen Sprache, das die Sprachentwicklung von 1700-1950 behandelt. Es erschien zwischen 1918 und 1956 in 28 Bänden (inkl. der fünf nachfolgend erschienenen Supplement-Bände).<br /><br />\r\n- KorpusDK: enthält eine Große Anzahl an dänischen Texten (ca. 56 Mio. Wörter) speziell für linguistische Studien"
