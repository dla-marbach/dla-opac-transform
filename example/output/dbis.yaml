noteContent_mv: "Das Répertoire International dIconographie Musicale (RIdIM) ist ein internationaler Verbund zur Verzeichnung und Erschließung von Musik- und Tanzdarstellungen im Bereich der bildenden Kunst und des Kunsthandwerks. In der Datenbank zu Musik und Tanz in der Kunst der RIdIM Arbeitsstelle Deutschland werden\r\nv.a. Objekte aus größeren Museen, Sammlungen und Bibliotheken in Deutschland katalogisiert. \r\n<br>\r\nDie Erschließung der Kunstwerke in der Datenbank folgt formalen (Künstler, Titel, Entstehungsland, bzw. -ort, Technik, Datierung, besitzende Institution, Inventarnummer, etc.) und inhaltlichen Kriterien (allgemeine und musikalische Ikonographie, Musikinstrumente, allgemeine Beschreibung).<br>\r\nBegleitend zur Katalogisierung dokumentiert die Arbeitsstelle die katalogisierten Objekte mit Bildreproduktionen."
