noteContent_mv: Das Historische Werbefunkarchiv (HWA) der Universitätsbibliothek Regensburg stellt eine einzigartige Sammlung von Werbefunksendungen aus den Jahren 1948 bis 1987 dar. Mit rund 50.000 Radiospots unterschiedlicher Marken wie Alete, Bärenmarke, HB, Maggi, Persil, Thomy, Sarotti, Zentis und vielen anderen gilt es als eines der größten deutschsprachigen Werbefunkarchive. Die Datenbank enthält alle zu den Werbespots verfügbaren Angaben (wie z. B. Marke, Produktgruppe, Produktionsjahr, Firma, Sprecher, Musiktitel usw.) und bietet eine einfache sowie eine erweiterte Suchmaske an. Browsen nach Marke, Produktgruppe und Produktionsjahr ist ebenfalls möglich. Inzwischen wurde auch die Werbeschallplattensammlung des privaten Sammlers Christian Spremberg aufgenommen. Zum Anhören der Spots können wissenschaftliche Nutzer sich kostenlos online registrieren.
