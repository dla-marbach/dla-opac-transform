noteContent_mv: "Der Eppelsheimer-Köttelwesch, wie die Bibliographie \nverkürzt nach ihren Begründern genannt wird, legt den \nSchwerpunkt auf Literaturwissenschaft, der Bereich \nSprachwissenschaft wird nur in Auswahl berücksichtigt; \nsie erschließt vor allem die internationale \ngermanistische Sekundärliteratur (Monographien, \nZeitschriftenaufsätze, Rezensionen, Festschriften); \nPrimärtexte sind nur verzeichnet, soweit sich die \nSekundärliteratur des Berichtszeitraums auf sie bezieht; \ndie Bibliographie ist nicht nur Titelnachweis, sondern zugleich auch Bestandsnachweis (ohne Signaturangabe) der Universitätsbibliothek Frankfurt a.M. <br />\n<a href=\"http://www.ub.uni-frankfurt.de/bdsl/bdsl-start.html\">Weitere Informationen</a>. \n<p>\nDer <b>freie Zugang</b> zu BDSL online umfasst derzeit die <b>Berichtsjahrgänge 1985 - 2010</b>, d.h. die jeweils letzten zehn Jahrgänge sind nur für Abonnenten der Lizenzausgabe zugänglich. Online-Abonnenten haben Zugriff auf den gesamten Datenbestand ab 1985 ff.</p>"
