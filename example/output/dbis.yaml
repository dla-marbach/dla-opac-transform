noteContent_mv: |-
  Die diesem Projekt zugrundeliegenden Karten stammen aus dem “Kleinen Bayerischen Sprachatlas“. Er ist 2006 im dtv-Verlag München erschienen und bietet mit mehr als 120 Karten und dazugehörigen Kommentaren einen wissenschaftlich fundierten und dennoch auch für den Laien verständlichen Überblick über die Vielfalt der Dialekte Bayerns. Dieser Atlas beruht wiederum auf dem Material von sechs Sprachatlanten, die als wissenschaftliche Grundlagenwerke (ab 1984) an den germanistisch-sprachwissenschaftlichen Lehrstühlen der Universitäten Augsburg, Bayreuth, Erlangen, Passau und Würzburg erarbeitet wurden. <br /><br />
  Basis für diese Atlanten sind jeweils einwöchige Aufnahmefahrten zu ca. 1.600 Orten in ganz Bayern, die aus jedem Ort ein vergleichbares Datenmaterial von mindestens 2.300 in phonetischer Schrift festgehaltenen Dialektsequenzen erbracht haben. <br /><br />
  Die für den Sprechenden Sprachatlas von Bayern verwendeten Tondokumente aus 70 Orten wurden 2006 neu aufgenommen und aufbereitet.<br /><br />
  Der  Sprachatlas wurde bis zum Jahresende 2020 von der Bayerischen Staatsbibliothek bereitgestellt und steht seit 2021 über das Portal “Dialekte und regionale Kultur“ des Staatsinstituts für Schulqualität und Bildungsforschung (ISB) zur Verfügung.
