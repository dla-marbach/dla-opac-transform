noteContent_mv: |-
  VERBAALPINA widmet sich dem Sprach- und Kulturraum der Alpen. Ausgewählte und für diese Gebirgsregion typische Begriffe und deren dialektale Bezeichnungen werden systematisch erfasst und mit innovativen informatischen Methoden analysiert und präsentiert. Das zu analysierende Sprachmaterial stammt zum einen aus Sprachatlanten und georeferenzierten Wörterbücher und soll mit Hilfe von Bürgerbeteiligung ausgeglichen, ergänzt und korrigiert werden. <br />
  Das an der Ludwig-Maximilians-Universität München angesiedelte Projekt wird in einer Kooperation des Instituts für Romanische Philologie mit der IT-Gruppe Geisteswissenschaften (<a href="http://www.itg.uni-muenchen.de/">LMU Center for Digital Humanities</a>) durchgeführt und ist im Kontext der Digital Humanities (DH) angesiedelt. VERBAALPINA wird seit Oktober 2014 – mit einer Perspektive bis 2025 – von der DFG gefördert.
