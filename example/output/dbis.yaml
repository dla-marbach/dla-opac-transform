noteContent_mv: "Von 2013-2016 untersuchte das mediävistische Teilprojekt des Sonderforschungsbereiches 1015 Muße an der Universität Freiburg Paradoxien der Muße im Mittelalter.\r\nNeben der vor allem auf inhaltlich-konzeptionelle Überlegungen gerichteten Arbeit zur höfischen Literatur um 1200 und religiösen Literatur des 14. Jahrhunderts entstanden parallel Sondierungen zur Historischen Semantik von mhd. muoze. Dabei wurde das Wortfeld um muoze und müezecheit - und damit einhergehend die Semantisierung von Gegen- und Nachbarphänomenen wie arbeit, gelâzenheit, abegescheidenheit oder auch lat. acedia - erkundet. Der untersuchte Zeitraum reicht vom Althochdeutschen bis zum Frühneuhochdeutschen (8.-16. Jahrhundert). Dabei hat sich gezeigt, dass die jeweiligen Verwendungskontexte der Wörter ganz unterschiedliche, mitunter auch gegensätzliche Wertungen implizieren.\r\nGeboten werden unter anderem einschlägige Literaturzitate zu den einzelnen Lemmata in Original und neuhochdeutscher Übersetzung sowie Kommentare dazu. Die Texte stehen als PDF-Dateien zum Download zur Verfügung."
