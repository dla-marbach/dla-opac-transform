noteContent_mv: "Die Ramon Llull-Datenbank (Llull DB) ist eine elektronische Bibliographie, die darauf abzielt, die Suche nach allen Informationen zum Lullian- oder Pseudo-Lullian-Opus zu systematisieren und zu erleichtern. Es wurde von Anthony Bonner erstellt und von einer Gruppe von Mitarbeitern entwickelt, hauptsächlich aus dem Institut für katalanische Philologie und der Bibliothek der Universität Barcelona, an der verschiedene Institutionen teilnahmen.</br>\r\nDie Datenbank enthält fast vollständige Informationen zu den 265 authentischen lullianischen Werken sowie noch unvollständige und / oder vorläufige Informationen zu anderen ihm fälschlicherweise zugeschriebenen Werken wie den 150 pseudo-lullianischen alchemistischen Werken und 270 falschen Werken zu einer Vielzahl anderer Themen.</br> Die Datenbank liegt sowohl in katalanischer als auch in einer englischen Sprachversion vor."
noteRequirements_mv:
  - Die Llull-Datenbank ist eine vernetzte Ressource, für die eine vorherige kostenfreie Registrierung erforderlich ist.
schemaVersion: 0.16.0
