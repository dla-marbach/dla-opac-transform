noteContent_mv: Sie finden hier ein mehrsprachiges Wörterbuch für Mongolisch mit tibetischen und Sanskrit-Äquivalenten. Dieses Wörterbuch integriert mehrere Wörterbücher wie Koalewski, Lessing, etc. und hat derzeit ca. 71.000 Einträge. Das Wörterbuch wurde in erster Linie für die Lektüre des mongolischen Kanjur erstellt, d.h. für Texte in traditioneller uigurischer Schrift, in denen die diakritischen Zeichen nicht markiert sind (Unterschiede zwischen q und γ, etc.), so dass diese Besonderheiten in die Suchmaschine integriert wurden, um die Suche nach einem Begriff zu erleichtern.
