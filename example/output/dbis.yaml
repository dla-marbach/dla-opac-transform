noteContent_mv: Jedes Jahr kann die Akademie der bildenden Künste Wien in allen Studienrichtungen auf eine wachsende Zahl von Absolventinnen und Absolventen blicken, die mit ihrem Studienabschluss das Haus verlassen und hoch qualifiziert auf neue Berufs- und Lebenswege zusteuern. Die Dokumentation der Abschlussarbeiten bietet einen repräsentativen Einblick in die Arbeit, die Studierende hier am Hause geleistet haben und in welcher Form sie an der Entwicklung und Erschließung der Künste und Wissenschaften mitgewirkt haben. Durch die Umstellung der Dokumentation auf eine Mediendatenbank können wir nicht nur mehr Raum für Informationen bieten, sondern auch ein sukzessiv ergänzbares und wachsendes Archiv entwickeln. Die Erfassung der Arbeiten orientiert sich nicht nur an den akademischen Strukturen sondern auch an den Medien, den Inhalten oder Themen, die darin reflektiert werden. In diesem Sinne kann gleichermaßen nach Personen und Arbeiten wie nach inhaltlichen Fragestellungen gesucht werden.
