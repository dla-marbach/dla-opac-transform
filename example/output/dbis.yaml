noteContent_mv: "Die Bibliographie weist internationale und interdisziplinäre Literatur zu den von Herwarth Walden 1910-1932 herausgegebenen expressionistischen Zeitschriften Der Sturm und die Sturm-Bühne nach. Darüber hinaus enthält sie die Nachweise der Sturm-Bücher und zu Büchern aus dem Verlag Der Sturm. Die Datensammlung entsteht beim Stuttgart Research Centre for Text Studies (SRCTS) in Kooperation mit der Stuttgarter Akademie der Künste. Die Datenbank wird von der UB Heidelberg im Rahmen des DFG-Projektes arthistoricum.net - Fachinformationsdienst Kunst betrieben und befindet sich weiter im Aufbau. \nErgänzende Publikationen können per Mail nachgemeldet werden. Suchbar sind u.a. Verfasser und Titel sowie Schlagwörter aus dem kontrollierten Vokabular der \nGemeinsamen Normdatei (GND) mit denen die erfassten Publikationen erschlossen sind. Weitere Suchmöglichkeiten sind die Sprache einer Publikation sowie der Datenträger (Aufsatz, Buch, Online-Ressource u.a.). Browsing-Einstiege für die Verfasser- und Themensuche stehen ebenso zur Verfügung wie eine Übersicht der Suchtipps."
