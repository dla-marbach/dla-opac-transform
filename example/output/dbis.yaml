noteContent_mv: Am StifterHaus, Zentrum für Literatur und Sprache in Oberösterreich, entsteht eine neue, zeitgemäße Literaturgeschichte Oberösterreichs. Sie möchte Daten, Fakten und Perspektiven zur literarischen Entwicklung der Region im Kontext überregionaler Einflüsse und Verbindungen zusammenfassen und darstellen. Die laufend ergänzten „Stichwörter zur oö. Literaturgeschichte” berücksichtigen Personen, Werke, Orte und Themen und führen Primär- und Sekundärliteratur in Auswahl an.
