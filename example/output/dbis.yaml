noteContent_mv: "<i>Kulturpool</i> versteht sich als zentrales Übersichts- und Suchportal für das digitalisierte österreichische Kulturerbe und ermöglicht einen übergreifenden Zugang zu den digitalisierten Beständen von Museen, Bibliotheken und Archiven. \n<br /><br />\nMit Stand Juli 2022 sind die folgenden Kulturinstitutionen beteiligt: <br />\n<ul>\n<li>Albertina</li>\n<li>Ars Electronica Archive</li>\n<li>Belvedere</li>\n<li>GrazMuseum</li>\n<li>IMAREAL - Institut für Realienkunde des Mittelalters und der Frühen Neuzeit, Krems an der Donau</li>\n<li>Uni Graz</li>\n<li>KHM - Kunsthistorisches Museum Wien</li>\n<li>Landessammlungen Niederösterreich </li>\n<li>Museumsmanagement Niederösterreich</li>\n<li>MAK - Österreichisches Museum für Angewandte Kunst / Gegenwartskunst</li>\n<li>MOM - Archive Mitteleuropas</li>\n<li>NHM - Naturhistorisches Museum Wien</li>\n<li>Niederösterreichische Landesbibliothek</li>\n<li> ÖAW - Österreichische Akademie der Wissenschaften</li>\n<li>Österreichische Mediathek (OeM)</li>\n<li>Volkskundemuseum Wien</li>\n<li>Österreichische Nationalbibliothek </li>\n<li>Salzburger Volks.kultur</li>\n<li>Theatermuseum</li>\n<li>Universität Wien, Universitätsbibliothek</li>\n<li>Vorarlberger Landesmuseumsverein</li>\n<li>Vorarlberger Landesbibliothek</li>\n<li>Weltmuseum Wien</li>\n<li>Wienbibliothek im Rathaus</li>\n<li>Wien Museum </li>\n</ul>\n<br />\nEs ist geplant, weitere Institutionen mit ihren digitalen Beständen in den Kulturpool aufzunehmen.<br />\nDer Kulturpool dient als zentraler Datenlieferant digitalen österreichischen Kulturerbes für die <b>Europäische Digitale Bibliothek Europeana</b>."
