  Ziel des von der <a href="http://www.fritz-thyssen-stiftung.de/">Fritz-Thyssen-Stiftung</a> finanzierten Projekts <i>Wielands virtuelle Bibliothek</i> ist es, die Privatbibliothek Christoph Martin Wielands (1733-1813) zu rekonstruieren und digital verfügbar zu machen. Das seit August 2014 laufende Projekt schließt damit an die physische Rekonstruktion an, die seit vielen Jahren vom <a href="http://www.wieland-museum.de/index.htm">Wieland-Museum Biberach</a> betreut wird. Seit Anfang 2016 steht nun eine virtuelle Version dieser bedeutenden Privatbibliothek in einer Betaversion zur freien Verfügung. Als Hauptquelle dient dabei der Versteigerungskatalog Verzeichniß der Bibliothek des verewigten Herrn Hofraths Wieland von 1814 [=WB 1814], der 1993 im Alphabetischen Verzeichnis der Wieland-Bibliothek von Bauch und Schröder [=BS] bibliographisch aufgelöst und alphabetisch nach Verfassern sortiert wurde.<br />
  Die Daten aus diesen beiden Verzeichnissen werden in der virtuellen Bibliothek eingehend erfasst und um weitere Informationen wie beispielsweise die Archiv-Nummer im Wieland-Museum Biberach oder den bei der Versteigerung
  erzielten Erlös ergänzt. Über einen externen Link ist der jeweilige Titel in einem auflagegleichen Digitalisat (sofern vorhanden) abrufbar.<br />
  Ein zentrales Anliegen des Projekts ist es, den Bestand zum ersten Mal inhaltlich zu erschließen, um so der Forschung einen differenzierten Zugang zu erlauben. Eine besondere Herausforderung bei der Kategorisierung bestand darin, der Komplexität von Wielands Bibliothek als Dichter- und Gelehrtenbibliothek gerecht zu werden und gleichzeitig die historische Wissensordnung des 18. Jahrhunderts zu berücksichtigen. Gängige Klassifikationen wurden daher miteinander verknüpft und dort, wo es erforderlich schien, noch genauer differenziert.
