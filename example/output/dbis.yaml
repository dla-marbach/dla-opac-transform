noteContent_mv: "Die für den böhmischen und deutschen König Wenzel IV. um 1390–1400 angelegte Wenzelsbibel ist eine der bedeutendsten Handschriften der Österreichischen Nationalbibliothek. Sie bietet die erste eigentliche, d.h. programmatisch nach dem Wort-für-Wort-Prinzip angelegte deutschsprachige Übersetzung der hebräischen Bibel nach der lateinischen Vulgata, verbunden mit einem aufwändigen und künstlerisch höchst wertvollen Illustrationsprogramm.\r\nDas Projekt zielt auf eine erstmalige digitale Gesamtedition und Analyse. Sie soll zunächst ein Faksimile, eine Transkription und Edition des Gesamttextes sowie eine systematische Untersuchung des Bildprogramms und der Text-Bild-Korrelation bieten. Langfristig sollen mit der Edition im Endausbau zusätzlich eine Synopse und Konkordanz mit der lateinischen Vulgata erstellt werden."
