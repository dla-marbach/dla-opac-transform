  <li>Der Comic ist bzw. war in gedruckter Form erhältlich.
  </li><li>Der Comic muss zumindest semiprofessionellem Standard entsprechen.</li>
  <li>Es handelt sich um Bildbände oder Fachliteratur über Comics (Sekundärliteratur).</li>
  </ul>
