filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: Die Open Memory Box ist eine Sammlung von digitalisierten privaten Schmalfilmen aus der ehemaligen DDR. Die Aufnahmen halten besondere Momente wie Familienfeiern, Urlaub oder Heirat und Szenen aus dem Alltagsleben der DDR-Bürger und Bürgerinnen fest, dokumentieren aber auch den Blick der Privatpersonen auf öffentliche Ereignisse wie Paraden und Festtage.<br /><br />Die Sammlung umfasst 2.283 Rollen 8mm Filmmaterial mit einer Gesamtlänge von 415 Stunden aus dem Zeitraum 1947 bis 1990. Die Filme stammen von 149 Familien aus 102 Orten. Das Archiv ist ohne Registrierung online zugänglich und nach 2.700 Schlagworten durchsuchbar. Der Bereich Anti-Archiv ermöglicht einen assoziativen Zugang durch thematische automatisch generierte Filmmontagen aus zwei Sekunden langen Filmsequenzen. Der Bereich Geschichten ergründet zu ausgewählten Filmausschnitten im Gespräch mit den Privatfilmern und -filmerinnen oder deren Familienangehörigen die Geschichte hinter den Bildern.<br /><br />Die Open Memory Box und ihre innovative visuelle Präsentation wurde von Alberto Herskovits und Laurence McFalls konzipiert und wird von Altofilm AB betrieben. Sie ist Projektpartner des BMBF geförderten Verbundprojekts <a href="https://dbis.uni-regensburg.de/resources/105516">„Das mediale Erbe der DDR“</a> (Laufzeit 2019 bis 2022) und hier am Teilprojekt des ZZF angesiedelt. In diesem Zusammenhang entstanden und entstehen im Auftrag des ZZF zehn Filme für die Open Memory Box, in denen beteiligte Zeitzeugen die dafür neu komponierten Schmalfilme kommentieren.
