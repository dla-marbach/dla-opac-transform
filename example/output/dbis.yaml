filterType_mv: Daten
noteContent_mv: "Das Deutsche Wörterbuch enthält in alphabetischer Ordnung den in der neuhochdeutschen Schriftsprache von der Mitte des 15. Jahrhunderts bis zur Gegenwart gebräuchlichen Wortschatz einschließlich der aus anderen Sprachen in das Deutsche entlehnten Wörter. Das Wörterbuch gibt die Etymologie sowie die Formen der Wörter an und beschreibt die landschaftliche Verbreitung innerhalb des deutschen Sprachgebietes. Soweit die jeweilige Wortgeschichte sie überliefert, werden auch die vorneuhochdeutschen Verwendungsweisen der Wörter, d. h. des mittelhochdeutschen und des althochdeutschen Zeitraums, bis zu den frühesten Bezeugungen in die Darstellung einbezogen.\r\n<br /><br />\r\nDie Digitalisierung des gedruckten Werkes mit über 350.000 Eintragungen wurde entwickelt im Fach Germanistik der Universität Trier in Zusammenarbeit mit dem          Kompetenzzentrum  für elektronische Erschließungs- und Publikationsverfahren in den Geisteswissenschaften und gefördert durch die DFG im Rahmen des Programms Retrospektive Digitalisierung von Bibliotheksbeständen.\r\nDie Arbeiten sind noch nicht gänzlich abgeschlossen, so sind unter anderem das Quellenverzeichnis und die Suchmaske noch nicht verfügbar."
