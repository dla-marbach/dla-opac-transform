noteContent_mv: |-
  WALS ist eine umfangreiche Datenbank struktureller Eigenschaften (z.B. phonologische, grammatikalische, lexikalische) von Sprachen, die von einem Team aus über 40 Autoren aus deskriptiven Materialien wie z.B. Referenzgrammatiken erstellt wurde.
  <br />
  WALS besteht aus 141 Landkarten mit Begleittexten zu verschiedenen Eigenschaften wie z.B. Vokalinventar, Passivkonstruktionen, Polysemie, die jeweils von einem verantwortlichen Mitarbeiter verfasst sind. Jede Karte zeigt zwischen 120 und 1.100 Sprachen, dargestellt durch Symbole, die wiederum je nach dem erhobenen Wert in der Größe variieren können.Insgesamt werden 2.650 Sprachen auf den Karten dargestellt und über 58.000 Werte zu den Eigenschaften einzelner Sprachen werden geboten.
