noteContent_mv: Die Stanford Encyclopedia of Philosophy (SEP)wurde 1995 als dynamisches Nachschlagewerk begründet, dynamisch deshalb, weil die vorhandenen  Artikel fortlaufend aktualisiert und ständig Artikel zu neuen Begriffen ergänzt werden.  Sie gilt als eines der besten frei zugänglichen philosophischen Internet-Lexika. Hauptherausgeber ist Edward N. Zalta von der Stanford University; er wird von einem Stab namhafter Fachwissenschaftler unterstützt  Alle Einträge, sowohl zu Personen als auch zu Sachbegriffen, werden von Fachwissenschaftlern erstellt und von den Herausgebern im peer-review-Verfahren vor der Veröffentlichung geprüft. Die SEP verfügte im Juli 2015 über rund 1500 Artikel.
