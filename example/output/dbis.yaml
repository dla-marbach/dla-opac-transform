noteContent_mv: "Das Jewish News Archive enthält mehr als 250.000 englischsprachige Artikel der Jewish Telegraphic Agency (JTA) aus dem Zeitraum ab den 1920er-Jahren ff., darunter auch Nachrufe jüdischer Personen des öffentlichen Lebens. Ursprünglich 1917 in den Vereinigten Staaten als „Jewish Correspondence Bureau“ gegründert, berichtet die JTA über Themen, die die jüdische Gemeinde weltweit interessiert. Sie zählt u. a. die Zeitungen Forward, Jüdische Allgemeine und das Schweizer Wochenmagazin Tacheles zu ihren Abnehmern.<br /><br />\r\nDie Presseagentur mit Sitz in New York bezeichnet sich selbst als neutrales Non-Profit-Unternehmen, die keinem Zweig des Judentums besonders verbunden ist. In ihrem Vorstand sind repräsentativ Vertreter aller Ausprägungen der jüdischen Religion und des Zionismus vertreten.<br /><br />\r\nDie Artikel liegen im HTML-Format vor, können ausgedruckt und als Digitalisat im PDF-Format abgespeichert werden. Neben der Volltextsuche kann man Artikel nach Publikationsjahr oder Thema durchstöbern. Eine Suche nach Artikelautor steht für Meldungen ab 1977 zur Verfügung."
