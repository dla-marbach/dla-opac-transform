noteContent_mv: "Die Werke, der Briefwechsel und der handschriftliche Nachlass Immanuel Kants als elektronisch gespeicherter Datensatz. Die Daten entsprechen weitgehend den ersten drei Abteilungen, also den Bänden 1-23, der Akademie-Ausgabe von Kants Schriften.<br>Das Korpus befindet sich in fortlaufender Bearbeitung: In der Kantforschung, besonders im Rahmen einer möglichen Neubearbeitung der Akademie-Ausgabe anfallende Änderungen werden eingearbeitet und dokumentiert. Hierzu gehören insbesondere Textkorrekturen, Vorschläge für Lesarten, Änderungen und Ergänzungen in den Anmerkungs- und Kommentarteilen sowie Einfügungen und Umstellungen ganzer Textstücke gemäß den Fortschritten der Editionsarbeit. Kodierungsfehler werden, sobald sie auffallen, korrigiert.\r\n<br>Die Werke können im Volltext durchsucht werden.\r\n<br>Die Bereitstellung Immanuel Kants Gesammelten Werken in elektronischer Form wurde von der Deutschen Forschungsgemeinschaft (DFG) gefördert."
