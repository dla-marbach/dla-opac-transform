  <li>Besitzende Institution / Datengeber</li>
  <li>Objekttypen</li>
  <li>Projekte, Sammlungen, Themen</li>
  <li>Personen / Institutionen</li></ul>
  Die in der Datenbank enthaltenen Digitalisate sind vielfältig indexiert. Texte liegen z.T. im Original und in der Transkription vor, Bilder werden genau beschrieben, Personendaten sind mit den entsprechenden GND-Datensätzen angereichert und normiert worden.
