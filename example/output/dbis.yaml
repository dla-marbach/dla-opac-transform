noteContent_mv: |-
  Das sozialdemokratische Wochenblatt „Burgenländische Freiheit“ wurde 1921 gegründet und 2009 eingestellt. Das digitale BF-Archiv.at macht alle Ausgaben der „Burgenländischen Freiheit“ von April 1922 bis 2007 online zugänglich.<p>

  In der <i>Archivsuche 1922 – 2007”</i> kann nach Jahr, Monat bzw. Nummer einer Ausgabe recherchiert werden, aus der Ergebnisliste ausgewählt und in der jeweiligen Zeitungsnummer digital geblättert werden.<br />
  Die <i>„Volltextsuche 1922 – 2007“</i> ist nur für angemeldete BenützerInnen möglich. Die Anmeldung ist ebenfalls kostenfrei.</p><p>

  Außerdem können Texte zur Geschichte des Burgenlands ab dem Jahr 1919 und zur Geschichte der „Burgenländischen Freiheit“ sowie die besten Bilder und Titelblätter der Wochenzeitung abgerufen werden.</p>
