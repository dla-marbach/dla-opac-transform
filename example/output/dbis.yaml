noteContent_mv: Die Bibliothèque Publique et Universitaire Neuchâtel begann in den 50-er Jahren, die Exlibris aus alten und modernen Werken der Bibliothek zu verzeichnen. Vermehrt durch Gaben von Sammlern wie North, Clottu und Röthlisberger hat sich der Bestand Schritt für Schritt vergrößert und ist heute bei einigen Tausend Exemplaren unterschiedlicher Herkunft angelangt. Exlibris aus Neuchâtel bilden den größten Teil des Bestandes, man findet aber auch Stücke aus der Schweiz und aus dem Ausland. Die vor kurzem dazugekommenen Spenden des Neuchâteler Stechers Claude Jeanneret und des berühmten Heraldikers Michel Jéquier-Gélibrand, die einige Hundert Exlibris umfassen, vermehren die Sammlung.
