noteContent_mv: Der Codex Manesse - auch Große Heidelberger Liederhandschrift genannt - gehört zu den kostbarsten Handschriften der Universitätsbibliothek Heidelberg. Die Datenbank Bibliographie Codex Manesse bietet Zugang zur interdisziplinären Forschungsliteratur, die sich mit der Handschrift beschäftigt. (Teil-)Editionen finden sich hier ebenso wie Nachweise von Publikationen zu historischen, philologischen oder kunsthistorischen Fragestellungen. Die bibliographische Datenbank wird von der UB Heidelberg betrieben, zu ergänzende Publikationen können per Mail nachgemeldet werden. Recherchierbar sind u.a. Verfasser und Titel sowie Schlagwörter aus dem kontrollierten Vokabular der Gemeinsamen Normdatei (GND) mit denen alle erfassten Publikationen erschlossen sind. Browsing-Einstiege für die Sprache einer Publikation sowie den Datenträgertyp (Aufsatz, Buch, Online-Ressource u.a.) stehen ebenfalls zur Verfügung.
