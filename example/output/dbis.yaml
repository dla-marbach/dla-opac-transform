noteContent_mv: "Die Mundart des Pinzgaues (Land Salzburg / Österreich) zeigt zwischen den Gebieten Mitterpinzgau, Oberpinzgau, Lofer und Taxenbach Eigenheiten in der Aussprache und teilweise auch in den Wortbedeutungen. Dieses Projekt ist mit seinem Wortschatz und der Aussprache repräsentativ für die Talschaften Leogang, Maria Alm und Saalbach sowie die Orte Maishofen und Saalfelden.\r\n\r\nDa die Mundart in schriftlicher Form nur annähernd wiedergegeben werden kann, wurden alle Worte von Dr. Schwaiger persönlich vertont und können online in alphabetischer Sortierung nach Mundart, Hochdeutsch und nach Sachgebieten abgefragt werden. Zusätzlich bietet eine Volltextsuche den direkten Einstieg in das Lexikon."
