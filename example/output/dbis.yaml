  Die Website "Library Buildings in Europe" zeigt Beispiele für gute und interessante Bibliotheksgebäude in ganz Europa. dort findet sich eine Zusammenstellung von neuen oder renovierten Bibliotheksbauten für Bibliothekare, Architekten oder andere Fachkräfte.

  Ziel ist es, jeden zu inspirieren und zu unterstützen, der an einem Bibliotheksgebäudeprojekt arbeitet - ein neues Gebäude, eine Erweiterung, eine Renovierung oder eine Überarbeitung von Innenräumen. Die Vielzahl von Fallstudien ermöglicht es denjenigen, die an solchen Projekten beteiligt sind, neue Trends aufzunehmen, Wissen und Erfahrungen auszutauschen und miteinander zu lernen und miteinander in Kontakt aufzunehmen.

  Mitglieder der Liber Architecture Group (Liber LAG) freuen sich, dieses Projekt als Instrument zur Förderung innovativer Ideen und neuen Ansätze zur Veränderung des Bibliotheksmodells im 21. Jahrhundert anzubieten.
