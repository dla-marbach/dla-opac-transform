noteContent_mv: |-
  Die Edition präsentiert nahezu alle bedeutenden Werke der klassischen deutschen Literatur und ist damit die mit großem Abstand umfangreichste Sammlung literarischer Texte im deutschen Sprachraum.<br />
  Für jeden der etwa 100 Autoren wird neben einer Textauswahl auch eine biographische Zeittafel sowie in vielen Fällen ein Porträt geboten.<br />
  Abgedeckt ist der Zeitraum von der Aufklärung bis zur Moderne (1749 - 1924).<br />
  Es wird nicht angestrebt, alle lesenswerten Texte des Zeitraumes, sondern eine repräsentative Auswahl daraus anzubieten. Zum Textbestand gehören fast alle bedeutenden Dramen, Romane und Erzählungen der klassisch gewordenen deutschen Literatur, das Werk der namhaftesten Lyriker und eine repräsentative Auswahl von Essays und autobiographischen Schriften.<br />
  Nicht enthalten sind Briefe, Tagebücher und naturwissenschaftliche Abhandlungen. <br />
  (Digitale Bibliothek ; 1)
