noteContent_mv: |-
  Frei zugängliche Textsammlung, die wichtige Texte aus der Judaistik in hebräischer und englischer Sprache in digitalisierter Form zur Verfügung stellt.

  Sefaria ist eine digitale Bibliothek mit kostenlosen Inhalten jüdischer Texte. Sie wurde 2011 vom ehemaligen Google-Projektmanager Brett Lockspeiser und dem Journalisten-Autor Joshua Foer gegründet. Sefaria nennt sich selbst eine lebendige Bibliothek der Tora und verlässt sich auf Freiwillige, um Texte und Übersetzungen hinzuzufügen. Die Seite bietet Querverweise und Verbindungen zwischen verschiedenen Texten. Hebräische, aramäische und jüdisch-arabische Texte werden unter einer kostenlosen Lizenz im Original und in Übersetzung bereitgestellt. Die Website bietet auch ein Tool zum Erstellen von Quellensammlungen. Eine API zur Nachnutzung der Texte und eine App für iOS und Android stehen zur Verfügung. Sefaria ist eine gemeinnützige Organisation.
