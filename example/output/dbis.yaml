noteContent_mv: "Das Judaica-Portal (bis 2020 unter dem Namen Judaica-Portal Berlin-Brandenburg) ist eine Meta-Suchmaschine, die die Recherche in verschiedenartigen Datenbanken nach Literatur zum Thema Judentum mithilfe einer einzigen Abfrage seit 2017 ermöglicht. Abgefragt werden die Kataloge von Bibliotheken, bibliographischen Datenbanken sowie Repositorien. Zur Zeit kann in den Beständen der meisten Bibliotheken mit Judaica-Beständen in Berlin, dem Land Brandenburg und Hamburg zum Thema recherchiert werden. Zudem ist der Artikelindex RAMBI der Israelischen Nationalbibliographie integriert, der ca. 440.000 Artikel zum Thema Judentum nachweist. Ebenso kann in den Digitalen Sammlungen Judaica der Universitätsbibliothek Frankfurt/Main (u.a. mit Compact Memory für jüdische Zeitschriften) recherchiert werden.\r\n\r\n(Stand der Information: Februar 2020)"
