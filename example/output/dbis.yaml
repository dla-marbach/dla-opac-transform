displayName: Directmedia Publishing GmbH, Berlin
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Die Anthologie setzt ein mit den Fastnachtsspielen und Geistlichen Spielen des beginnenden 16. Jahrhunderts und schließt mit Vertretern des literarischen Impressionismus und Symbolismus wie Hugo von Hofmannsthal und Arthur Schnitzler. Die nachfolgenden und teilweise gleichzeitigen Strömungen des Expressionismus oder Dadaismus sind nur noch beispielhaft durch einzelne Autoren wie Hugo Ball, Hans Kaltneker oder August Stramm vertreten. Diese Beschränkung und der Endpunkt des gewählten Zeitraums liegen im geltenden Urheberrecht begründet. Es konnten nur jene Autoren und Autorinnen aufgenommen werden, die vor mehr als 70 Jahren verstorben sind, deren Werk also gemeinfrei ist.<br />
  Von den spätmittelalterlichen Kirchenspielen bis zu expressionistischen Dramen sind neben den Klassikern der Bühnendichtung auch Stücke weniger bekannter Autoren sowie Schwänke, Satiren, Einakter, Lokalpossen, dramatische Gedichte, Mundartstücke, Schul- und Lesedramen, Puppen- und Zauberspiele enthalten.<br />
  Die CD-ROM enthält rund 500 Stücke von über 170 Schriftstellern und bietet einen umfassenden Einblick in die Vielfalt der dramatischen Literatur.<br />
  (Digitale Bibliothek ; 95)
