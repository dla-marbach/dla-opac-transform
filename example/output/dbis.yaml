noteContent_mv: |-
  Die Etablierung des Computers führte bereits in den 1970/80er-Jahren zu massiven gesellschaftlichen Veränderungen. Dennoch hat sich die Zeitgeschichtsforschung mit diesem Wandlungsprozess bislang kaum beschäftigt. So liegen nur einzelne, vornehmlich wirtschafts- und technikhistorische Arbeiten zur frühen westdeutschen Computertechnik vor, für die DDR besonders zur politischen Lenkung der Produktion und Informatik. Das Projekt setzt sich dagegen zum Ziel, die gesellschaftliche Bedeutung der frühen Computerisierung in gesamtdeutscher Perspektive zu erforschen, indem es die gesellschaftlichen Deutungen, Praktiken und Folgen der zunehmenden Computernutzung in Ost- und Westdeutschland untersucht. Mit der Phase von den 1960er-Jahren bis hin zur Wiedervereinigung wird dabei jene mittlerweile historisierbare Zeitspanne bearbeitet, in der sich Computer vor allem in großen Behörden, Unternehmen und schließlich bei Hackern und Spielern etablierten, bevor Anfang der 1990er-Jahre das World Wide Web und die massenhafte Verbreitung leicht bedienbarer PCs eine neue Phase der Computerisierung einleiteten.<br />
  <br />
  Die gesellschaftliche Bedeutung der Computerisierung wird vor allem für drei Forschungsfelder untersucht. Erstens wird gefragt, in welcher Form sie die Arbeitswelt veränderte, etwa im Hinblick auf Arbeitsabläufe, -ergebnisse und Betriebsstrukturen. Zweitens wird aus kultur- und sozialgeschichtlicher Perspektive untersucht, auf welche Weise die Computerisierung Kontroll- und Machtgefüge prägte, etwa inwieweit sie eine zentralisierte Erfassung, neue gesellschaftliche Beobachtungen oder auch subversive Vernetzungen förderte. Drittens wird die Computerisierung als ein bisher kaum beachteter Baustein in der Konkurrenz des Kalten Kriegs betrachtet. Das Projekt untersucht die asymmetrischen Verflechtungen zwischen Ost- und Westdeutschland und fragt vergleichend, auf welche Weise der jeweilige politische und ökonomische Rahmen die Computerisierung prägte.<br />
  <br />
  Methodisch verschränkt das Projekt Ansätze der Kultur- und Sozialgeschichte. Alle Teilprojekte sind empirisch angelegt und basieren auf einer Auswertung vielfältiger zeithistorischer Quellen – wie den Archivakten der beteiligten Institutionen und Akteure, den digital produzierten Quellen, den Rohdaten zeitgenössischer sozialwissenschaftlicher Erhebungen zur Arbeitswelt, den zeitgenössischen Periodika (etwa der Gewerkschaften und Computerzeitschriften) sowie der qualitativen Befragung von Zeitzeugen. Die Ergebnisse des Projektes werden in monographischen Studien und Fachartikeln veröffentlicht. Dabei kann das ZZF an vielfältige Vorarbeiten anknüpfen – sowohl zur deutsch-deutschen Zeitgeschichte, zu den einzelnen Teilbereichen als auch zur Zeitgeschichte der Informationsgesellschaft.
