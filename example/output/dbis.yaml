noteContent_mv: |-
  Stefan George (1868–1933), dem 1927 der erste Goethe-Preis der Stadt Frankfurt verliehen wurde, zählt – nicht zuletzt auf Grund tiefer Verehrung durch seine Anhänger – zu einem der einflussreichsten Dichter seiner Zeit.<br />
  Die digitale Ausgabe basiert auf der 18-bändigen »Gesamt-Ausgabe der Werke«, die George selbst von 1927 bis zu seinem Tod herausgegeben hat. George hat großen Wert auf die Ausstattung seiner Veröffentlichungen gelegt und, zusammen mit Melchior Lechter, die nach ihm benannte »ST-G-Schrift« in Anlehnung an seine Handschrift entwickelt. Um dieser Veranschaulichung des Geschriebenen im Druckbild Rechnung zu tragen, gibt die digitale Ausgabe die Bände auch im Faksimile wieder. Ergänzt wird die Ausgabe um ein Faksimile der Handschrift »Das Jahr der Seele«, Georges Briefwechsel mit Hugo von Hofmannstahl und Friedrich Gundolf sowie Gundolfs Studie »George« von 1920, die die der Persönlichkeit Georges entgegengebrachte Verehrung aus der Sicht eines der prominentesten Mitglieder des George-Kreises beschreibt.<br />
  (Digitale Bibliothek ; 99)
