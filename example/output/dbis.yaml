noteContent_mv: |-
  Die Datenbank stellt wissenschaftliche Beschreibungen und Digitalisate von Handschriften der ehemaligen Klosterbibliothek Lorsch bereit.<br />
  Ziel des Projektes „Bibliotheca Laureshamensis – digital” war es, die Bibliothek des zum UNESCO-Welterbe erhobenen Klosters Lorsch virtuell wieder erstehen zu lassen. Über 330 mittelalterliche, hauptsächlich karolingische Handschriften sind heute noch erhalten und auf über 70 Bibliotheken weltweit verstreut.<br /><br />
  Die angebotene Handschriften-SUCHE ermöglicht u.a. Recherchen nach Entstehungszusammenhängen, kodikologischen oder paläographischen Sachverhalten, aber auch gezielte Suchen nach Vorbesitzern, Autoren, Werken, Initien oder nach einer differenzierten Sacherschließung der Texte. Die Datenbank wurde mit der Software Koha realisiert und wird vom Bibliotheksservice-Zentrum Baden-Württemberg (BSZ) gehostet.
