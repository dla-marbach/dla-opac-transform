filterType_mv: Daten
noteContent_mv: |-
  Das Digitalisierungsprojekt präsentiert den Zeitraum 1946,23.Apr. - 1990,3.Okt. Die Datenbank mit Originaldigitalisaten bietet eine Volltextsuche sowie eine Kalenderblattfunktion. Sie ist Teil des Portals DDR-Presse, das sich noch im Aufbau befindet. Der Umfang der auch im Ausland weit verbreiteten Zeitungsausgaben seit Erstveröffentlichung bis zum 3. Oktober 1990  beträgt ca. 168.000 Einzelseiten.

  Die Tageszeitung „Neues Deutschland“ – erstmalig erschienen am 23. April 1946 – war die erste überregionale Tageszeitung im Osten Deutschlands, die direkt durch die SED herausgegeben und finanziert wurde. Dadurch konnte sich diese Zeitung im zentralistisch geplanten Zeitungsmarkt der späteren DDR ab 1949 zum politischen Leitmedium entwickeln und war 1989 neben dem FDJ-Organ „Junge Welt“ die auflagenstärkste Tageszeitung.

  Eine besonders intensive Widerspiegelung der parteioffiziellen Geschehnisse, aber auch die tägliche Berichterstattung zu Kunst, Literatur, Sport und Sozialem u. v. a. verleihen ihr singulären Quellenwert.
