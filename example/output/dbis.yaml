  Berücksichtigt ist der gesamte deutsche Sprachraum einschließlich Österreichs und der deutschsprachigen Schweiz. Der jeweilige regionale oder soziale Herkunftsbereich wird ebenso vermerkt wie der Zeitpunkt, zu dem ein Ausdruck umgangssprachlichen Charakter angenommen hat oder von der Umgangssprache eigens geprägt worden ist.<br />
