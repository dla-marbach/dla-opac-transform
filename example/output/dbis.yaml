noteContent_mv: "Die heutigen Vorstellungen über die DDR sind in starkem Maße durch Medien geprägt. Massenmedien, Medienquellen in Bildungskontexten oder auch private Fotos, Filme und Musik formen maßgeblich Erinnerungen und das Wissen über den Alltag und politische Repression in der DDR. Der Forschungsverbund „Das mediale Erbe der DDR. Akteure, Aneignung, Tradierung“ setzt sich deshalb zum Ziel, die Entstehung, Transformation und Nutzung von Medien mit DDR-Bezug zu analysieren.<br /><br />\nUntersucht und aufbereitet werden sowohl „Massenmedien“ (Fernsehen, Filme, Internet) als auch private Medien (Fotos, Schmalfilme) und Nutzungsumgebungen (Schulen, Museen, individueller Medienkonsum). Dabei vereint der Verbund interdisziplinäre Ansätze der Geschichtswissenschaft, der Kommunikationswissenschaft und der Geschichtsdidaktik. Die Partner bringen vielfältige Erfahrungen in diesem Forschungsfeld mit und vereinen ost- und westdeutsche Standorte sowie universitäre und außeruniversitäre Forschung und Forschungsvermittlung.<br /><br />\n„Das mediale Erbe der DDR“ wird dabei von Menschen aus drei akademischen Disziplinen an drei Standorten untersucht. Der Verbund vereint zum einen Geschichtswissenschaft, Geschichtsdidaktik sowie Kommunikationswissenschaft und zum anderen die Ludwig-Maximilians-Universität München, die Freie Universität Berlin sowie das Leibniz-Zentrum für Zeithistorische Forschung Potsdam. Diese Kombination und das Konzept „Erbe“ erlauben eine Perspektivenvielfalt auf Medienstoffe und Medienumgebungen, die ihresgleichen suchen dürfte: von den traditionellen Leitmedien über Spiel- und Dokumentarfilme bis zu Schmalfilmen und Fotoalben, vom Fernsehen über das Museum, die Schule und Familien bis zu den digitalen Plattformen, von der Vergangenheit in Ost und West bis in die Gegenwart.<br />\nDie Einzelprojekte des Forschungsverbunds sind u.a.:<br /><br />\n<ul>\n       <li><a href=\"https://dbis.uni-regensburg.de/resources/105513\">Die DDR im Film: das Online-Handbuch</a></li>\n       <li><a href=\"https://dbis.uni-regensburg.de/resources/103397\">Open Memory Box</a></li>\n<li><a href=\"https://dbis.uni-regensburg.de/resources/105524\">Die DDR im Schmalfilm: Blicke aus der Forschung auf die Open-Memory-Box</a></li></ul>\n       \n"
