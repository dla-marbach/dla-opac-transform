noteContent_mv: "Die Datenbank Book Sales Catalogues Online (BSCO) ist eine umfassende Bibliographie von Buchverkaufskatalogen, die in der Niederländischen Republik vor 1801 gedruckt wurden. Ein ausgeklügeltes Suchmenü bietet Zugang zu etwa 3.750 digitalen Faksimiles aus ca. 50 Bibliotheken in ganz Europa, darunter bedeutende Sammlungen in den Niederlanden, Deutschland, Großbritannien, Frankreich und Russland. Weitere Kataloge werden in Zukunft hinzugefügt. \n<br />Diese Kataloge sind eine wichtige Primärquelle für die Forschung zur Buch- und Bibliotheksgeschichte, zur Ideengeschichte, zur Sammlungsgeschichte, zur Literaturgeschichte und zur Kunstgeschichte. Sie enthalten Informationen über Bücher aus ganz Europa in verschiedenen Sprachen, wie Niederländisch, Französisch und Latein."
