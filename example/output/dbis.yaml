noteContent_mv: Die Areal Typology of Sprachen der Americas (ATLAS)-Datenbank codiert 265 sprachliche Merkmale aus 17 verschiedenen Featural -Domänen in 115 Sprachen aus Nord- und 105 Sprachen aus Südamerika. Die in der Datenbank behandelten Domänen wurden für ihre regionale Relevanz ausgewählt, und Sprachen wurden sowohl nach Prinzipien der phylogenetischen Vielfalt als auch der geografischen Abdeckung ausgewählt. Die Merkmale von Atlas sind logisch unabhängig und maximieren die Wiederverwendbarkeit der Daten für analytische Tools, die eine logische Unabhängigkeit annehmen.
