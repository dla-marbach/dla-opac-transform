  In den „Digitalisierten Sammlungen“ der Staatsbibliothek zu Berlin (SBB) finden Sie derzeit historische Drucke der Staatsbibliothek aus mehreren aktuellen Digitalisierungsprojekten. Den Schwerpunkt dieser Sammlungen bilden historische Drucke des 17. und 18. Jahrhunderts aus allen Fachrichtungen sowie Ostasiatica in westlichen Sprachen. <br />

