noteContent_mv: |-
  GoTriple ist eine neuartige Discoveryplattform für die Sozial- und Geisteswissenschaften (SSH) in Europa. Es dient als zentraler Zugangspunkt zum Entdecken und Wiederverwenden offener wissenschaftlicher SSH-Ressourcen und zum Finden von Kolleg*innen.
  <br />Inspiriert von der Suchmaschine Isidore, die vom französischen Nationalen Zentrum für wissenschaftliche Forschung (CNRS) entwickelt wurde, bietet die GoTriple-Plattform einen zentralen Zugangspunkt für Benutzer*innen (Forscher*innen, Institutionen wie Universitäten und Bibliotheken, aber auch Unternehmen, Beratungsfirmen, Medien und Dienstleister),
  <ul>
  <li>um offene wissenschaftliche SSH-Ressourcen zu entdecken und wiederzuverwenden, d. h. Forschungsdaten und Veröffentlichungen, die derzeit über lokale Repositorien verstreut sind;</li>
  <li>um andere Forscher*innen und Projekte über Disziplin- und Sprachgrenzen hinweg zu finden und sich mit ihnen zu vernetzen;</li>
  <li>um innovative Tools zur Unterstützung der Forschung zu nutzen (z. B. Visualisierung, Annotation, Vertrauensbildung und Empfehlungssystem);</li>
  <li>um neue Wege der Forschungsfinanzierung zu entdecken (z. B. Crowdfunding).</li>
  </ul>

  <br />Weitere Informationen finden Sie hier: <a href="https://project.gotriple.eu/gotriple-platform/">https://project.gotriple.eu/gotriple-platform/</a>
