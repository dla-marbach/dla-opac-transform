noteContent_mv: "Die Datenbank steht in einem größeren Zusammenhang. Sie hat sich aus dem DFG-Heisenberg-Projekt „Antireligiöse Filme und Kampagnen in der Sowjetunion 1917-1938: Mediale Praktiken der Entweihung von Reliquien, Ikonen und Sakralbauten“ entwickelt.\r\nDie Datenbank umfasst jedoch einen größeren Zeitraum, namentlich die vorrevolutionäre Zeit. Sie enthält zudem Filme aus dem Zarenreich und der UdSSR, d.h. auch aus Territorien, die heute unabhängige Staaten sind wie z.B. die Ukraine.\r\n\r\nDie in zwei Sprachen (russisch und deutsch) angelegte Datenbank enthält filmografische Angaben zu russischen und sowjetischen Filmen, in denen religiöse Motive eine Rolle spielen. Auch antireligiöse und antiklerikale Filme werden angeführt. Die Zensurpraxis im Zarenreich entwickelte zahlreiche Beschränkungen, was Darstellungen geistlicher und religiöser Themen betraf. Dies galt zunächst für ausländische, dann für russländische Filme. Einige im Ausland produzierte Filme waren im russischen Verleih und wurden daher auch in die Datenbank mit aufgenommen.\r\n\r\nDie Datenbank wird in Zusammenarbeit mit zwei Filmarchiven erstellt: dem Russländischen Staatsarchivs für Film- und Fotodokumente (RGAKFD) und dem Staatsfilmarchiv der Russischen Föderation (Gosfil’mofond Rossijskoj Federacii = GFF).\r\n\r\nDie Grundlage der Annotationen zu den Spielfilmen stellt die vom Staatsfilmarchiv der Russischen Föderation herausgegebene Christliche Filmenzyklopädie 1909-1999 dar: Christijanskij kinoslovar’ 1909-1999, Moskau 2000. Das Wörterbuch ist von einem Mitarbeiter des GFF, Vladimir Semerčuk, zusammengestellt worden. Ausgangspunkt für die Aufnahme in die Datenbank der Filmographie war der Umstand, dass dieses überaus informative 279-seitige Wörterbuch im Westen nur in wenigen Bibliotheken zugänglich ist.\r\n\r\nDas Staatsfilmarchiv der Russischen Föderation gehört mit über 66 000 Filmtiteln zu den größten Archiven der Welt."
