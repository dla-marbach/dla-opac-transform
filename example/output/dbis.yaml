noteContent_mv: "Umfangreiche Volltextdatenbank der Tagebücher von Harry Graf Kessler. - Auf der vorliegenden CD-ROM ist die gesamte Rohtranskription des Tagebuches außer den Jahren 1912 bis 1915 in der gegenwärtig in Marbach vorliegenden Form elektronisch lesbar. Die beiden Vorkriegsjahre fehlen noch, ebenso die beiden Kriegsjahre, in denen Kessler am Kampfgeschehen beteiligt war. Jene, weil sie nur in schwer lesbarer Konzeptform auf losen Blättern überliefert sind, deren Transkription noch nicht abgeschlossen ist, diese, weil sie der Transkription wegen des Schriftbildes und der Ortsnamen besondere Widerstände bieten. Während diese erste CD-ROM also noch vorläufig und unvollständig ist, wird mit dem Erscheinen des letzten gedruckten Bandes eine vollständig wissenschaftlich erarbeitete Ausgabe mit ergänzenden Dokumenten in digitalisierter Form ausgeliefert, die dann vielfältige Recherchen im ganzen Textcorpus ermöglicht.<BR>\r\nDa die Editoren der einzelnen Bände jeweils noch die notwendige, abschließende Textkontrolle vornehmen, werden die Benutzer der CD-ROM gebeten, den bereits in gedruckter Form erschienenen Text nach der Druckausgabe zu zitieren, den übrigen nach Einsicht der in Marbach vorliegenden Fotokopien der Tagebuchhandschrift.<BR>\r\n(Aus dem Vorwort der Ausgabe)"
