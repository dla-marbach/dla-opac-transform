noteContent_mv: "Im Digitalen Bildarchiv sind zurzeit (Stand: Februar 2018) 363.000 Bilder des deutschen Bundesarchivs verfügbar. Als repräsentativer Querschnitt aus den etwa 11 Millionen im Bundesarchiv verwahrten Fotos, Luftbildern und Plakaten zeigen sie Personen und Ereignisse der deutschen Geschichte von 1860 bis zum Ende der 1990er Jahre. \r\nZu den Aufnahmen gehören Bilder zur deutschen Kolonial-geschichte, aus der Weimarer Republik und der Zeit des Nationalsozialismus, der Geschichte der DDR mit dem sehr großen Bildbestand des Allgemeinen Deutschen Nachrichtendienstes ADN-Zentralbild und der Geschichte der Bundesrepublik Deutschland mit u.a. dem Bestand des <a href=http://www.bundesbildstelle.de>Presse- und Informationsamtes der Bundesregierung</a> .<p>\r\nSeit November 2008 sind zusätzlich rund 119.000 Bilder der deutschen Bundesbildstelle ab 1946 in dieser Datenbank enthalten. <br>\r\nMit dem Digitalen Bildarchiv haben Benutzer jederzeit schnell, einfach und selbsttätig Zugriff auf Bilder, die online (ggf. gegen Gebühr / Nutzungshonorar) heruntergeladen werden können."
