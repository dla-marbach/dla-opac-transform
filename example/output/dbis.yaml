filterType_mv: Daten
noteContent_mv: "Die Regensburger Verbundklassifikation wurde in den 1960er Jahren als Aufstellungssystematik zur sachlichen Erschließung von Beständen in wissenschaftlichen Bibliotheken entwickelt.\r\n\r\nUrsprünglich war sie als Haussystematik für die internen Belange der Universitätsbibliothek Regensburg konzipiert. In den darauffolgenden Jahren entschieden sich immer mehr Bibliotheken und Institutionen im deutschsprachigen Raum für einen Umstieg auf RVK. Inzwischen gibt es über 140 Anwender in Deutschland, Österreich, Italien, Liechtenstein und der Schweiz, die ihren Bestand ganz oder in Teilen nach RVK systematisieren, aufstellen und/oder sie als Instrument zur kooperativen Sacherschließung nutzen.\r\n\r\nDer Regensburger Klassifikationsverbund ist heute (Stand 2017) der größte Klassifikationsverbund im deutschsprachigen Raum, von Beginn an betreut von der Universitätsbibliothek Regensburg.<br>\r\n\r\nDie RVK besteht aus 33 Fachsystematiken, die dem klassischen Fächerkanon der deutschen Universitäten entsprechen. Die Anwendergemeinde betreibt kooperativ die fachliche Weiterentwicklung der RVK in einem MediaWiki, einer offenen Diskussionsplattform. Das Expertenwissen seitens der Bibliotheken und seitens der Wissenschaft bildet aktuelle Entwicklungen im wissenschaftlichen Diskurs in der Klassifikation ab.<br>\r\n\r\nDie RVK ist geeignet für wissenschaftliche Bibliotheken und Institutionen jeder Größe, für Freihand- und Magazinbestände und dient zugleich als gemeinsames Sacherschließungsinstrument.<br>\r\n\r\nIm RVK Portal finden die Anwender alle Services der RVK unter einem Dach. Vierteljährlich erfolgt ein Update der RVK-Datenbank. Durch Veröffentlichungen im RVK-Portal (z.B. unter dem Menüpunkt Aktuelles), durch ebenfalls vierteljährliche Rundbriefe und jährliche Anwendertreffen werden die Anwender der RVK über alle Neuerungen und Entwicklungen informiert."
