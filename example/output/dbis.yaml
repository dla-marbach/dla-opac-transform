noteContent_mv: "Das Papyrus-Portal bietet dem Nutzer eine effiziente und effektive Suche in allen digitalisierten und elektronisch katalogisierten Papyrussammlungen Deutschlands und ermöglicht eine einheitliche Präsentation der Suchergebnisse mit den wichtigsten Informationen zu den Papyri. <br>\r\nDie Seite „Papyrus Portal“ enthält alle auf MyCoRe basierenden digitalen Papyrussammlungen als Einzelsammlungen, und zwar sowohl als einzeln als auch gemeinsam durchsuchbare Collection. Damit ist auch das ursprünglich als informationstechnologische Einheit auftretende Papyrusprojekt Halle-Jena-Leipzig aufgelöst und jeder der drei Sammlungsorte wie alle anderen einzeln und gleichberechtigt vertreten. An den Daten, den bisher bestehenden URLs usw. hat sich nichts geändert. Die Maßnahme diente der Optimierung der IT-Betreuung und erleichtert es, weitere Sammlungen aufzunehmen.\r\n<br>Das Projekt wird von der DFG gefördert."
