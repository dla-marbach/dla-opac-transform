noteContent_mv: Die Datenbank enthält deutsch-, englisch- und französischsprachige literarische Primärtexte des 18. und 19. Jahrhunderts aus der Bibliothek Corvey und stellt damit den geschlossen erhaltenen Bestand einer Adelsbibliothek bereit. Bedient werden nahezu alle Textgattungen, der inhaltliche Schwerpunkt liegt auf der Epoche der Romantik zwischen 1790 und 1840 bzw. 1870. Die Sammlung ist modular nach Sprachen und Textgattungen angelegt und umfasst 5.952 Werke, die auf 3.614.236 Seiten mit über 12.138 Einträgen erstmals in digitaler Form zur Verfügung gestellt werden. Sie ist von hohem Quellenwert für die deutsche, englische und französische Philologie. (E-Book-Sammlung)
