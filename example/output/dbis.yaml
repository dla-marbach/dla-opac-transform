filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Wichtige Fragestellungen im Umgang mit Archivalien sollen in der Südwestdeutschen Archivalienkunde beantwortet werden. Sie beschreibt einzelne Archivaliengattungen und Quellentypen vom Frühmittelalter bis in die unmittelbare Gegenwart und bezieht sich dabei auf den südwestdeutschen Raum in seinen historischen Dimensionen. Um möglichst nahe an den nachweisbaren Beständen bleiben zu können, konzentrieren sich die Beiträge nicht ausschließlich, aber vorrangig auf Überlieferungen in baden-württembergischen Archiven.<br />

  Dieses Modul soll nachhaltig der kollaborativen Fortschreibung der Archivalienkunde dienen und eine Struktur für die Ergebnissicherung darstellen, auf die überörtlich in der Lehre zurückgegriffen werden kann. Es soll den Austausch zwischen Archiven und historischer Forschung wie auch innerhalb der Forschung erleichtern und die Lehre instrumental unterstützen.
