noteContent_mv: 'Der syrische Thesaurus ist eine mittelgroße Datenbank mit syrischen literarischen Texten. Die Beta-Version wurde auf der AAR/SBL in San Diego 2019 vorgestellt und besteht aus 7,3 Millionen Token (ca. 6,5 Millionen Wörter). Nutzer können das Korpus mit verschiedenen Methoden durchsuchen: einfache Wort- und Phrasensuche, reguläre Ausdrücke und eine Corpus Query Language. Die Suchvorgänge können nach einer Vielzahl von Metadatenfeldern gefiltert werden, z. B. nach Autor, Kompositionszeitraum, Genre, poetischem Metrum (falls zutreffend) und vielem mehr. Zusätzlich zu den Konkordanzergebnissen können die Benutzer Kollokationen und Häufigkeiten des Vorkommens finden. Die Suchergebnisse können in Text- und XML-Formaten gespeichert oder exportiert werden. Simtho ist online frei verfügbar.'
