noteContent_mv: |
  Die Deutsche Akademie für Kinder- und Jugendliteratur wurde am 15. Mai 1976 in Würzburg gegründet.<br />
  Hauptanliegen der Akademie ist die Förderung der deutschsprachigen Kinder- und Jugendliteratur, insbesondere die Kooperation von Wissenschaft und praktischer Kinder- und Jugendbucharbeit. Neben ganzjährigen Veranstaltungen und Projekten zur Kinder- und Jugendliteraturvermittlung im In- und Ausland zeichnet die Akademie herausragende Persönlichkeiten ihres Faches sowie kinder- und jugendliterarische Werke aus. Sie dokumentiert die Ergebnisse ihrer Arbeit in Tagungsbänden, Broschüren sowie einem Online-Lexikon und auf dieser Website sowie ihren Social-Media-Kanälen. Die Mitglieder der Akademie sind in allen Bereichen der Kultur, Politik und Wirtschaft tätig.
