noteContent_mv: |-
  Das Forschungsprojekt Digitales Familiennamenwörterbuch Deutschlands (DFD) erschließt den aktuellen Familiennamenbestand Deutschlands und stellt die Ergebnisse digital zur Verfügung. Das Langzeitvorhaben wurde an der Mainzer Akademie der Wissenschaften und der Literatur in Kooperation mit der Technischen Universität Darmstadt und der Johannes Gutenberg-Universität Mainz begonnen. Erstmals sollen alle derzeit in Deutschland vorkommenden Familiennamen – unter Einbeziehung der fremdsprachigen Namen – lexikographisch erfasst, kartiert und (unter Berücksichtigung des erst seit Kurzem bestehenden Wissens um die geographische Verbreitung der Namen) etymologisiert werden.<br />
  Die Datenbank befindet sich im Aufbau. Stand Juli 2025 beinhaltet sie über 83.000 Namen.
