noteContent_mv: Der Europe Media Monitor (EMM) ist eine Aggregator-Datenbank, die automatisch sowohl Nachrichten traditioneller Online-Medien als auch Artikel aus Social-Media-Kanälen sammelt, aufbereitet und katalogisiert. Laut Anbieter werden täglich über 300.000 Presseartikel von Nachrichtenportalen aus der ganzen Welt in über 70 Sprachen erfasst sowie grafisch aufbereitet. Neben einen Überblick über die zehn wichtigsten Tagesmeldungen nach verschiedenen Sprachen, erfolgt auch eine Kategorisierung nach u. a. „EU Fokus“, „EU Policy Areas“, Themen, sowie internationale Organisationen. In Deutschland werden u. a. die Webseiten von FAZ, Spiegel Online, Tagesschau, Welt, Bild usw. ausgewertet, mit Links zum Volltext.
