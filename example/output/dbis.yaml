noteContent_mv: "Italienische Plattform, die einen Einstieg zu fünf Forschungs- und Editionsprojekten rund um das spanische Theater im Siglo de Oro und seine Verbindungen zum italienischen und europäischen Theater des 17. Jahrhunderts bietet. Die enthaltenen Einzelprojekte sind:<br /> \n- Calderón digital: umfangreiche Datenbank mit Informationen zu den Werken von Pedro Calderón de la Barca (Links zu Volltext-Digitalisaten verschiedener Editionen und Übersetzungen, ausführliche Metadaten mit Hinweisen zu Metrik, Figurenkonstellation, Raum- und Zeitstruktur etc. der Stücke sowie bibliographische Hinweise auf einschlägige Sekundärliteratur)<br />\n- Biblioteca teatral Gondomar: digitale Bibliothek mit TEI-kodierten und annotierten Volltexten sowie Hintergrundinformationen zu Werken aus der Handschriftensammlung der Privatbibliothek von Diego Sarmiento de Acuña (conde de Gondomar); der „fondo teatral de Gondomar“ wird heute in der Spanischen Nationalbibliothek verwahrt<br />\n- Autógrafos Teatrales del Siglo de Oro: Katalog und Beschreibung von Autographen spanischer Theaterstücke aus dem Siglo de Oro; vielfach sind frei abrufbare Digitalisate der beschriebenen Handschriften verlinkt<br />\n- Lope de Vega – La dama boba: digitale Edition von Lope de Vegas „La dama boba“ mit Digitalisaten u.a. des Autographs; eine Bibliographie mit Sekundärliteratur sowie eine ausführliche Werkstudie ergänzen die kritische Edition<br />\n- La casa di Lope: Plattform u.a. mit einer ausführlichen Bibliographie, einer kommentierten Linksammlung und Hinweisen auf neu erschienene Publikationen zum spanischen Theater des Siglo de Oro."
