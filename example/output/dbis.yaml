noteContent_mv: "Der Digitale Wenker-Atlas (DiWA) wird am Forschungsinstitut Deutscher Sprachatlas (Marburg) im Rahmen eines umfangreichen DFG-Projekts herausgegeben. Ziel ist es, den historischen Sprachatlas des Deutschen Reiches (Erhebungszeitraum 1876 - 1887) mit seinen vielfarbigen 1.668 Karten zugänglich zu machen.<br>\r\nDiese einmalige Gesamterhebung einer Sprache (40.000 Erhebungsorte) wird als elektronisches Kartenwerk in eine leitstungsfähige Datenbank integriert, wobei das Original u.a. um kulturhistorische, sozialdemographische und bibliographische Informationen ergänzt wird.<br>\r\nZusätzlich zu den Karten können Tonaufnahmen der historischen Wenkersätze aufgerufen werden.<br>\r\nDie Verknüpfung mit neueren Dialektdaten aus einem aktuellen Regionalatlas eröffnet zudem weitere Analysemöglichkeiten.<br>\r\nNähere Informationen zum Projekt erhalten Sie über die Datenbank. Für den Zugriff auf das elektronische Kartenwerk wählen Sie auf der Startseite die Rubrik Kartenverzeichnis."
