noteContent_mv: |-
  Kalliope ist der überregionale Verbund und zugleich das nationale Nachweisinstrument für Nachlässe, Autographen und Verlagsarchive. Das Projekt wird von der Deutschen Forschungsgemeinschaft (DFG) gefördert und von der Staatsbibliothek zu Berlin betrieben. Der Grunddatenbestand von Kalliope sind die 1,2 Millionen Karteikarten der Zentralkartei der Autographen (ZKA) mit Einzelnachweisen aus fast 450 Institutionen in der Bundesrepublik Deutschland.
  <br />
  <br />
  Beinhaltet seit 2023 auch den Bestand der ehemals eigenständigen Datenbank Zentrale Datenbank Nachlässe.
