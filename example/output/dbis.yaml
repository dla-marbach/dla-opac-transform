noteContent_mv: |-
  Das <b>Wörterbuch der Bairischen Mundarten in Österreich (WBÖ)</b> ist ein Langzeitprojekt der Österreichischen Akademie der Wissenschaften (ÖAW) zur umfassenden Dokumentation und lexikographischen Aufarbeitung der reich gegliederten Basis- und Regionaldialekte (Alt-)Österreichs. Es wird auf der Publikations- und Rechercheplattform <b>Lexikalisches Informationssystem Österreich (LIÖ)</b> veröffentlicht.<br /><br />
  Die neu verfassten Wörterbuch-Artikel schließen an die gedruckte Ausgabe an, die den Buchstabenbereich A bis Ezzes umfasst. Sie enthalten ausführliche, redaktionell aufbereitete Informationen zu Bedeutung, Aussprache, geographischer Verbreitung sowie Verwendungskontexten der bairischen Dialektwörter. Zusätzlich sind die Artikel mit der <b>WBÖ-Belegdatenbank</b>, der digitalen Version der Handzettelsammlung des WBÖ, sowie mit einem Kartentool verknüpft.<br /><br />
  Die Datenbank befindet sich im Aufbau. Zur Zeit stehen mehr als 5.000  Artikel zur Verfügung (Stand: Juni 2025). In den kommenden Jahren wird das System sukzessive erweitert und um die Retro-Digitalisate der gedruckten Bände ergänzt.
