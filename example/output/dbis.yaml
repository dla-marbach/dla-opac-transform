noteContent_mv: "Die Pangloss-Sammlung bietet frei zugängliche linguistische Tondokumente mit einer Spezialisierung auf seltene oder weniger erforschte Sprachen. Die Dokumente sind das Ergebnis der Arbeit professioneller Linguisten. Diese Aufgabe ist dringend, denn die Vielfalt der Sprachen nimmt parallel zum Rückgang der biologischen Vielfalt rapide ab. \n\nDerzeit umfasst die Sammlung 237 Korpora von Sprachen und Dialekten aus 43 Ländern, die von 80 Forschern hinterlegt wurden und mehr als 1.127 Stunden Tonaufzeichnungen repräsentieren. Die präsentierten Dokumente enthalten hauptsächlich spontane Sprache, aber auch Wortlisten und Fragebögen, die vor Ort in Sprechergemeinschaften aufgenommen und in Absprache mit diesen Sprechern transkribiert wurden."
