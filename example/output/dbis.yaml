noteContent_mv: |-
  Bei der gesellschaftlichen Auseinandersetzung mit der DDR-Vergangenheit kommt Spielfilmen eine besondere Rolle zu. Denn seit der Mitte des 20. Jahrhunderts ist der Film zu einem prägenden, wirkmächtigen Medium der Geschichtsdarstellung und -deutung geworden. Im Rahmen dieses Teilprojekts wird ein Online-Handbuch erarbeitet, das den interdisziplinären Forschungsstand zur filmischen Repräsentation der DDR seit 1990 kompakt und übersichtlich aufbereitet.<br /><br />Erfolgreiche Spielfilme über die DDR wie „Good Bye, Lenin!“ oder „Das Leben der Anderen“ sorgten für gefüllte Kinokassen und wurden in der Öffentlichkeit breit und gerade im Hinblick auf die Darstellung von DDR-Unrecht kontrovers diskutiert. Vor allem die größeren Spielfilmproduktionen der 1990er und 2000er Jahre sind bereits wissenschaftlich betrachtet worden, sei es aus eher film- und medienwissenschaftlicher Perspektive oder mit zeithistorisch-erinnerungskulturellem Blick. Neben dem Rückgriff auf bereits etablierte Forschungsergebnisse bzw. Autoren werden in dieses Projekt auch bisher weniger beachtete Produktionen einbezogen. Neben Artikeln zu einzelnen Filmen soll das Online-Handbuch wissenschaftlich fundiertes Hintergrund- und Überblickswissen bieten.<br /><br />
  Dieses Online-Handbuch ist ein Gemeinschaftsprodukt von drei akademischen Disziplinen (Geschichte, Geschichtsdidaktik, Kommunikationswissenschaft), drei Forschungseinrichtungen (FU Berlin, ZZF Potsdam, LMU München) sowie mehrerer Generationen und ein Kind des BMBF-Forschungsverbundes <a href="https://dbis.uni-regensburg.de/resources/105516">„Das mediale Erbe der DDR“</a>.
