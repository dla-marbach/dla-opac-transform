noteContent_mv: "Die Datenbank wurde im Rahmen eines Projektes zum Handel mit französischsprachigen Büchern im Europa der späten Aufklärungszeit (ca. 1769 bis 1794) entwickelt. Anhand des Schweizer Verlages STN (Société Typographique de Neuchâtel) der auch Werke anderer Verlage und in Frankreich zensierte Werke sowie Raubdrucke vertrieb, und somit als repräsentativ für den französischen Buchhandel dieser Zeit gelten kann.\r\nDie Verbreitung von ca. 400.000 Exemplaren von 4.000 Werken in ganz Europa und somit auch der Ideen der Aufklärung, lässt sich visuell und statistisch nachvollziehen.<br />\r\nDie Datenbank basiert auf den Inhalten der Rechnungsbücher der STN. Ausgewertet wurden u.a. Daten zur Herkunft des Buches, Verkaufsort, Käufer, Genre und Inhalt. Abgefragt werden können Autor, Titel, Verleger, Sachgebiet, Genre, Zeitperiode als auch Namen, Beruf und Wohnort der Käufer und Lieferanten. Durch spezielle Abfragen lassen sich beliebte Bücher und Autoren für bestimmte Zeiten und Orte ermitteln. Sich verändernde Lesevorlieben und Nachfrage-Muster sowie Netzwerke des europaweiten Handels mit Büchern lassen sich ermitteln. Durch diverse Filter und Optionsmenüs kann man z.B. die Verkäufe von illegalen Büchern, den Verkauf von Büchern an weibliche Buchhändler oder die Verbreitung von englischen Werken in französischer Übersetzung darstellen."
