noteContent_mv: "Die täglich aktualisierte Datenbank in französischer und englischer Sprache enthält mehr als 480.000 Werke des Musée du Louvre sowie des administrativ angeschlossenen Musée National Eugène-Delacroix. Sie stammen aus acht kuratorischen Abteilungen:\r\n<ul>\r\n       <li>Altertümer des Nahen Ostens</li>\r\n       <li>ägyptische Altertümer</li>\r\n       <li>griechische, etruskische und römische Altertümer</li>\r\n       <li>islamische Kunst</li>\r\n       <li>Gemälde</li>\r\n       <li>mittelalterliche, Renaissance- und moderne Skulpturen</li>\r\n       <li>Drucke und Zeichnungen</li>\r\n       <li>Kunsthandwerk des Mittelalters, der Renaissance und der Moderne</li>\r\n</ul>\r\nDie Datenbank enthält auch sogenannte <a href = https://collections.louvre.fr/en/album/1>„MNR“-Werke</a> (Musées Nationaux Récupération, oder National Museums Recovery), die im Rahmen der Restitution nach dem Zweiten Weltkrieg vom Office des Biens et Intérêts Privés entdeckt und ihren rechtmäßigen Eigentümern zurückgegeben wurden. Auch enthalten sind Dauerleihgaben anderer französischer oder ausländischer Institutionen wie der Bibliothèque Nationale de France, des Musée des Arts Décoratifs, des Petit Palais, des Fonds National dArt Contemporain sowie des British Museum und des Archäologischen Museums von Heraklion. (Quelle: Anbieter)"
