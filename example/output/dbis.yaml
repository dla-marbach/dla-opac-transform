noteContent_mv: "Der Index Theologicus (IxTheo) ist eine internationale Open-Access-Bibliographie für Theologie und Religionswissenschaft und beinhaltet Angaben zu wissenschaftlich relevanter Literatur über das Christentum sowie über den Dialog mit anderen Religionen: konfessions-, sprachen-, medien- und zeitübergreifend. Die Datenbank verzeichnet Literatur ab dem 16. Jahrhundert, Schwerpunkte der Auswertung sind das 19. Jahrhundert bis zur aktuellen Gegenwart. Derzeit enthält der IxTheo über 3,5 Mio. Einträge (Stand Mai 2023). Ausgewertet werden Monographien, Aufsätze, Rezensionen, Datenbanken und weitere Online-Quellen. Zusätzliche Angebote sind personalisierte Suchanfragen und Alerting-Services, eine spezialisierte Bibelstellen-, Codex- und Zeitraum-Suche sowie eine Volltextsuche. Eine alphabetische \r\n<a href=https://ixtheo.de/docs/ixtheo-journals.pdf>Übersicht</a> informiert darüber, welche Zeitschriften im IxTheo aktuell und zukünftig fortlaufend ausgewertet werden. Die Datenbank ist in einer Vielzahl an Sprachen verfügbar."
