noteContent_mv: "Die von Karl Nagel 2007 ins Leben gerufene Bilddatenbank PUNKFOTO bezeichnet sich selbst als weltweit größte Sammlung historischer Punk-Bilder. Gegenwärtig verzeichnet sie über 28.000 Bilder. Das Hauptarchiv umfasst 130 Alben der Jahre 1977 bis 2007 mit über 11.000 Aufnahmen aus der BRD, DDR, Österreich und der Schweiz. Weitere Aufnahmen kamen durch registrierte Mitglieder zusammen, die eigene Bilder auf PUNKFOTO hochladen, in Alben zusammenstellen und kommentieren können. Über 2200 Bilder sind nur nach einer kostenfreien Registrierung einsehbar. (Stand: 09/2017)<br><br>\r\nDas Angebot finanziert sich über Crowdfunding."
