noteContent_mv: "Die <i>Weimarer Goethe-Bibliographie online</i> ist eine internationale Personalbibliographie zu Johann Wolfgang von Goethes Leben, Werk und Wirkung. Sie wird an der Herzogin Anna Amalia Bibliothek in Weimar erstellt.<br>\r\nDie Datenbank enthält die Daten der gedruckten Goethe-Bibliographie 1950 - 1990 (München, 1999) und erschließt die Goethe-Literatur, die seit 1991 erschienen ist. Die bibliographischen Daten werden fortlaufend ergänzt, gelegentlich auch um Nachträge von älteren Publikationen. Die Daten aus der Goethe-Bibliographie 1950 - 1990 bedürfen einer Nachbearbeitung, die zur Zeit noch läuft. (Stand: Dezember 2015)"
