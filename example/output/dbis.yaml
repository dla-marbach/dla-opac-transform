noteContent_mv: "EUscreen ermöglicht den freien Zugriff auf Text-, Audio-, Bild- und Videodokumente europäischer Rundfunkanstalten und Fernseharchive. Das Portal wird von der Europäischen Kommission gefördert und beinhaltet 30.000 Programminhalte und -informationen (<i>Stand: Dezember 2011</i>) vom Beginn des 20. Jahrhunderts bis in die Gegenwart. Augenblicklich wirken <a href=http://www.euscreen.eu/partners.html target=_blank>37 Partner</a> aus 20 Ländern an EUscreen mit. Das Portal ist ein wichtiger Aggregator der <a href=http://rzblx10.uni-regensburg.de/dbinfo/detail.php?bib_id=alle&colors=&ocolors=&lett=fs&titel_id=7445 target=_blank>Europeana</a>.<br>\r\nZiel ist die Vereinheitlichung der heterogenen Datenbestände europäischer Medienanstalten unter einer gemeinsamen Rechercheoberfläche zur Erforschung und Bewahrung des kulturellen Fernseh-Erbes.<br>\r\nDie Inhalte werden sukzessive bis August 2012 bereitgestellt. Momentan ist eine Beta-Version verfügbar, welche bereits Personalisierungsfunktionen enthält."
