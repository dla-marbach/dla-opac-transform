noteContent_mv: "Der Fachinformationsdienst (FID) „Zentralasien – Autochthone Kulturen und Sprachen“ stellt seit 2019 kultur- und\ngeisteswissenschaftliche Informationen zu den indigenen bzw. autochthonen Völkern Zentralasiens und Sibiriens bereit, um die\nWissenschaft und Forschung zu und in diesen Regionen aktiv zu unterstützen, zu vernetzen und aktuell und transparent darzustellen. \nZu den Aufgaben des FID gehört die Sammlung und Erschließung gedruckter und digitaler Literatur, der Aufbau des „Web Archive Central\nAsia“ in Zusammenarbeit mit dem Center for Research Libraries (CRL) in Chicago und die nationale und internationale Vernetzung mit\nder Fachgemeinschaft.\nInhaltliche Schwerpunkte sind die Sprachwissenschaft altaischer und paläoasiatischer Sprachen, die Ethnologie Zentralasiens und\nSibiriens auch in historischer Perspektive und die Literatur und Literaturwissenschaft in und zu den autochthonen Sprachen der\nmittelasiatischen Republiken, der Regionen Sinkiang (Xinjiang) und Sibirien sowie der mongolischen Völker.\nDer FID Zentralasien arbeitet eng mit anderen FIDs mit Asienbezug zusammen: FID Asien (Berührungspunkt: Mongolen und Uiguren in\nChina), FID Ost-, Ostmittel- und Südosteuropa (Berührungspunkt: Region Sibirien), FID Nahost-, Nordafrika- und Islamstudien\n(Berührungspunkt: Turkvölker Mittelasiens)."
