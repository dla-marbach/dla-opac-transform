noteContent_mv: "Das Portal WEBIS verzeichnet die Verteilung von fachlichen Sammelschwerpunkten an deutschen Bibliotheken, die \n<ul>\n<li>bis 2012 von der DFG im Rahmen des Sondersammelgebiet-Systems gefördert wurden\n</li><li>von denen viele seit 2013 in die neue Form der <a href=\"https://www.dfg.de/foerderung/programme/infrastruktur/lis/lis_foerderangebote/fachinfodienste_wissenschaft/index.html\">Fachinformationsdienste für die Wissenschaft (FIDs)</a> überführt bzw. ganz neu gebildet wurden. Als bundesweites System ergänzen die FIDs die Informationsinfrastrukturen der Hochschulen und Forschungseinrichtungen durch überregionale Dienstleistungen für den Spitzenbedarf. \n</li></ul>\nWEBIS verzeichnet im Einzelnen: \n<ul>\n<li>Informationen zum FID-System\n</li><li>Die einzelnen FIDs\n</li><li>FID-Einrichtungen\n</li><li>Informationen zum SSG-System\n</li><li>Die einzelnen ehemaligen SSGs\n</li></ul>"
