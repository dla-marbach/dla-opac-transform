noteContent_mv: "Auf der Website wird eine Sammlung von ca. tausend niederländischen Briefen aus dem 17. und 18. Jahrhundert in Datenbankform angeboten. Die Briefe stammen vor allem von Seeleuten auf Auslandsreisen und daheimgebliebenen Angehörigen. Sie gelangten während der niederländisch-englischen Seekriege als Kriegsbeute in englische Hände und werden seitdem in britischen Archiven verwahrt.\r\nDie Sammlung ist insbesondere interessant für die historische Sprachwissenschaft, da sie den alltäglichen Sprachgebrauch der damaligen Zeit widerspiegelt. Die Briefe wurden sprachwissenschaftlich erforscht und transkribiert sowie mit linguistischen Informationen angereichert, sodass die Texte nach verschiedenen linguistischen Kriterien durchsuchbar sind."
