filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Die <i>Verteilte Digitale Inkunabelbibliothek</i> ist ein multilokal angelegtes Projekt der beteiligten Bibliotheken,\r\nder Universitäts- und Stadtbibliothek Köln und der Herzog August Bibliothek Wolfenbüttel.<br>\r\nDieses Kooperationsprojekt strebt eine möglichst repräsentative Digitalisierung der Inkunabelbestände beider Sammlungen an. Damit ein großer Teil der Inkunabelproduktion berücksichtigt wird und es zu keinen\r\nÜberschneidungen kommt, wird eine sinnvolle chronologische Trennung zwischen den Beständen der beteiligten Bibliotheken vorgenommen. In Köln werden aus dem Gesamtbestand zunächst ca. 500 Titel mit den älteren Erscheinungsjahren 1460 bis 1485 ausgewählt. In Wolfenbüttel werden ca. 500 Titel mit jüngeren Erscheinungsjahren 1485 bis 1500 ausgewählt. Der Schwerpunkt liegt bei beiden Bibliotheken auf deutschen Druckorten. Die in den Bibliotheken digitalisierten Inkunabeln stellen jeweils 5 - 6% der weltweit erhaltenen Frühdrucke dar.\r\n<!-- Altes Buch -->"
noteRequirements_mv:
  - "Der Server der Verteilten Digitalen Inkunabelbibliothek wurde <b>am 01.08.2015 außer Betrieb</b> genommen.\r\n<br>\r\nDie Digitalisate der USB Köln erreichen Sie weiterhin über:\r\n<a href=https://services.ub.uni-koeln.de/cdm/search/collection/inkunabeln type=DBISurl>https://services.ub.uni-koeln.de/cdm/search/collection/inkunabeln</a>.\r\n<br>\r\nDie Digitalisate der Herzog August Bibliothek Wolfenbüttel erreichen Sie über das digitale Angebot unter:\r\n<a href=https://www.hab.de/verteilte-digitale-inkunabelbibliothek/ type=DBISurl>https://www.hab.de/verteilte-digitale-inkunabelbibliothek//</a>"
