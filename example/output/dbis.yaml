noteContent_mv: |-
  Das Lichtbildarchiv älterer Originalurkunden (LBA) ist eine weltweit einmalige Sammlung und Dokumentation zur Erforschung original überlieferter Urkunden des römisch-deutschen Reiches aus der Zeit vor 1250. Seit 1928 erfasst es sukzessive Urkunden auf dem Gebiet des mittelalterlichen deutschen Reiches fotografisch. Seine Bestände erlauben nicht nur die Untersuchung grundwissenschaftlicher Fragestellungen, sondern sie bieten auch einen visuell-quellenorientierten Zugang zur mittelalterlichen Geschichte im Allgemeinen. Alle Bestände werden digitalisiert und in einer Datenbank online zugänglich gemacht.  <br />

  Die Urkundenbilder können mit Hilfe verschiedener Suchfilter
  recherchiert und eingesehen werden. Eine personalisierte Anmeldung gestattet weiterhin die Bestellung über ein Warenkorbsystem und die Zusammenstellung eigener Präsentationen. Nach vorheriger Anmeldung besteht ebenfalls die Möglichkeit, die photographischen Tafeln vor Ort einzusehen.
