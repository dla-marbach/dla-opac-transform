noteContent_mv: "Das Archiv bietet freien Zugriff auf alle erschienenen Ausgaben der deutschsprachigen feministischen Zeitschrift EMMA der Jahre 1977 bis 2015. Sie wurde 1977 von der Journalistin und Feministin Alice Schwarzer gegründet. Die Zeitschrift erschien zunächst monatlich, dann zwei- und heute dreimonatlich in Köln. 2011 lag die verkaufte bei ca. 43.000 Exemplaren pro Ausgabe.<br /><br />\r\nEMMAdigital ist ein Digitalisierungsprojekt in Zusammenarbeit mit dem Hochschulbibliothekszentrum NRW (hbz), der Firma ImageWare und dem Fraunhofer-Institut für Intelligente Analyse- und Informationssysteme IAIS und dem FrauenMediaTurm. Vor dem ersten Gebrauch ist eine kostenfreie Installation der Software MyBib eRoom erforderlich. Die Artikel können kostenfrei im Originallayout gelesen werden. Ein Abspeichern oder Ausdrucken ist nicht möglich."
