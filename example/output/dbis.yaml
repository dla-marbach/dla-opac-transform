dateCataloged: "2020-08-18"
dateModified: "2025-09-11"
displayAddition1: Bestandsverzeichnis, Volltextdatenbank
displayName: Universitätsbibliothek Heidelberg
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  In der Digitalen Bibliothek der Universitätsbibliothek Heidelberg sind über 40.000 Digitalisate (Stand: Mai 2020) ihrer historischen Bestände nachgewiesen. Die Digitalisate sind frei und kostenlos im Internet zugänglich. (E-Book-Sammlung)
  <p>Digitalisiert ist u.a. Bestand aus folgenden Bereichen:</p>
  <ul>
  <li>Handschriften<br />
  Mittelalterliche und neuzeitliche Handschriften u.a. aus der Bibliotheca Palatina, den Klosterbibliotheken Salem, Petershausen und Lorsch, sowie Briefe und Autographe</li>

  <li>Urkunden<br />
  Mittelalterliche und neuzeitliche Urkunden mit einem geographischen Schwerpunkt in der Pfalz bzw. Kurpfalz und im Elsass</li>

  <li>Alte Drucke und Karten<br />
  Inkunabeln, Blockbücher, Einblattdrucke, Druckschriften des 16. bis 18. Jahrhunderts, Historische Karten</li>

  <li>Schrifttum zur Stadt Heidelberg und zur Region<br />
  Heidelberger Adressbücher, Chronik der Stadt Heidelberg, Heidelberger Katechismus von 1563, Briefe der Liselotte von der Pfalz etc.</li>

  <li>Quellen zur und aus der Universität Heidelberg<br />
  Matrikel, Vorlesungsverzeichnisse und Adressbücher der Universität Heidelberg etc.</li>

  <li>Kunstwissenschaftliche Literatur<br />
  Bücher zur Architektur und Gartenkunst, Quellen zur Geschichte der Kunstgeschichte, Kunstzeitschriften etc.</li>

  <li>Archäologische Literatur<br />
  Grabungspublikationen, Griechische Vasenmalerei und Plastik, Schrifttum zu Athen und Attika, Schriften Heinrich Schliemanns etc.</li>

  <li>Ägyptologische Literatur<br />
  Bücher und Zeitschriften zur altägyptischen Kunst und Kultur, zu einzelnen Sammlungen und Grabungen</li>

  <li>Literatur zu Südasien<br />
  Veröffentlichungen zu Themen der Südasienwissenschaften, Quellen zur Geschichte der Indologie, historisches Schrifttum aus und über Südasien etc.</li>

  <li>Rechtsquellen der frühen Neuzeit<br />
  Juristische Quellentexte vorwiegend des 16. und 17. Jahrhunderts</li>

  <li>Literatur zu den historischen Beständen der Universitätsbibliothek Heidelberg</li>

  <li>Reiseberichte aus aller Welt</li>

  <li>Anatomische Literatur und Tafeln</li>

  <li>Astronomische Literatur</li>

  <li>Theologische Literatur</li>

  <li>Sonstige digitalisierte Literatur der Universitätsbibliothek Heidelberg
  u.a. literarische und juristische Schriften des 16. bis 19. Jahrhunderts</li>

  <li>Zeitschriften und Zeitungen<br />
  Kunst-und Satirezeitschriften, Archäologische und Ägyptologische Zeitschriften, Feldzeitungen aus dem 1. Weltkrieg, regionale Zeitungen</li>
  </ul>
