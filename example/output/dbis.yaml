id: DBIS3036
display: 'Nietzsche, Friedrich: Verzeichnis des Briefwechsels'
category: Digitale Nachschlagewerke
categoryMedium_mv: Online-Ressource
categoryPublication_mv: Bestandsverzeichnis
dateCataloged: "2020-08-18"
