filterType_mv: Daten
noteContent_mv: |-
  <p>Das Dialektologische Informationssystem von Bayerisch-Schwaben (DIBS) erforscht und dokumentiert den dialektalen Wortschatz des schwäbisch-alemannischen Teils von Bayern. Das Gebiet liegt zwischen Iller und Lech; im Süden, Westen und Norden ist die Grenze identisch mit der Bezirksgrenze von Bayerisch-Schwaben. Im Osten reicht das Bearbeitungsgebiet nur bis zum Lech, da das Gebiet östlich des Lechs im Bayerischen Wörterbuch behandelt wird.</p>

  <p>Zentrales Ziel ist es, den gesamten Wortschatz des beschriebenen Gebiets in einzelnen Wortartikeln zu dokumentieren und zu beschreiben. DIBS ist aber kein historisches Wörterbuch wie das Bayerische Wörterbuch. Der Großteil der über 600.0000 gesammelten Belege stammt aus dem 20. Jahrhundert.</p>

  <p>DIBS ist ein Grundlagenforschungsprojekt an der Bayerischen Akademie der Wissenschaften (BAdW). Das Projekt ist auf 20 Jahre konzipiert</p>
