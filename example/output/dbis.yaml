noteContent_mv: "BELIT ist eine integrative Literaturdatenbank, die vom Deutschen Referenzzentrum für Ethik in den Biowissenschaften (DRZE, Bonn) entwickelt worden ist und in Zusammenarbeit mit der Informations- und Dokumentationsstelle Ethik in der Medizin (IDEM, Göttingen), dem Internationalen Zentrum für Ethik in den Wissenschaften (IZEW, Tübingen), den Library and Information Services des Kennedy Institute of Ethics (KIE, Washington, DC) und dem Centre de documentation en éthique, CCNE/Inserm (CDE, Paris) betrieben wird. <br>\r\nBELIT bietet Zugriff auf die rund 550.000 verknüpften Datensätze (Stand: Juni 2015) der integrierten deutschen, amerikanischen und französischen Datenbanken: ein weltweit einmalig umfassendes bibliographisches Verzeichnis der Literatur zu Themen der Ethik in den Biowissenschaften mit Nachweisen von Monographien, Grauer Literatur, Rechtstexten, Zeitschriftenaufsätzen, Zeitungsartikeln und Aufsätzen aus Sammelwerken.<br>\r\nDie Kooperationspartner steuern die folgenden Segmente zu BELIT bei:<br><br>\r\n- DRZE: Katalog der Spezialbibliothek und Dokumentation<br>\r\n- IDEM: Datenbank ETHMED mit Nachweisen der Spezialbibliothek und Dokumentation <br>\r\n- IZEW: Datenbank LEWI mit den Katalogen der IZEW-Bibliothek und der Bibliothek des Lehrstuhls für Ethik in den Biowissenschaften an der Universität Tübingen<br> \r\n- KIE: Datenbanken der Bioethics Research Library at Georgetown University<br>\r\n- CDE: Datenbank der Spezialbibliothek und Dokumentation"
