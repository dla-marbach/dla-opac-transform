noteContent_mv: "Von den ersten schriftlichen Zeugnissen der Menschheit bis zur Gegenwart versammelt das epochale Nachschlagewerk rund 13.000 Werke aus allen Literaturen der Welt. Völlig neu bearbeitet und um eine Fülle von Einträgen ergänzt, erschließt das Werklexikon in 17 Bänden und einem Registerband Belletristik, Briefe, Tagebücher und Memoiren, Populär-, Kinder- und Jugendliteratur sowie Sachtexte vielfältiger Disziplinen. \n<br /><br />Einleitende Biogramme (biografische Kurzinformationen) skizzieren die zentralen Lebensdaten der Autoren. Eine Vielzahl zusätzlicher Werkgruppenartikel eröffnet kompakte Einblicke in das Gesamtwerk einzelner Schriftsteller. \n<br />Die komplett überarbeiteten Literaturangaben schaffen mit Hinweisen auf die wichtigsten weiterführenden Werke eine fundierte wissenschaftliche Basis. \n<br />Rund 600 anonyme Werke und Artikel zu Stoffen der Weltliteratur runden das Lexikon ab.\n"
