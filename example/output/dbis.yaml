noteContent_mv: "Im Aufbau befindliches Informationssystem für Wasserzeichen, die in den DFG-Handschriftenzentren und von internationalen Partnern erfasst werden. Ziel des Projektes ist es, digitalisierte Abbildungen von Wasserzeichen mit ihren Metadaten (Motiv, Beschreibort, Trägerhandschrift etc.) dezentral eingegeben zu können.\r\nNeben der Erschließung neuer Wasserzeichen wurden die über 90.000 Datensätze der Piccard-Online-Anwendung integriert. Vorgesehen ist auch die Einbindung der digitalisierten Wasserzeichen der gedruckten Piccard-Bände 3 bis 17. Beide basieren auf der Wasserzeichensammlung Gerhard Piccard, die weltweit die größte ihrer Art ist."
