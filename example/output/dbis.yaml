noteContent_mv: Mit dem Projekt Atlas zur deutschen Alltagssprache soll zum einen die aktuelle Vielfalt des Deutschen erfasst und anschaulich auf Karten dargestellt werden; die Art der Datenerhebung und Kartierung schließt damit an den Wortatlas der deutschen Umgangssprachen von Jürgen Eichhoff an, der von 1977-2000 in vier Bänden erschien (und eines Ergänzungsbandes von Peter H. Nelde zu den deutschen Umgangssprachen in Belgien aus dem Jahr 1987). Durch den Vergleich der alten mit den entsprechenden neuen Sprachkarten aus der gegenwärtigen Interneterhebung können zum anderen Veränderungen des Sprachgebrauchs in den letzten 30 Jahren nachvollzogen werden. Die Daten schaffen damit die Grundlage für Aussagen zur aktuellen Variation wie auch zu Entwicklungstendenzen des Deutschen.
