noteContent_mv: |-
  Das DadA-Projekt versteht sich als Instrument, Veröffentlichungen auf dem Gebiet des deutschsprachigen Anarchismus allgemein zugänglich zu machen und für Wissenschaft und Forschung zu erschließen. Das Projekt hat zwei Standbeine:
  <ul><li>Literaturdokumentation: umfasst die bibliographische und inhaltliche Erschließung der primären und sekundären deutschsprachigen Anarchismus-Literatur, überwiegend nach 1945 erschienene Titel (zugänglich über die Suchmaschine und ein Autoren-/Titelregister),</li>
  <li>Pressedokumentation: umfasst sämtliche periodischen Druckerzeugnisse von 1798 bis in die Gegenwart (zugänglich über die Suchmaschine und ein Titelregister).</li></ul>
  Ergänzt wird dieses Angebot durch allgemeine Informationen zur Anarchismusforschung und Buchempfehlungen.
