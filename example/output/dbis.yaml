noteContent_mv: Diese Datenbank bietet erstmals Zugang zu sämtlichen bekannten Handschriften der Gedichte Goethes, unabhängig von ihrem Aufbewahrungsort. Sie ist ein Teil des umfassenden Erschließungsvorhabens des Goethe- und Schiller-Archivs für den Goethe-Nachlass mittels Inventaren, die sowohl als Printversion als auch in elektronischer Form dargeboten werden sollen. Aufgabe dieser Inventare ist es, den bisher nur unzureichend erschlossenen Goethe-Bestand so eingehend zu beschreiben, dass potentielle Interessenten ohne weitere Nachforschungen erkennen können, ob und welche Quellen zu den von ihnen bearbeiteten Themen vorhanden sind. Die Verzeichnungsangaben des Inventars enthalten daher alle Informationen, die erforderlich sind, um zu den gesuchten Quellen hinzuführen.
