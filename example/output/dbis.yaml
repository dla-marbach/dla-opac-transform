noteRequirements_mv:
  - "Ein großer Teil des Materials ist frei zugänglich, anderes ist <a href=\"https://www.nb.no/hjelp-og-informasjon/rettigheter/\">zugangsbeschränkt</a>.\nDer Zugriff auf die zugangsbeschränkten Titel ist ausschließlich für ausländische Wissenschaftler*innen, die zu Norwegen forschen, nach persönlicher Registrierung \n <a href=\"https://www.nb.no/en/access-to-bokhylla/\">direkt bei der norwegischen Nationalbibliothek</a>\n möglich. Weitere Information dazu finden Sie beim <a href=\"https://portal.vifanord.de/literatur/fid-lizenzen/weitere-angebote/\">Fachinformationsdienst Nordeuropa</a>."
