noteContent_mv: "Umfassende Sammlung ökonomischer Literatur von der zweiten Hälfte des 15. bis zur Mitte des 19. Jahrhunderts, die vor allem für die Erforschung der frühen Wirtschafts-, Politik-und Sozialgeschichte - von Bedeutung ist.\nDie Quellenedition vereint die Stärken zweier anerkannter Sammlungen: die Goldsmiths Library of Economic Literature der University of London sowie die Kress Library of Business and Economics der Harvard University Graduate School of Business Administration.\n<br />The Making of the Modern World erschließt im Volltext mehr als 61.000 Bücher, erschienen zwischen 1460 und 1850, sowie 466 Reihen und vereinzelt <a href=\"http://ezb.uni-regensburg.de/fl.phtml?bibid=NALJD&colors=2&lang=de&notation=ALL\">Zeitschriften</a> von vor 1906 - nahezu 12 Millionen Seiten insgesamt. \n<br />Den Schwerpunkt bildet Wirtschaft im weitesten Sinne, einschließlich Politikwissenschaft, Geschichte und Soziologie sowie weiterer Spezialsammlungen zum Verkehrs-, Bank- und Finanzwesen sowie dem Handwerk.\nThe Making of the Modern World von Thomson-Gale ist eine wichtige Quellensammlung für die Wissenschaft, sowohl mit ihren Ausgaben von Werken herausragender Wirtschaftstheoretiker wie auch in ihrem Reichtum an seltenem Quellenmaterial zur Geschichte und zu den Auswirkungen der Ausdehnung des Welthandels, zur industriellen Revolution und zur Entwicklung des modernen Kapitalismus. (E-Book-Sammlung)"
