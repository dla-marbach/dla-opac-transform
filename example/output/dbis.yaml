noteContent_mv: |
  Die Universität Toronto veröffentlicht in Zusammenarbeit mit der Encyclopaedia Iranica Foundation (EIF) „Women Poets Iranica“, eine integrative Enzyklopädie postklassischer, moderner und zeitgenössischer Dichterinnen. Basierend auf jahrzehntelanger transdisziplinärer Forschung in der persischen Literaturwissenschaft bietet „Poets Iranica“ literaturhistorische Artikel über Dichterinnen und ihre poetische Wirkung, ihre Vorstellungskraft, ihre Tropen, Erzählungen und ihr Leben sowie die Herkunft und literarische Bedeutung ihrer Lyrik. Als digitale Enzyklopädie ist „Poets Iranica“ eine wissenschaftliche Neukonzeption der biografischen Wörterbücher (tazkirah) von Dichterinnen, die mit Fakhri Haravis „Javahir al-‘Ajayib“ (Juwelen der Wunder) aus der Mitte des 16. Jahrhunderts begannen. Die gut dokumentierten Artikel in „Women Poets Iranica“ wurden von Experten der persischen Literaturgeschichte und verwandter Gebiete verfasst und sind auf die vielfältigen Bedürfnisse von Studenten, Lehrern, Forschern und der gebildeten Öffentlichkeit zugeschnitten. Sie werden nach den höchsten Standards historischer Genauigkeit, Zuverlässigkeit und Zitierfähigkeit in den Geistes- und Sozialwissenschaften erstellt.
