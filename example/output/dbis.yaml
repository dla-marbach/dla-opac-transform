noteContent_mv: "Ebony ist eine amerikanische illustrierte Zeitschrift, die monatlich erscheint. 1945 von John H. Johnson in Chicago gegründet, war es das erste landesweit für afroamerikanische Leser herausgegebene Magazin. Ähnlich wie das LIFE-Magazin aufgebaut, war Ebony von Anfang an Erfolg bei seinem Publikum, der afroamerikanischen Mittelklasse, beschieden. Ursprünglich mit Geschichten auf schwarze Größen aus dem Showgeschäft und Sport fokussiert, erweiterte es später sein inhaltliches Spektrum auf alle Bereiche des afroamerikanischen Lebens. Mit einer Auflage von 1,2 Mio. Exemplaren (2011) gilt Ebony nach wie vor als größtes afroamerikanisches Magazin.<br /><br />\r\nVia Google Books lassen sich kostenfrei die gesamten Jahrgänge von 1959 - 2008 einsehen. Sowohl alle Zeitschriftenhefte als auch einzelne Ausgaben können nach Stichworten durchsucht werden. Auch lassen sich Permalinks erzeugen. Das Kopieren, Abspeichern oder Ausdrucken ist nicht möglich."
