noteContent_mv: Die Patrologia græca versammelt die Faksimiles der von Jean-Paul Migne zwischen 1857 und 1866 herausgegebenen Patrologiae Cursus Completus. Enthalten sind die 161 Bände sowie die Index-Bände (für weitere Informationen hierzu konsultieren Sie bitte die Sektion editorial principles auf der Webseite). Diese Datenbank umfasst somit Werke der griechischen Kirchenliteratur von Pseudo-Clemens 100 n. Chr. bis Kallistos im Jahr 1478 und macht damit die wichtigsten christlich-griechischen Autoren und die einflussreichsten Werke spätantiker und frühmittelalterlicher Theologie, Philosophie, Geschichte und Literatur zugänglich. Die Texte werden sachlich durch ein lateinisch- und griechischsprachiges Inhaltsverzeichnis, einen Autoren-, einen Werktitel- und einen Sachindex im Volltext erschlossen. Verfügbar in den Sprachen Englisch und Französisch.
