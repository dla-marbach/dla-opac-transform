noteContent_mv: 'Das National Film Board of Canada (NFB) ist die staatliche Filmbehörde Kanadas mit Sitz in Montreal. Sie wurde 1939 gegründet und untersteht dem Kunst- und Kulturministerium. Das NFB hat die Aufgabe, die kulturelle und gesellschaftliche Darstellung des Landes zu fördern und tritt als Filmproduzent und -verleiher gleichberechtigt für englisch- und französischsprachige Filme auf. Auf der Webseite des NFB sind eigenen Angaben zufolge über 3000 Dokumentar-, Spiel- und Animationsfilme hinterlegt. Mehrere hundert lassen sich kostenfrei abrufen, darunter der Oscar-prämierte und von der UNESCO zum Weltdokumentenerbe erklärte Kurzfilm <i>Neighbours</i> von Norman McLaren, der als erster die Pixilation-Filmtechnik verwendete sowie die ebenfalls mit dem Academy Award preisgekrönte Dokumentation <i>I’ll Find a Way</i> über den Alltag eines Mädchens mit Spina bifida. Diese Filme lassen sich über das Menü (Online-Streaming --> For home viewing) auswählen (Stand: 12/2015). (Video-Streaming-Portal)'
