id: DBIS105786
display: Archiv für Kindertexte Eva Maria Kohl
category: Digitale Nachschlagewerke
categoryMedium_mv: Online-Ressource
categoryPublication_mv: Bestandsverzeichnis, Biographische Datenbank, Portal
country_mv:
  - Deutschland
dateCataloged: "2024-01-26"
dateModified: "2025-09-30"
displayAddition1: Bestandsverzeichnis, Biographische Datenbank, Portal
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Das Archiv für Kindertexte an der Martin-Luther-Universität in Halle Wittenberg ist das weltweit einzige seiner Art und beherbergt mittlerweile ca. 100.000 Texte aus den letzten einhundert Jahren, die alle von Kindern und teilweise auch von Jugendlichen verfasst wurden. Kindheit und Jugend in unterschiedlichsten Zusammenhängen wird hier in Märchen, Versen, Geschichten und Erfahrungsberichten sprachlich artikuliert. Das Archiv birgt freie Texte aus reformpädagogischen Schulen um 1900, sprachliche Zeugnisse von Kindern aus der Zeit des Nationalsozialismus, Kindertexte von 1949-1989 aus beiden deutschen Staaten und zahlreiche weitere Sammlungen aus internationalen Schreibwettbewerben und kreativen Schreibwerkstätten und -projekten der jüngeren Vergangenheit. So z.B. enthält die Sammlung „Phantasien von Kindern aus aller Welt“ rund 3000 Texte aus 22 Ländern. Alle Texte sind im Rahmen des UNESCO-Alphabetisierungsprojektes „Wege zu Schrift und Kultur zu Kunstwerken aus verschiedenen Kulturkreisen entstanden (Zu ausgewählten Sammlungen).

  Besondere Relevanz hat in diesem Zusammenhang auch die mittlerweile mehr als 20.000 Texte umfassende Sammlung der Boedeckerstiftung, die im Rahmen eines bundesweiten und jährlich ausgeschriebenen Schreibwettbewerbs Kinder und Jugendliche zum Einsenden von freien Texten aufruft. Vor dem Hintergrund gegenwärtiger Diskussionen zu literarästhetischen Konzeptionen des Deutschunterrichts in der Grundschule hat die Sammlung „Schreibspielweise“ besondere Bedeutung. Sie umfasst Kindertexte und Schreibprojektdokumentationen der Kreisarbeitsgemeinschaft schreibender Grundschulkinder, die in der Lernwerkstatt des Institutes für Schulpädagogik und Grundschuldidaktik der MLU seit 2003 beheimatet ist. Seit 2009 ist das Archiv eine Sondersammlung der Universitäts- und Landesbibliothek Sachsen-Anhalt. 2017 wurde das Archiv mit dem Namenszusatz Eva Maria Kohl nach seiner Gründerin geehrt.

  Aktuellen Fragen der Schreibprozess- und Erzählforschung eröffnet diese umfangreiche Sammlung neue Möglichkeiten, Kindertexte in ihrer unmittelbaren Beziehung zu sprachdidaktisch innovativen Impulsen empirisch zu untersuchen.
