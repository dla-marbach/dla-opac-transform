id: DBIS7658
display: Zeno.org
category: Digitale Nachschlagewerke
categoryMedium_mv: Online-Ressource
categoryPublication_mv: Sammlung Nicht-Textueller-Materialien, Portal, Volltextdatenbank, Wörterbuch, Enzyklopädie, Nachschlagwerk
dateCataloged: "2020-08-18"
dateModified: "2025-08-13"
displayAddition1: Sammlung Nicht-Textueller-Materialien, Portal, Volltextdatenbank, Wörterbuch, Enzyklopädie, Nachschlagwerk
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Zeno.org präsentiert eine Epochen und Kulturen umspannende Sammlung literarischer Texte, eine Fülle von Lexika, Handbüchern und Nachschlagewerken sowie eine umfangreiche Bildersammlung.
  <ul>
  <li><b>Literatur:</b> <br /> Goethe, Schiller, Cervantes - das literarische Werk von mehr als 700 Autoren (Neu: Lexikon deutscher Frauen der Feder)</li>
  <li><b>Kunst:</b><br /> Bildersammlung mit mehr als 40.000 Werken von etwa 4.500 Künstlern und Künstlerinnen (Altdorfer, Bosch, Cézanne, Corinth, Dürer, Friedrich, Gauguin, Klimt, Liebermann, Macke, Manet, Monet, Schiele); Briefe, Schriften und Autobiographien bekannter Künstler, sowie 10.000 Ansichtskarten aus Deutschland um 1900, 5.000 Bildpostkarten aus der Zeit um 1900 und 5.000 Meisterwerke früher Fotografie.</li>
  <li><b>Musik:</b><br /> Biografien der bedeutendsten deutschen Komponisten (Bach, Beethoven, Brahms, Gluck, Händel, Haydn, Liszt, Mendelssohn-Bartholdy, Mozart, Schubert, Schumann, Wagner, Weber)</li>
  <li><b>Geschichte:</b><br /> Werke bedeutender Historiker des 19. Jahrhunderts (Burckhardt, Delbrück, Droysen, Graetz, Meyer, Mommsen, Pöhlmann); Der Nürnberger Prozeß, die Verhandlungsprotokolle und Materialien des Nürnberger Prozesses gegen die deutschen Hauptkriegsverbrecher</li>
  <li><b>Religion:</b><br /> Luther-Bibel in der Fassung von 1545 und in der revidierten Fassung von 1912; Reden Buddhas (Übersetzung: Neumann, Karl Eugen; Vollständiges Heiligenlexikon (Evangelist Stadler, Johann nach der der fünfbändigen Originalausgabe von 1858 bis 1882</li>
  <li><b>Sprache:</b><br /> „Ausführliches lateinisch-deutsches Handwörterbuch“ und „Kleines deutsch-lateinisches Handwörterbuch“ (Georges, Karl Ernst); Griechisch-deutsches Handwörterbuch (Papes, Wilhelm); Deutsches Sprichwörter-Lexikon (Wander, Karl Friedrich Wilhelm)</li>
  <li><b>Philosophie/Soziologie:</b><br /> umfassende Auswahl zu dem Werk der bekanntesten Philosophen von der Antike bis in die Neuzeit (Platon, Aristoteles, Cicero, Thomas von Aquin, Blaise Pascal, Francis Bacon, René Descartes, Voltaire, Immanuel Kant, Jean Paul, Ludwig Feuerbach, Charles Darwin, Arthur Schopenhauer, Friedrich Nietzsche, Karl Marx, Max Weber).</li>
  <li><b>Kulturgeschichte:</b><br /> Dokumente der Kulturgeschichte, unter anderen: Deutsches Sprichwörter-Lexikon, Wander; Mythologisches Lexikon, Hederich; Allgemeine Theorie der Schönen Künste, Sulzer; Anstandsbücher von Knigge, Junker, Schramm und Leisi; Deutsche Buchhändler, Schmidt; Deutsche Buchdrucker und Friedländers Interessante Kriminal-Prozesse; Märchen der Welt, Reallexicon der Deutschen Altertümer</li>

  <li><b>Naturwissenschaften:</b><br /> historische Standardwerke der Biologie: Tierleben, Brehm; Fauna Germica, Reitter; Über die Entstehung der Arten, Darwin; Autobiographien bekannter Mediziner, Chemiker, Ingenieure und Physiker; Lexikon der gesamten Technik [Otto Lueger in 10 Bänden (1904–1920)]; Enzyklopädie des Eisenbahnwesens [Dr. Freiherr v. Röll in 10 Bänden (1912–1923)]</li>

  <li><b>Lexika:</b><br /> Auswahl historisch bedeutsamer Lexika: Conversations-Lexikon (1809–1811); Damen Conversations Lexikon (1834–1838); Bilder-Conversations-Lexikon (1837–1841); Herders Conversations-Lexikon (1854–1857); Pierers Conversations-Lexikon (1857–1865); Brockhaus Kleines Konversations-Lexikon (1911); Meyers Großes Konversationslexikon  (6. Aufl.; 1905-1909)</li>

  </ul>
schemaVersion: 0.16.0
