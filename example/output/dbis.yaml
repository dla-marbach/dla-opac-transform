noteContent_mv: 'Etymologisches Wörterbuch der modernen, überregionalen niederländischen Sprache. Das Wörterbuch erschien zugleich gedruckt in vier Bänden (2003 – 2009). Die Online-Version wird regelmäßig aktualisiert und verfügt über 10.000 Einträge in denen insgesamt 13.000 Wörter beschrieben werden. Die Basisauswahl der Wörter erfolgte anhand des Van Dale Groot woordenboek van hedendaags Nederlands und Verschueren Groot encyclopedisch woordenboek. Wörter aus nicht standardisierten Sprachvarietäten (z. B. niederländische Umgangs- oder Regionalsprache) sind nur in Auswahl vorhanden. [Die ehemals lizenzpflichtige Online-Ressource ist seit Januar 2025 frei im Internet verfügbar.] '
