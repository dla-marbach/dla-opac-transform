noteContent_mv: "Mit diesem Nachschlagewerk wird die schweizerische Theaterentwicklung dokumentiert. Das TLS bietet einen breiten thematischen, topographischen und personellen Überblick über die schweizerische Theaterlandschaft von den Anfängen bis zur Gegenwart.<br>\r\nIn rund 3.600 Artikeln werden Personen, Gruppen, Spielstätten und Institutionen der verschiedenen Theaterformen wie Stadttheater, Freie Gruppen, Amateur- und Volkstheater, Kinder- und Jugendtheater, Puppentheater, Musiktheater und Tanztheater erfasst. Sachartikel erläutern Theaterformen und Ereignisse des Schweizer Theaters in Vergangenheit und Gegenwart. Die Spezifika des Theaterschaffens in den vier Sprachregionen werden zum ersten Mal umfassend dokumentiert und in ihrem nationalen und internationalen Kontext dargestellt. \r\n<br>So ist ein viersprachiges Werk erstanden, das sowohl für Fachleute als auch für die theaterinteressierte Öffentlichkeit von grossem Nutzen sein wird. Die dreibändige illustrierte Buchausgabe des TLS ist 2005 im Chronos Verlag Zürich erschienen."
