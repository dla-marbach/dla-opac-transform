displayName: Deutsches Historisches Institut in Rom
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Ferdinand Gregorovius hat mehr als zwanzig Jahre in Rom gelebt und hier sein Hauptwerk, die „Geschichte der Stadt Rom im Mittelalter“, geschrieben, das ihm 1876 die römische Ehrenbürgerwürde einbrachte. Neben seinem historiographischen und schriftstellerischen Œuvre hat er mehrere Tausend Briefe hinterlassen, in denen er als Zeitzeuge die italienische und die deutsche Wissenschafts-, Zeit- und Kulturgeschichte des 19. Jahrhunderts beleuchtet. Da die Verlags-Briefe an und von Cotta sowie die an Brockhaus nahezu vollständig erhalten sind, erlauben diese einen konkreten Blick auf die Arbeitsbedingungen und in die Werkstatt eines außerhalb der akademischen Historiographie schreibenden Privatgelehrten und sind damit wissenschaftsgeschichtlich von höchster Relevanz.
  Auf der Basis einer systematischen Recherche in deutschen und italienischen Archiven konnten insgesamt etwa 3000 Briefe von und an Gregorovius in etwa 50 Archiven und privaten Sammlungen nachgewiesen werden – die weitaus meisten davon unpubliziert. Die „Gesammelten deutschen und italienischen Briefe“ erschließen eine repräsentative Auswahl von 600 bis 700 Briefen von Ferdinand Gregorovius als kritische digitale Edition in der jeweiligen Originalsprache mit umfassenden Kommentaren.
  Die Betaversion der Website präsentiert den aktuellen Stand der Arbeit an den Texten und Datensätzen und wird in regelmäßigen Abständen aktualisiert und in den Funktionalitäten weiterentwickelt. Die Edition richtet sich an Wissenschaftler und alle interessierten Leser; sie ist auch auf mobilen Endgeräten nutzbar.
