noteContent_mv: "Die Datenbank versteht sich als Rekonstruktion der berühmten Büchersammlung Ludwig Tiecks (1773-1853). Tiecks Bibliothek enthielt wertvolle und seltene Drucke vom 16. Jahrhundert bis zu seiner Gegenwart und wurde 1849/50 in einer Auktion in Berlin verkauft, wodurch sie in ganz Europa verstreut wurde. Die Datenbank vereint die Bestände auf virtueller Ebene wieder und verzeichnet die heutigen Standorte der Bücher. Ihr Inhalt beruht dabei maßgeblich auf dem Auktionskatalog (Catalogue de la bibliothèque célèbre de M. Ludwig Tieck qui sera vendue à Berlin le 10. décembre 1849 et jours suivants par MM. A. Asher & Comp. Berlin 1849). \nZu all jenen Bänden, deren gegenwärtiger Standort ermittelt werden konnte, finden sich ausführliche Beschreibungen ihrer materiellen Eigenschaften in der Datenbank. Zudem sind – wo vorhanden – die digitalen Ausgaben dieser Bücher verlinkt."
