noteContent_mv: Online-Archiv des PEN American Center mit Zugriff auf über 1500 Stunden an Audio- und Videomaterial ab 1966 ff. Die digitalisierten Aufnahmen enthalten Interviews, Podiumsdiskussionen, Ehrungen und Konferenzen mit über 2200 Autoren, Intellektuellen, Nobelpreisträgern, Sozialreformern, Philosophen und Politikern aus dem Archiv der amerikanischen Schriftstellervereinigung und Menschenrechtsorganisation an der Princeton University. Inhaltlich abgedeckt werden u. a. auch Themen wie der Kalte Krieg, der Beginn der amerikanischen Bürgerrechtsbewegung, der Vietnamkrieg, die Geiselnahme von Teheran (1979), der Ausbruch der Immunschwäche-Krankheit HIV/AIDS bis zu den Terroranschläge am 11. September 2001. Unter den Autoren sind so bekannte Namen wie Chinua Achebe, Edward Albee, Maya Angelou, James Baldwin, E. L. Doctorow, Joan Didion, Umberto Eco, Allen Ginsberg, Nadine Gordimer, Jamaica Kincaid, Mario Vargas Llosa, Norman Mailer, Arthur Miller, Toni Morrison, Haruki Murakami, Pablo Neruda, Flannery O’Connor, Michael Ondaatje, Grace Paley, Salman Rushdie, Edward Said, Susan Sontag oder Amy Tan vertreten.<br /><br />Für die Distribution der Audiodateien fungiert der Anbieter SoundCloud, für die Videos das Portal YouTube.
