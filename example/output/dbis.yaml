dateModified: "2025-10-29"
displayAddition1: Biographische Datenbank, Fachbibliographie, Volltextdatenbank, Wörterbuch, Enzyklopädie, Nachschlagwerk
displayName: Cologne Center for eHumanities (CCeH), University of Cologne
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Das Projekt Oral Tales of Mongolian Bards widmet sich der Internet-Publikation von achtzehn mündlichen Erzählungen, die von Barden der östlichen Inneren Mongolei vorgetragen wurden, darunter vier epische Gedichte und vierzehn Erzählungen, die auf chinesischen Abenteuerromanen basieren, bekannt als quγur-un üliger Erzählungen der Fiedel, d.h. Erzählungen, die von der Musik der viersaitigen Fiedel (quγur, huur) begleitet werden. Die Erzählungen bilden einen Teil einer großen Sammlung von Märchen, mündlichen Erzählungen von Barden und rituellen Liedern von Qorčin (Horchin) mongolischen Schamanen. Die Sammlung wird heute in der Nordrhein-Westfälischen Akademie der Wissenschaften und Künste in Düsseldorf aufbewahrt. Elf der Erzählungen sind mit langen englischen Zusammenfassungen versehen, fünf davon mit Kommentaren, während sieben Erzählungen mit kurzen Zusammenfassungen zugänglich gemacht werden.

  Wie die Erzählungen zu einer Sammlung wurden: der verstorbene Professor Walther Heissig, der angesehene Mongolist der Universität Bonn, hat in den Jahren 1984, 1986, 1991 und 1995 einen Teil der Erzählungen aus dem mündlichen Vortrag von Barden (quγurči, der Fiedler) in verschiedenen Regionen der östlichen Inneren Mongolei auf Tonband aufgenommen.
