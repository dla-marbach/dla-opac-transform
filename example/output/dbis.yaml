noteContent_mv: |-
  Goethes Werke umfaßt den vollständigen Text der 143 Bände der Weimarer Ausgabe.<br />

  Jedes Wort der literarischen und wissenschaftlichen Werke Goethes, seiner Tagebücher und seiner Briefe ist in der Weimarer Ausgabe enthalten. Überdies werden sämtliche Abbildungen der Weimarer Ausgabe eingescannt. Die Datenbank umfaßt den gesamten wissenschaftlichen Apparat einschließlich der Lesarten, Paralipomena sowie Sach- und Personenregister.<br />

  Goethes Werke enthält außerdem Goethes Gespräche, herausgegeben von Woldemar Freiherr von Biedermann, Leipzig, 1889-96, und Goethes Werke, Nachträge zur Weimarer Ausgabe, herausgegeben von Paul Raabe, München, 1990. Die Ausgabe der Gespräche von Woldemar Freiherr von Biedermann wurde ausgewählt, weil sie sich mehr als andere Ausgaben auf Goethes gesprochene Worte stützt. In den Nachträgen sind alle die Briefe Goethes gesammelt, die nach Fertigstellung der Weimarer Ausgabe entdeckt wurden.
