noteContent_mv: "Die Gazette de Berne war die wichtigste Berner Nachrichtenzeitung des 18. Jahrhunderts. Sie erschien von 1689–1787 unter dem Namen Nouvelles de divers endroits und von 1788–1798 als Nouvelles politiques, war jedoch bei ihren Lesern als Gazette de Berne bekannt. Die Zeitung erschien zweimal pro Woche. Insgesamt existieren über 40‘000 digitalisierte Seiten. Leider sind nur noch etwa zwei Drittel der publizierten Ausgaben in verschiedenen Bibliotheken verstreut vorhanden.<br />\r\nDie Gazette de Berne wollte die politischen Kreise Berns mit den bedeutsamsten Vorgängen des Auslandes bekannt machen. Den Hauptbestandteil bilden Korrespondenzen aus vielen Gegenden der Welt mit einem Schwergewicht auf der Berichterstattung aus Paris und London. Nur vereinzelt wurden politisch unverfängliche Nachrichten aus Bern oder der Eidgenossenschaft publiziert. Durch den Abdruck von Ereignisberichten von Korrespondenten aus weit entfernten Städten lag in der Regel eine grössere Zeitspanne zwischen einem Ereignis und dessen Bekanntwerden.<br />\r\nIm Internet kann man die Zeitungsseiten als Faksimile anschauen. Eine Zugangsmöglichkeit ist der Einstieg über ein bestimmtes Datum. Ein anderer Zugang ist die Suche im Volltext, welche die Treffer markiert anzeigt."
