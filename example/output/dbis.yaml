noteContent_mv: "Journalistikon ist ein deutschsprachiges Wörterbuch der Journalistik. Es bietet diverse Zugangsmöglichkeiten zu Schwerpunkten und einzelnen Artikeln: Nutzer haben die Wahl zwischen einer freien oder schlagwortbasierten Suche sowie einigen Überblicksartikeln, die in Themen wie Berufsethik, journalistische Kulturen, Nachrichtenfaktoren oder die Geschichte des Journalismus einführen und dann zu weiterführenden Detaileinträgen geleiten. Der Leser kann sich den Inhalten auch über eine klassische Alphabetstruktur oder anhand der Autoren nähern.<br>\r\nWissenschaftler aus dem gesamten deutschsprachigen Raum haben für dieses Wörterbuch der Journalistik ein Kollektiv gebildet und bestücken das Lexikon kontinuierlich mit Artikeln.<br>\r\nDieses Wörterbuch wendet sich nicht nur an Wissenschaftler oder Studierende entsprechender Fachrichtungen, sondern an jeden, der sich für Journalistik und praktischen Journalismus interessiert und sich als Mediennutzer oder Medienhandwerker an einem reflektierenden Zugang versuchen möchte."
