noteContent_mv: "Auf der Grundlage von: Die deutsche Literatur des Mittelalters. Verfasserlexikon. Zweite, völlig neu bearbeitete Auflage herausgegeben von Kurt Ruh u.a., Berlin/New York 1978 ff. (bisher 14 Bände) sowie ergänzender Informationen aus der Berliner Handschriften-Datenbank stellt das Projekt erstmals ein Verzeichnis sicherer und mutmaßlicher mittelalterlicher Autographen und Originale zusammen, die zwischen dem 9. und dem frühen 16. Jahrhundert auf dem Boden des mittelalterlichen deutschen Reiches entstanden sind. Verzeichnet werden dabei sowohl lateinische wie auch deutschsprachige Texte. Die Datenbank ist fertiggestellt und ist seit Juli 1999 im Internet. Sie umfasst gegenwärtig etwa ein halbes Tausend Handschriften.\r\n<!-- Altes Buch -->"
