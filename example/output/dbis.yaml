noteContent_mv: Der U.S. Congressional Serial Set 1817-1980 enthält in digitalisierter Form über 12 Millionen Seiten von 350.000 Publikationen sowie 52.000 Karten (Serial Set Maps). Die Publikationen stammen aus Gremien und Arbeitsgruppen des US-Kongresses sowie von Regierungsbehörden. Die Datenbank bietet damit eine Fülle an Materialien zu allen Bereichen der Geschichte, Politik, Wirtschaft und Kultur der Vereinigten Staaten, aber vielfach auch darüber hinaus, sofern die Beziehungen zu anderen Ländern miteinbezogen sind. Mit enthalten ist auch der Zugriff auf die American State Papers, 1789-1838.
