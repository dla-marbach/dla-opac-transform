noteContent_mv: Das seit Mai 2005 laufende Projekt verfolgt das Ziel, die bibliographischen Daten zur Forschungsliteratur über die Handschriften der Herzog August Bibliothek in einer Datenbank zugänglich zu machen. Bisher liegen Nachweise handschriftlich in durchschossenen Exemplaren der gedruckten Kataloge sowie in Form eines Zettelkataloges mit weit über 10.000 Einträgen vor. Der weitaus größte Teil der hier nachgewiesenen Literatur betrifft die mittelalterlichen Handschriften der Herzog August Bibliothek. Im Rahmen des Projekts werden diese Daten in eine Datenbank übertragen, die über die Homepage der Herzog August Bibliothek zugänglich ist. Ziel des Projekts ist ferner eine Verknüpfung mit den Katalogisaten derjenigen Wolfenbütteler Handschriften, die bereits in der Handschriftendatanbank Manuscripta Mediaevalia greifbar sind (gegenwärtig die Blankenburger, Weissenburger und die mittelalterlichen Handschriften der Gruppen Extravagantes, Novi und Novissimi).
