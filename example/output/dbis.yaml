filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: 'Die Plakatdatenbank ermöglicht die Recherche in einem Teilbereich der Plakatsammlung der Bibliothek für Zeitgeschichte in der Württembergischen Landesbibliothek. Die gesamte Sammlung umfasst circa 30.000 Bild- und Schriftplakate seit der Kaiserzeit bis in das Jahr 2005. Recherchierbar in dieser Datenbank sind die Plakate aus der Zeit des Ersten Weltkriegs, der Weimarer Republik, des Dritten Reichs und Teile der Sammlung aus dem Zeitraum von 1945 bis 1970er Jahre. Den thematischen Schwerpunkt des Bestandes bilden die deutschen politischen Plakate. Neben den von namhaften Plakatkünstlern gestalteten Blättern enthält die Sammlung auch zahlreiche Schriftplakate: Bekanntmachungen – so genannte Maueranschläge – von Verordnungen und Gesetzen sowie Werbeplakate für Veranstaltungen. Hervorzuheben sind hier die Bekanntmachungen der deutschen Militärbehörden während des Ersten Weltkriegs und der französischen Besatzungsbehörden im Rheinland 1918/19, aber auch die Gesetzesaushänge der Alliierten nach 1945. Eine Reihe von Plakaten dokumentiert die politischen Veranstaltungen vom Ende der Weimarer Republik in Stuttgart.'
noteRequirements_mv:
  - "Die Datenbank enthält zurzeit über 4500 Datensätze, davon ca. 2500 mit Abbildung. Sukzessiv werden weitere Digitalisate eingebunden.\r\n\r\nWir bitten um Verständnis, dass auch aus urheberrechtlichen Gründen leider nicht alle Datenbankeinträge mit Abbildungen gezeigt werden können. Wir bemühen uns, sämtliche Urheberrechte zu berücksichtigen. Bitte wenden Sie sich an uns, wenn Sie Ihre Rechte an der Abbildung verletzt glauben."
publicationHistory: 1914-2005
