noteContent_mv: |-
  Enthalten sind biografische und bibliografische Daten zu Personen, die im Gebiet des heutigen Österreich, zumindest zeitweilig, tätig waren und sich, in welcher Form auch immer, mit Fotografie beschäftigt haben. Von Österreichern, die vorwiegend oder ausschließlich im Ausland tätig waren oder sind, sind nur die wesentlichen Daten verzeichnet.
  <br />Berücksichtigt sind im wesentlichen Aktivitäten ab 1839, aber auch relevante Daten aus den Jahren vor Erfindung der Fotografie. Für den Zeitraum bis 1945 wurden sämtliche Jahrgänge aller österreichischen Fotozeitschriften nahezu vollständig bearbeitet. Für die Jahre nach 1945 sind lediglich jene Personen vollständig verzeichnet, die im Lexikon zur Österreichischen Fotografie (in: Geschichte der Fotografie in Österreich, Band 2, hrsg. von Otto Hochreiter und Timm Starl im Auftrag des Vereins zur Erarbeitung der Geschichte der Fotografie in Österreich, Bad Ischl 1983, S. 93-209) aufgenommen worden sind.
