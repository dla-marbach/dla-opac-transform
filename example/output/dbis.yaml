noteContent_mv: Das Ziel des Projekts ist es, die deutschsprachige Lyrik des 12. und 13. Jahrhunderts neu aus den Quellen herauszugeben, und zwar in Form einer frei verfügbaren Online-Ausgabe. Die elektronische Edition ermöglicht erstmals die von der Forschung seit längerem entschieden eingeforderte Überlieferungsnähe, da sie neben dem Editionstext auch Digitalisate und Transkriptionen der Handschriften anbieten und jede denkbare Synopse erzeugen kann. Mit der Neuedition werden Leiche, Minnelieder und Sangsprüche des Hochmittelalters in zeitgemäßer, einheitlicher und leicht zugänglicher Gestalt vorliegen, während sie bisher auf eine Vielzahl überwiegend veralteter, höchst unterschiedlicher und vielfach vergriffener Ausgaben verstreut sind.
