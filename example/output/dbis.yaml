noteContent_mv: "Von 1902 bis 1914 haben vier deutsche Expeditionen in Chinesisch-Turkestan unzählige Texte in einer Vielzahl von Schriften und Sprachen geborgen und nach Berlin gebracht. Diese Texte sind Eigentum der BBAW und werden kuratorisch und restauratorisch von der Orientabteilung der Staatbibliothek Berlin Stiftung Preußischer Kulturbesitz betreut. Die Arbeitsstelle Turfanforschung der Berlin-Brandenburgischen Akademie der Wissenschaften beschäftigt sich mit den alttürkischen und iranischen Funden. \nSie ist Partnerinstitution im internationalen Kooperationsprojekt „International Dunhuang Project“ der British Library, das Informationen und Digitalisate aller Manuskripte, Gemälde, Textilien und Artefakte aus Dunhuang und anderen Fundstätten an der Seidenstraße im Internet frei nutzbar machen will."
