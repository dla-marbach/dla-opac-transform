noteContent_mv: |-
  <b>BDO - Bayerns Dialekte Online</b> ist das digitale Sprachinformationssystem des <b>Bayerischen Wörterbuchs (BWB)</b>, des <b>Fränkischen Wörterbuchs (WBF)</b> und des <b>Dialektologischen Informationssystems von Bayerisch-Schwaben (DIBS)</b>. Die Eingliederung der Bayerischen Dialektdatenbank (BayDat) ist geplant.<br /><br />
  Die Datenbank vereint die Forschungsergebnisse der Mundartforschung an der Bayerischen Akademie der Wissenschaften und präsentiert Wörterbuchartikel sowie Forschungsdaten in einem frei zugänglichen Onlinetool.<br /><br />
  <b>BWB</b> und <b>DIBS</b> bestehen aus redaktionell erarbeiteten und in erster Linie nach Bedeutungen gegliederten Wortartikeln auf Basis der gesamten Materialsammlung; für jede einzelne Bedeutung wird eine beleggestützte geographische Verbreitung angegeben und durch eine beispielhafte Belegauswahl veranschaulicht.<br />
  Im <b>WBF</b> liegt der Fokus auf der Aufbereitung und Publikation der gesammelten Daten, die in ihrer Gesamtheit in Form einer Datenbank präsentiert und aus denen in der Zusammenschau automatisierte Wortartikel erstellt werden. <br /><br />
  Die Datenbank wird kontinuierlich um Funktionen und Daten erweitert. Aktuell befinden sich 136.201 Artikel in der Datenbank mit insgesamt 165.373 Bedeutungen und 793.341 Einzelbelegen. (Stand: September 2023)
