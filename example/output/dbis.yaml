noteContent_mv: |-
  Pascal und Francis sind zwei vom französischen CNRS betriebene bibliographische Aufsatzdatenbanken mit 14 Mio. Literaturnachweisen aus Fachzeitschriften und Tagungsbänden (Stand: 11/2016). Seit Mai 2016 stehen beide zuvor lizenzpflichtigen Produkte kostenfrei zur Verfügung.<br />
  Pascal enthält bibliographische Literaturnachweise aus den Bereichen Naturwissenschaften, Technik und Medizin (12 Mio. Nachweise).<br />
  Francis enthält Nachweise aus ca. 2300 Zeitschriften der Geistes- und Sozialwissenschaften (zwei Mio. Nachweise). Die Geschichtswissenschaften werden nicht ausgewertet, aber verwandte Fachgebiete wie Kunstgeschichte, Literaturgeschichte, Religionsgeschichte, Technik- und Wissenschaftsgeschichte, Archäologie und Vorgeschichte, ferner Geographie, Ethnographie, Linguistik etc.<br /><br />
  Bei der Recherche werden beide Datenbanken gleichzeitig abgefragt. Dies führt zu hohen Treffermengen, vor allem aus dem Gebiet der Naturwissenschaften. Das nachträgliche Filtern nach Datenbank bzw. weiteren Kriterien (z. B. Disziplin, Sprache, Publikationsland) ist nicht immer zuverlässig. Bei den Verfassern werden verschiedene Namensvarianten nicht zusammengeführt bzw. gleichnamige Autoren nicht unterschieden.
