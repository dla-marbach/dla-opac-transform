noteContent_mv: 'Das »Deutsche Sprichwörter-Lexikon« wurde zwischen 1830 und 1880 von dem bekannten Pädagogen und Revolutionär Karl Friedrich Wilhelm Wander erarbeitet. Es umfasst in der von 1867 bis 1880 erschienenen Erstausgabe fünf Quartbände und enthält nicht weniger als 250.000 Sprichwörter (Deutsches Sprichwörter-Lexikon. Ein Hausschatz für das deutsche Volk. Herausgegeben von Karl Friedrich Wilhelm Wander, Band 1-5, Leipzig: F.A. Brockhaus, 1867, 1870, 1873, 1876, 1880. Reprints: Aalen: Scientia-Verlag, 1963; Darmstadt: Wissenschaftliche Buchgesellschaft, 1964; Kettwig: Akademische Verlagsanstalt Athenaion, 1987; Augsburg: Weltbild Verlag, 1987). Das Lexikon hat seinen Schwerpunkt im deutschsprachigen Raum, verzeichnet aber nicht nur deutsche Sprichwörter. Da es stets auch auf parallele Wendungen in anderen europäischen und außereuropäischen Sprachen hinweist, ist es eine der universellsten und vollständigsten Sprichwörtersammlungen überhaupt und in seinem Rang nur mit dem Grimmschen Wörterbuch zu vergleichen. <br />'
