noteContent_mv: |-
  Der elektronische Katalog der Wolfenbütteler Lutherdrucke 1513 bis 1546 enthält die Beschreibung von 6.000 Drucken Martin Luthers, die zu seinen Lebzeiten erschienen sind. Neben der sorgfältigen Beschreibung bietet der Katalog vor allem sämtliche Illustrationen der Werke, sowohl auf den Titelblättern als auch im Text, abgebildet und beschrieben.
  Der Katalog erlaubt vielfältige Recherchen in normalisierten Indizes. Ausgaben können nach den Kriterien Titel, Drucker, Jahr, Ort, bibliographische Nummer (Weimarer Ausgabe, Benzing, VD 16), Provenienzen nach Vorbesitzern und Illustrationen im Volltext der Bildbeschreibungen gesucht werden. Das Portal wird ergänzt durch erläuternde Texte zur Sammlung, zur Entstehung des Kataloges und Methodik der Erfassung sowie einer Auswahl der wichtigsten Literatur.
