noteContent_mv: "Die digitale Bibliothek der Französischen Nationalbibliothek (BnF) umfasst 6,7 Millionen Dokumente (Stand: Mai 2020). Darunter befinden sich rund 692.000 Bücher (mehr als die Hälfte volltextdurchsuchbar), 176.000 Karten, 146.000 Handschriften, 1,4 Mio. Bilder, 51.000 Noten, 51.000 Tonaufnahmen und über 4 Mio. Zeitschriften- und Zeitungsausgaben.<p>\nDer Großteil sind urheberrechtsfreie Werke (deren Autor mind. 70 Jahre tot ist) aus dem Beständen der BnF. Daneben stammt ein Drittel der derzeit 70.000 jährlich von der BnF digitalisierten Drucke aus rund fünfzig Partnerbibliotheken. </p><p>\n\nInhaltlicher Schwerpunkt ist die französische Kulturgeschichte vom Mittelalter bis zum Ende des 19. Jahrhunderts, darunter Belletristik, wissenschaftliche Literatur, Wörterbücher, Zeitschriften, Handschriften. Die meisten urheberrechtsfreien Bücher und Zeitschriften können für nicht-kommerzielle Nutzung kostenlos heruntergeladen werden.\n</p><p>\n<b>Einige wichtige Inhalte:</b>\n</p><ul>\n<li><a href=\"http://gallica.bnf.fr/ark:/12148/cb32894811q/date.r=zeitschrift+romanische+philologie+bibliographie.langDE\">Zeitschrift für Romanische Philologie. Supplement: Bibliographie</a><br />\n(Berichtszeit 1875 - 1939)<br />\nund den Nachfolger<br />\n<a href=\"http://gallica.bnf.fr/ark:/12148/cb344706074/date.r=romanische+bibliographie.langDE\">Romanische Bibliographie</a><br />\n(Jahrgänge 1965 - 1992 = Berichtszeitraum 1961 - 1990)<br /> \nDiese enthält Veröffentlichungen zur romanischen Sprach- und Literaturwissenschaft (ab Band 1971/72 ohne die französische Literaturwissenschaft), Monographien und Artikel aus zahlreichen Zeitschriften, Kongressschriften und Sammelwerken.</li>\n<li><a href=\"http://gallica2.bnf.fr/ark:/12148/bpt6k926030\">Journal Général de la Littérature de France</a><br />\nDigitalisierte Ausgaben der Jahre 1798-1826. Rezensionszeitschrift zur französischsprachigen Literatur</li>\n<li><a href=\"http://gallica2.bnf.fr/ark:/12148/cb34348270x/date\">Bibliographie de la France</a><br />\nDigitalisierte Ausgaben der Französischen Nationalbibliographie für die Jahre 1811-1971</li>\n<li><a href=\"http://gallica2.bnf.fr/ark:/12148/bpt6k206459d\">Bibliographie Biographique Universelle Tome Premier (A-M)</a></li>\n<li><a href=\"http://gallica2.bnf.fr/ark:/12148/bpt6k206460b\">Bibliographie Biographique Universelle Tome Second (N-Z)</a></li>\n</ul>\n"
