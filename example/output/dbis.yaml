noteContent_mv: "Diese Online Reference macht die bekanntesten, umfangreichsten und zuverlässigsten Nachschlagewerke zur deutschen Literatur erstmals systematisch elektronisch nutzbar: Das \"Deutsche Literatur-Lexikon\", begründet von Wilhelm Kosch, und die flankierenden Reihen (\"Deutsches Literatur-Lexikon. Das 20. Jahrhundert\", \"Deutsches Literatur Lexikon. Das Mittelalter\") sind einzigartig in ihrer umfassenden Darstellung. Zeitlich reichen sie vom frühen Mittelalter bis zur jüngsten Gegenwart. Schriftstellerinnen und Schriftsteller aus der BRD, der ehemaligen DDR, der Schweiz und Österreich sowie zahlreiche auf Deutsch schreibende Autorinnen und Autoren aus anderen europäischen Ländern sind aufgenommen. Die Artikel enthalten neben Informationen zu Leben und Werk der Autorinnen und Autoren ausführliche Hinweise auf Forschungsbeiträge zu einzelnen Werken. Die Bände zum Mittelalter verzeichnen das deutschsprachige Schrifttum vom 8. bis zum ausgehenden 15. Jahrhundert und bilden die Literatur des Mittelalters systematisch aufgefächert in Gattungen und Themenkreisen ab.<br /><br /> \nÜber 70.000 Artikel sind digital aufbereitet und mit differenzierten Kriterien gezielt durchsuchbar. Mit ihrem Schwerpunkt auf der Literatur der Gegenwart ist diese Online Reference die ideale Ergänzung für die \"Verfasser-Datenbank\", die vorwiegend das Mittelalter und die Frühe Neuzeit in den Blick nimmt.<br /><br /> \nDie Online Reference enthält 46 Bände des \"Deutschen Literatur-Lexikons\", 8 Bände des \"Deutschen Literatur-Lexikons. Das Mittelalter\" und 35 Bände des \"Deutschen Literatur-Lexikons. Das 20. Jahrhundert\". Ein letzter Nachtragsband des \"Deutschen Literatur-Lexikons\" wird 2021 erscheinen und in die Online Reference aufgenommen. Bis zum Abschluss des \"Deutschen Literatur-Lexikons. Das 20. Jahrhundert\" kommt jährlich der Inhalt von zwei Bänden hinzu. <br /><br /> \nZweimal pro Jahr (Mai und November) werden zahlreiche Artikel auf den neuesten Stand gebracht."
