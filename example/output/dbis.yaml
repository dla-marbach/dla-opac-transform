displayName: Thüringer Universitäts- und Landesbibliothek Jena
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Das von der DFG und dem polnischen NCN geförderte Projekt widmet sich der Erschließung, Edition und Analyse umfangreicher, häufig noch unveröffentlichter Dokumente aus der in der Jagiellonen Bibliothek in Kraków aufbewahrten Sammlung Varnhagen. Angelegt vom Diplomaten und Publizisten Karl August Varnhagen von Ense (1785–1858), dem Ehemann der berühmten Berliner Schriftstellerin und Salonnière Rahel Levin Varnhagen (1771–1833), und fortgeführt von dessen Nichte Ludmilla Assing (1821–1880), entwickelte sich die Sammlung zu einer der größten und bedeutendsten Autographensammlungen des 19. Jahrhunderts.<br>\r\n<br>Die Bedeutung, die Schriftstellerinnen in dieser Kollektion zukommt, ist bemerkenswert, auch im Vergleich zu anderen größeren Sammlungen der Zeit, und kann als Korrektiv für die lange Zeit an männlichen Geistesgrößen orientierte Darstellung der Kultur- und Literaturgeschichte verstanden werden. Neben bekannten Namen wie Bettina von Arnim, Sophie Mereau-Brentano oder Rahel Levin Varnhagen finden sich in der Sammlung auch weniger bekannte oder vergessene Schriftstellerinnen, die in der Regel nicht zum literarischen Kanon gerechnet werden, unter ihren Zeitgenossen jedoch hohe Anerkennung gefunden haben und eine wichtige Rolle im literarischen Leben der Zeit spielten. Ihre Briefe, Werke und Relationen sind der Gegenstand des Projekts. <br>\r\n\r\n<br>Im Zentrum stehen die Nachlässe der Schriftstellerinnen Charlotte von Ahlefeld (1777–1849), Helmina von Chézy (1783–1856), Caroline de la Motte Fouqué (1773–1831), Amalie von Helvig (1776–1831), Amalia Schoppe (1791–1858), Fanny Tarnow (1779–1862), Karoline von Woltmann (1782–1847) und Amalie von Voigt (1778–1840). Durch Briefwechsel und vielfältige Beziehungen im literarischen Feld waren ihre Lebensläufe untereinander verbunden. Ihre teils unkonventionellen Biographien ermöglichen es auch, diese Frauen als Kulturvermittlerinnen zwischen Ländern und Kulturen, beispielsweise zwischen Deutschland, Frankreich, England und den USA, zu betrachten. Das ausgewählte Manuskriptkorpus spiegelt die Vielfalt dieses Beziehungsnetzwerkes. Darüber hinaus untersucht das Projekt den weiteren Kontext des Korpus innerhalb der Sammlung Varnhagen sowie perspektivisch auch mit Blick auf weitere einschlägige Sammlungen. <br>"
