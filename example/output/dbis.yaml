noteContent_mv: "WAAMD (früher AMMS) ist eine zweisprachige Datenbank (englisch, arabisch), die Ende der 1980er Jahre an der University of Illinois entwickelt wurde, um eine Sammlung arabischer Handschriften im südlichen Mauretanien (Boutilimit) zu beschreiben.<br>\r\nIn der Folge wurde ein Verbundkatalog mit weiteren westafrikanischen Sammlungen einschließlich Handschriftenbibliotheken in Westafrika, Europa und den Vereinigten Staaten erstellt.<br>\r\nDie Datenbank verfügt über fünf interaktive Datensätze zu records, authors, subjects, nisbas und den Handschriftensammlungen selbst. Die Suchmaschine identifiziert Handschriften und Autoren, auch wenn  arabische oder lateinische Buchstaben nur fragmentarisch erhalten sind.<br><br>\r\nInformationen zu den Beständen folgender Handschriftensammlungen können abgerufen werden:<ul>\r\n<li>Boutilimit Ahl Sidiyya Library</li>\r\n<li>Ghana Northwestern University</li>\r\n<li>Ibadan al-Furqan Foundation</li>\r\n<li>Kano Northwestern University</li>\r\n<li>Niamey IRSH</li>\r\n<li>Nouakchott IMRS</li>\r\n<li>Segou BNF</li>\r\n<li>Shinqit al-Furqan</li> \r\n<li>Timbuktu IHERIAB</li>\r\n<li>Wadan al-Furqan</li> \r\n<li>ALA V ALA series, Brill, vol. 5</li> \r\n<li>Timbuktu ABS(Abu Bakr b. Sa’id Library)</li>\r\n<li>Mali: Bujbiha al-Furqan (al-Ziniyya Library)</li> </ul>\r\n\r\n<!--WAAMD (formerly AMMS) is a bi-lingual database that was developed at the University of Illinois in the late 1980s to describe a collection of Arabic manuscripts in southern Mauritania (Boutilimit). It subsequently has been used to catalogue seven other West African collections including the manuscript libraries at the Institut Mauritanien de Recherche Scientifique, Northwestern University, and the Centre Ahmad Baba in Timbuctu.  Currently (during 2011-2) print catalogues from West Africa published by al-Furqan Islamic Heritage Foundation are being added to it. For more information on the activities and publications of the Foundation and these catalogues visit http://www.al-furqan.com \r\nThe database has a search engine designed to identify manuscripts and authors when only fragmentary information is available, in Arabic or Roman script, for records now in excess of 23,000. Experimental linkage of digital images of manuscript texts to the records is currently underway. \r\nThe database and the AMMS cataloguing tool are publicly available at no cost to users. The AMMS software for cataloging is free and can be downloaded for local use. Thirty-odd fields in Arabic and English cover all the descriptors normally employed in manuscript work and users may customize the input fields for the needs of particular collections. We encourage the inclusion of newly-catalogued material into the main data base; please contact the editors.-->"
schemaVersion: 0.16.0
