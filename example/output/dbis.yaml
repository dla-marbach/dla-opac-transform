filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Dieses Forschungsportal präsentiert Ergebnisse des Verbundprojekts (Re-)Collecting Theatre History (2017–2020, gefördert durch das BMBF), das das Spannungsverhältnis von Biografie und Geschichte über Netzwerkstrukturen untersucht. Ausgangspunkt sind ausgewählte Objekte aus 18 personenbezogenen Nachlässen unterschiedlicher Akteur:innen aus den Bereichen Schauspiel, Regie, Tanz, Bühnenbild, Kostümbild, Theatertechnik und Intendanz. Ausgehend von biografischen Koordinaten zielt das Projekt auf die theaterwissenschaftliche Neuperspektivierung und Resystematisierung personenbezogener Bestände der theaterhistorischen Sammlungen der Universität zu Köln und der Freien Universität Berlin. Ergänzt wird die Objektauswahl durch Komplementärbestände der Theatermuseen Düsseldorf und München. Die gemeinsam mit dem Cologne Center for eHumanities entwickelte digitale Plattform eröffnet Querverbindungen und Vergleichsmöglichkeiten der Archivalien der wichtigsten universitären Theatersammlungen und öffentlichen Theatermuseen in Deutschland und ermöglicht so ein Forschungsnetzwerk der beteiligten Institutionen.\r\n\r\nDie hier verfügbaren Digitalisate, Metadaten und Informationen richten sich nicht nur an (Theater)Wissenschaftler:innen und Studierende, sondern auch an die interessierte Öffentlichkeit."
