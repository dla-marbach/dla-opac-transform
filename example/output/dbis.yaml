noteContent_mv: 'Es handelt sich um eine bibliographische Datenbank, die vom spanischen Consejo Superior de Investigaciones Scientíficas (CSIC) getragen wird. Verzeichnet wird die seit den 70er Jahren in Spanien erschienene wissenschaftliche Literatur, hauptsächlich Aufsätze aus Fachzeitschriften. Die Datenbank ist in vier Themengebiete gegliedert: Sozialwissenschaften, Geisteswissenschaften, Naturwissenschaften und Technik, und Medizin. Zusätzlich gibt es noch eine Sektion die auf interdisziplinäre Studien ausgerichtet ist. Derzeit verzeichnet werden 4160 Fachzeitschriften und mehr als 1,3 Mio. Einzeldokumente. Für Zugang zu den Volltexten, sowie zu erweiterten Suchoptionen und weiteren Funktionen ist eine Lizensierung notwendig, die bibliographischen Daten sind jedoch frei verfügbar. Die Suchoberfläche wird auf Spanisch und Englisch angeboten.'
