noteContent_mv: "In der Porträtdatenbank der Franckeschen Stiftungen sind derzeit zwei Porträtbestände zusammengeführt worden. \n<br />Zum Einen handelt es sich um die Böttichersche Porträtsammlung, die der Inspektor der Waisenhaus-Buchhandlung Jakob Gottfried Bötticher (1692-1762) im Jahr 1756 der Bibliothek des Waisenhauses schenkte. Sie besteht aus ca. 13.000 druckgrafischen Blättern und enthält Abbildungen von etwa 7.000 Persönlichkeiten des 16. bis 18. Jahrhunderts. Aber auch bedeutende Personen der griechischen und römischen Antike sind vertreten. Die Kupferstiche und Holzschnitte, letztere machen nur einen Anteil von ca. 10 Prozent aus, stellen vornehmlich Gelehrte sowie geistliche und weltliche Würdenträger dar. Der niedrige Anteil von Frauenporträts, ca. 2 Prozent am Gesamtbestand, spiegelt die geringe gesellschaftliche Bedeutung der Frauen wider.\nBötticher hat die Porträts, die zum großen Teil aus Büchern stammen, auf Blätter aufgeklebt und mit selbst verfassten Versen versehen, die den besonderen Reiz der Sammlung ausmachen.\n<br />\nDen zweiten Teil der Datenbank bilden druckgrafischen Porträts, die sich in Büchern der Bibliothek der Franckeschen Stiftungen befinden. Zunächst werden nur Bücher bis zum Erscheinungsjahr 1800 berücksichtigt. Von den ungefähr 10.500 Porträts, die als Frontispize oder Illustrationen die Bücher bereichern, sind ungefähr 3.300 mit Porträts der Bötticherschen Sammlung identisch. \n<br />\nDie Aufnahmen der Porträts der Bötticherschen Sammlung sind bereits mit den eingescannten Porträts verknüpft. Von den Porträts in den Büchern liegen noch keine Digitalisate vor."
