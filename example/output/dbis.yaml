noteContent_mv: "Mother Jones ist ein linksliberales überregionales Magazin, das erstmals im Jahr 1976 veröffentlicht wurde. Benannt nach der amerikanischen Gewerkschafterin Mary Harris Mother Jones (1837-1930), ist es auf investigativen Journalismus, häufig zu politischen Themen und sozialrechtlichen Angelegenheiten, spezialisiert. Die Zeitschrift wird von der Foundation for National Progress in San Francisco alle zwei Monate herausgegeben und kommt auf eine Auflage von 240.000 Exemplaren. Mehrfach wurden die Berichte des Magazins preisgekrönt. Zu den Autoren zählten u. a. Barbara Ehrenreich, Molly Ivins, Ralph Nader, Randy Shilts und Marc Cooper, zu den früheren Herausgebern Michael Moore.<br /><br />\r\nVia Google Books lassen sich kostenfrei die Jahrgänge von Mai 1976 bis Jan/Feb 2000 einsehen. Sowohl alle Zeitschriftenhefte als auch einzelne Ausgaben können nach Stichworten durchsucht werden. Auch lassen sich Permalinks erzeugen. Das Kopieren, Abspeichern oder Ausdrucken ist nicht möglich."
