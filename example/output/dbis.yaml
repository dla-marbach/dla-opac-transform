noteContent_mv: |-
  Das Archiv bietet kostenfreien Zugang zu allen Artikeln der Schweizer Zeitungen Le Journal de Genève, La Gazette de Lausanne und Le Nouveau Quotidien.<br /><br />
  Das französischsprachige, liberale Journal de Genève ist einer der Vorgänger der heute verlegten Zeitung Le Temps und erschien vom 6. Januar 1826 bis 28. Februar 1998. Das Blatt hat die Schweiz über Jahrzehnte hinweg auf politischer, wirtschaftlicher, kultureller und gesellschaftlicher Ebene geprägt und war ein konstanter und häufig engagierter Zeuge des Weltgeschehens und ein ständiger Verfolger der Meinungsdebatten.<br />
  Die Gazette de Lausanne ging 1804 aus dem Lausanner „Peuple vaudois. Bulletin officiel“ hevor. Sie erschien 1804-55 zwei- oder dreimal wöchentlich, ab 1856 täglich, 1917-28 zweimal täglich, dann während mehrerer Jahre dreimal täglich, ab 1965 wieder täglich. In den 1960er Jahren geriet die liberale Zeitung zunehmend in finanzielle Schwierigkeiten. Ab 1970 verstärkte sie die redaktionelle Zusammenarbeit mit dem Journal de Genève, das sie 1991 vollständig übernahm.<br />
  Der überregionale Nouveau Quotidien wurde im September 1991 gegründet und vom Verlag Edipresse herausgegeben; finanziell beteiligt war die französische Libération. Mit seinem gehobenen Niveau, einem ausgebauten Wirtschaftsteil, neuen Rubriken und dem national und europäisch ausgerichteten Meinungsjournalismus erreichte er eine anspruchsvolle Leserschaft und etablierte sich als Zusatzblatt zu den Regionalblättern. Gleichzeitig konkurrenzierte das Blatt aber die überregionale und konservativere Qualitätszeitung Journal de Genève. Ende Febr. 1998 wurden die beiden defizitären Titel gleichzeitig eingestellt und durch die neue Tageszeitung Le Temps ersetzt, die im März 1998 zum ersten Mal erschien. (Quelle: Historisches Lexikon der Schweiz)
