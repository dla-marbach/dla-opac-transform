noteContent_mv: "BLLDB verzeichnet Literatur zur Allgemeinen Linguistik, zur Anglistik, Germanistik, Romanistik und in geringerem Umfang auch Veröffentlichungen zu anderen Sprachen. Auch Grenzgebiete (Bindestrichlinguistiken) sind abgedeckt. \nMonographien, Dissertationen, Manuskripte, Aufsätze aus Zeitschriften, Rezensionen in Auswahl, Beiträge aus Sammelwerken, Festschriften, Kongress- und Institutsberichten etc. \nEs werden rund 1.000 Zeitschriften ausgewertet. \nDatenlieferant: DFG-Sondersammelgebiet Linguistik der Universitätsbibliothek Frankfurt/Main. \nDie BLLDB bildet eine Ergänzung zur MLA.\n<p>\n<b>Der freie Zugang zu BLLDB online umfasst derzeit die bibliographischen Daten zu den Berichtsjahrgängen 1971-2013 (Stand: März 2025).</b> Online-Abonnenten haben Zugriff auf den Datenbestand 1971 ff.</p>"
