noteContent_mv: |-
  Virtuelle Forschungsumgebung und digitale Bibliothek für die Geisteswissenschaften.

  Enthält eine umfangreiche Sammlung XML/TEI-erschlossener Texte aus Belletristik und Sachliteratur vom Anfang des Buchdrucks bis zu den ersten Jahrzehnten des 20. Jahrhunderts in digitaler Form. Für die germanistische Literaturwissenschaft ist die Sammlung von besonderem Interesse, da sie nahezu alle wichtigen kanonisierten Texte und zahlreiche weitere literaturhistorisch relevante Texte enthält, deren urheberrechtliche Schutzfrist abgelaufen ist. Ähnliches gilt für die Philosophie und die Kulturwissenschaften insgesamt. Die Texte stammen zum größten Teil aus Studienausgaben und sind daher, ebenso wie die auf der Digitalisierung von Erstdrucken basierenden Texte, zitierfähig.

  Das 3-phasige Projekt TextGrid wurde vom Bundesministerium für Bildung und Forschung (BMBF) in Deutschland gefördert und dauerte vom 2006 bis 2015.
