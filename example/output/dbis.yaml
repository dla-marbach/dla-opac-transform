noteContent_mv: Schillers Werke im World Wide Web enthalten das gesamte Werk Friedrich von Schillers (1759 - 1805), seine literarischen, historischen, philosophischen und kritischen Schriften sowie die Briefe und Gespräche. Sie folgen dem Text der Nationalausgabe der Werke Friedrich Schillers. Die Nationalausgabe wurde 1940 begonnen und bildet eine vollständige Ausgabe der Werke und Schriften sowie der Briefe und Gespräche Schillers. Sie wird herausgegeben von Norbert Oellers im Auftrag der Stiftung Weimarer Klassik und des Schiller Nationalmuseums in Marbach und umfasst bisher 56 Bände, weitere sechs sind in Vorbereitung.
