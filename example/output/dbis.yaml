noteContent_mv: |-
  Open-Access-Datenbank aus dem Bereich der Historischen Ethnologie, in der Informationen zu Kulturen und Sprachgruppen recherchiert werden können. Auswählbar sind Daten zu Sprachen (über 1300 von 7000 bekannten Sprachen), Kulturen, Orten und Umwelt von mehr als 1400 hauptsächlich vorindustriellen Gesellschaften, die von Ethnographen im 19. und 20. Jahrhundert beschrieben wurden. Die Ergebnisse lassen sich in einer Tabelle, Karte oder linguistisches Baumdiagramm überführen, herunterladen und weiterbearbeiten. Die Daten stehen unter einer freien Creative-Commons-Lizenz (CC BY-NC 4.0), die die Vervielfältigung und Weiterverbreitung unter Namensnennung für nicht-kommerzielle Zwecke erlaubt.<br /><br />
  An dem Projekt beteiligt sind das amerikanische National Evolutionary Synthesis Center (NESCent) und das Max-Planck-Institut für Menschheitsgeschichte in Jena.
