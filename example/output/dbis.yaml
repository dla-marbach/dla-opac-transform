noteContent_mv: "In der Marx-Engels-Gesamtausgabe (MEGA) werden sämtliche Veröffentlichungen, Manuskripte und der Briefwechsel von Karl Marx und Friedrich Engels werden in authentischer Form präsentiert. \r\nDie digitale Ausgabe der Briefe von und an Marx und Engels beginnt mit dem Jahrgang 1866. Die früheren Jahrgänge von 1837 bis 1865 liegen bereits gedruckt in 13 Bänden vor. \r\nAus der (in Buchform vollständig vorliegenden) Kapital-Abteilung der MEGA wurden zentrale ökonomische Texte in digitaler Form aufbereitet, die nunmehr seiten- und zeilenidentisch (und damit voll zitierfähig) online zur Verfügung stehen. Es handelt sich um die Grundrisse und um einen Großteil der verschiedenen Textfassungen des Kapital, darunter auch umfangreiche, bislang unveröffentlichte Manuskripte (1864–1894). Im Zentrum der an der Berlin-Brandenburgischen Akademie der Wissenschaften erstellten Edition stehen die intertextuellen Zusammenhänge zwischen den einzelnen Manuskript- und Druckfassungen. Deshalb können alle präsentierten Fassungen in der digitalen Ausgabe bequem miteinander verglichen und bandübergreifend sowohl über eine Volltextsuche als auch über kumulierte Register recherchiert werden."
