noteContent_mv: "Verzeichnet werden Bücher, Zeitschriften, Zeitungen, Musikdrucke, Karten und ephemeres Schrifttum, Handschriften bleiben außer Betracht. \n<br />Für Deutschland und Österreich werden Bestände aus 1.500 bzw. 250 Bibliotheken einbezogen. Deutsches und fremdsprachiges Schrifttum findet in gleicher Weise Berücksichtigung.\n<br />Hinsichtlich der historischen Buchbestände in Europa beschränkt sich das Handbuch auf Drucke, die im deutschsprachigen Raum erschienen sind (unabhängig von der Sprache) und auf deutschsprachiges Schrifttum, das seinen Ursprung außerhalb des deutschsprachigen Raumes hat. Nach den Gegebenheiten in den einzelnen Ländern wurden diejenigen Bibliotheken für die Verzeichnung ausgewählt, die besonders große und signifikante Bestände aufweisen.\n<br />\nDas Handbuch sieht für jeden Eintrag folgende Abschnitte vor:\n<ul>\n<li>administrative Angaben</li> \n<li>Bestandsgeschichte</li>\n<li>Bestandsbeschreibung, chronologische und systematische Übersicht über die Bestände</li> \n<li>Übersicht über die Kataloge</li>\n<li>Literaturhinweise zu Quellen und Darstellungen zur Geschichte der Bibliothek</li>\n<li>Literaturhinweise zu Veröffentlichungen zu den Beständen</li>\n</ul>\n\n\n\n\n"
