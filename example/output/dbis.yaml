noteContent_mv: "Die elektronische Ausgabe (Stand: 2003) des International Directory for Eighteenth Century Studies (ID 18) wird von der Voltaire Foundation der Universität Oxford für die International Society for Eighteenth-Century Studies (ISECS) entwickelt und gepflegt. \r\nZiel dieser neuen und verbesserten Datenbank, die auf dem vorhergehenden elektronischen Verzeichnis beruht, ist die verbesserte Kommunikation zwischen Mitgliedern der International Society und allen Akademikern, Studenten und sonstigen Personen, die sich für das 18. Jahrhundert interessieren. Diese neue Ausgabe enthält zum ersten Mal die E-Mail-Adressen aller Mitglieder, die der Online-Veröffentlichung zugestimmt haben. Die Datenbank enthält außerdem Informationen über die nationalen Gesellschaften, die sich unter dem Dach der ISECS zusammengeschlossen haben, mit Angaben über ihre Führungsgremien und Kontaktinformationen."
