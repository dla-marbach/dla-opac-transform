filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Das Projekt führt die gesamte Korrespondenz August Wilhelm Schlegels, also ca. 5.300 Briefe, die zum Teil gedruckt, zum Teil bislang jedoch nur handschriftlich überliefert sind, in einer digitalen Edition zusammen. Zu jedem Brief soll ein Höchstmaß an Information geboten werden, also, je nach Verfügbarkeit:
  <ul>
  <li>    Image-Digitalisat der Handschriften (bzw. zusätzlich eventueller Entwürfe oder Abschriften)</li>
  <li>    Image-Digitalisat bereits vorliegender Drucke</li>
  <li>    durchsuchbarer Volltext auf der Grundlage des Drucks oder einer eigenen Transkription; bereits gedruckte Briefe werden nicht neu transkribiert </li>
  <li>    differenzierte Auszeichnung bzw. Registererstellung unter Verwendung normierter Metadaten mit Verlinkung zur GND und zu Volltexten </li>
  <li>    Schnittstellen zu Kalliope und den digitalen Sammlungen, insbesondere der SLUB </li></ul>
  In dieser ständig aktualisierten Betaversion sind  5.322
  Originalbriefe, davon 4.958 Briefe als Volltext, darunter fast alle gedruckten 2.450 Briefe, 2.380 mit einem mehrgliedrigen Register versehen, 2.487 Neutranskriptionen und 759 Kurzbiographien von Korrespondenzpartnern frei zugänglich (Stand: 13.09.2023).
