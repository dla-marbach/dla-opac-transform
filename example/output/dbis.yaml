noteContent_mv: |-
  Das auf 14 Jahre projektierte Akademienvorhaben „Friedrich Schleiermacher in Berlin 1808 - 1834. Briefwechsel, Tageskalender, Vorlesungen“ der Berlin-Brandenburgischen Akademie der Wissenschaften bearbeitet zentrale Quellen, um vor dem Hintergrund der Biographie ein Gesamtbild der wissenschaftlichen, kirchlichen und politischen Tätigkeit Schleiermachers in seiner Berliner Zeit von 1808 - 1834 zu erschließen. Auf dieser Grundlage können offene Fragen der Forschung beantwortet werden: Welche Zusammenhänge bestehen zwischen Schleiermachers politisch-gesellschaftlichem Engagement und seiner Theorieentwicklung? Wie sind seine Positionen vor dem Hintergrund der Zeitgeschichte zu verorten? Wie ist Schleiermacher politisch zu verorten?
