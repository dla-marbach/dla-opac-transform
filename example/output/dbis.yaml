filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: Das Online-Archiv versammelt als groß angelegtes Oral-History-Projekt filmische Interviews von 41 Protagonistinnen und Protagonisten, die zwischen 1945 und 2016 nach Deutschland geflohen sind. Sie kommen aus 28 Herkunftsländern in Südamerika, Afrika, Ost- und Südosteuropa, im Nahen und Mittleren Osten sowie Südost- und Ostasien und teilen ihre Fluchtgeschichten in neun Sprachen. Die Interviews liegen in deutscher und englischer Sprache vor. Die Lebensgeschichten umfassen die unterschiedlichsten sozialen oder kulturellen Hintergründe, Religionen, Sexualitäten und sprechen von den Herkunftsländern, der Flucht und dem Leben in Deutschland. Zum Zeitpunkt der Aufzeichnungen waren die Gesprächspartner*innen zwischen 19 und 87 Jahre alt. Die einzelnen Gespräche sind zwischen einer und sechs Stunden lang.
