noteContent_mv: Die Murnau-Stiftung pflegt einen einzigartigen, in sich geschlossenen Filmstock. Er umfasst Kopien und Materialien samt der damit verbundenen Rechte aus über sechs Jahrzehnten deutscher Filmproduktion - vom Beginn der ?Laufbilder? 1895 bis zum Anfang der 60er Jahre. Als Rechtsnachfolgerin der ehemaligen Produktionsfirmen Ufa, Universum-Film, Bavaria, Terra, Tobis und Berlin-Film besitzt die Murnau-Stiftung rund 2.000 Stummfilme und 1.000 Tonfilme. Zum Rechtebestand der Stiftung gehören außerdem rund 3.000 Kurzfilme (darunter Werbefilme, Kulturfilme, Dokumentarfilme), die von kulturgeschichtlich großem Wert sind.
