noteContent_mv: "Portal des <i>Instituut voor Nederlandse Lexicologie</i>, das Zugang zu folgenden 5 historischen Wörterbüchern bietet mit der Möglichkeit, diese einzeln oder gemeinsam zu durchsuchen:<ul>\r\n<li><b>Oudnederlands Woordenboek:</b>  \tHistorisch-wissenschaftliches Wörterbuch des Niederländischen für den Zeitraum von 500 bis 1200.</li>\r\n<li><b>Vroegmiddelnederlands Woordenboek:</b> Frühmittelniederländisches Wörterbuch für den Zeitraum von 1200 bis 1300.</li>\r\n<li><b>Middelnederlandsch Woordenboek:</b> Historisch beschreibendes Wörterbuch des Mittelniederländischen für den Zeitraum von 1250 bis 1550.</li>\r\n<li><b>Woordenboek der Nederlandsche Taal:</b> umfasst 37 Bände des zwischen 1851 und 1999 erschienenen umfangreichsten Wörterbuchs der Welt.</li>\r\n<li><b>Woordenboek der Friese Taal:</b> Online-Version des ‘Wurdboek fan de Fryske Taal‘ / ‚Woordenboek der Friese Taal’ (WFT); wissenschaftlich beschreibendes Wörterbuch des Neufriesischen für den Zeitraum von 1800 bis 1975.</li>"
