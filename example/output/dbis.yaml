noteContent_mv: "eluxemburgensia bietet einen Volltextzugriff auf zwölf luxemburgische Tages- und Wochenzeitungen. \n<br />\nHierzu gehören z.B. das Luxemburger Wort (1848-) und das Tageblatt (1913-), die bis zum Jahrgang 1950 digital verfügbar sind. Die Ausgaben der Zeitung dLëtzebuerger Land sind von 1954 bis 2007 vollständig gescannt. \n<br />\nNeben der Volltextsuche ist in der Erweiterten Suche eine gezielte Recherche nach Artikelüberschriften, nach Bildlegenden, Produktwerbungen und Todesanzeigen möglich. Durch das Anklicken eines Artikels erhält man zusätzlich den durch die automatische Zeichenerkennung (OCR) gewonnen Text.\n<br />\n<br />\nWeitere elf Periodika sind über das Vorgängerprojekt <a href=\"http://www.luxemburgensia.bnl.lu\"> luxemburgensia</a> im Bildmodus aufrufbar. Dies bedeutet, dass bei diesen Titeln keine Volltextsuche zur Verfügung steht, sondern allein die einzelnen Ausgaben als Bilddateien eingesehen werden können. Darunter befindet sich die erste Zeitschrift Luxemburgs La Clef du cabinet des princes de l’Europe (1704-1794)."
noteRequirements_mv:
  - Die Datenbank kann auf Deutsch, Englisch und Französisch benutzt werden.
