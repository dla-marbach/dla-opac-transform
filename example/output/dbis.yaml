noteContent_mv: Die Herzog August Bibliothek besitzt ca. 400 hebräische und jiddische Drucke, die vor allem im 16. und 17. Jahrhundert gedruckt wurden. Die Zahl der Hebraica beträgt ca. 270, während es sich bei den anderen 130 Schriften um Judaica handelt. Die Sammlung spiegelt die Beziehungen zwischen Christen und Juden in der Frühen Neuzeit wider. Die zentralen Druckorte sind Venedig, Prag, Basel, Amsterdam und Krakau, einige wichtige Drucker der hebräischen Buchgeschichte sind hier dokumentiert. Zur Sammlung gehören verschiedene Unikate und Erstausgaben. Ziel des Projekts ist die Erschließung der Drucke nach dem Standard der hebräischen Bibliographie. Die inzwischen abgeschlossene Katalogisierung wurde wegen der dort verfügbaren hervorragenden Hebraica-Bestände und der erforderlichen Hilfsmittel in Zusammenarbeit mit der Bodleian Library (Oxford) durchgeführt.
