id: DBIS5206
display: Heinrich-Heine-Portal
category: Digitale Nachschlagewerke
categoryMedium_mv: Online-Ressource
categoryPublication_mv: Portal
country_mv:
  - Deutschland
dateCataloged: "2020-08-18"
dateModified: "2025-01-13"
displayAddition1: Portal
displayName: Heinrich-Heine-Institut, Düsseldorf; Kompetenzzentrum, Universität Trier
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Das <i>Heinrich-Heine-Portal</i> (HHP)  das Ergebnis eines im September 2002 begonnenen Digitalisierungsvorhabens. Es ist eine elektronische, wissenschaftliche Gesamtausgabe von Heines Werken und Briefen, verknüpft mit digitalisierten Handschriften-, Bild- und Buchbeständen aus dem Heine-Institut und einigen anderen Bibliotheken und Archiven. Es vereinigt die beiden historisch-kritischen Heine-Editionen, die parallel in der Bundesrepublik und der DDR entstanden: die 1973-1997 erschienene Düsseldorfer Heine-Ausgabe (DHA), herausgegeben von Manfred Windfuhr (Hamburg: Hoffmann und Campe), und die 1970-1984 publizierte Briefabteilung der Heine-Säkularausgabe (HSA), herausgegeben von den Nationalen Forschungs- und Gedenkstätten der klassischen deutschen Literatur in Weimar (heute Stiftung Weimarer Klassik) und dem Centre National de la Recherche Scientifique in Paris (Berlin, Paris: Akademie-Verlag und Editions du CNRS).<br>\r\nAlle Texte, Kommentare und Register werden in einer Hyperlinkstruktur miteinander vernetzt, die Briefe von und an Heine werden in vollständig überarbeiteter Form präsentiert. Hinzu kommen digitale Faksimiles handschriftlicher wie gedruckter Textzeugen, Bild- und Quellenmaterialien."
