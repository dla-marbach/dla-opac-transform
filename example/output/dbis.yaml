noteContent_mv: |-
  Die Da­ten­bank präsentiert das volks­sprachige Wortgut der konti­nental-west­germanischen Stammes­rechte (= Leges barbarorum) in dem bislang erreichten Bearbeitungs­stand.<br /> Sie hat das Ziel, das volks­­spra­chige Wortgut aus diesem Quellenkomplex, der sich vom frühen 8. bis zum 11. Jahrhundert erstreckt und eine räumliche Ausbreitung über den gesamten west­­germanischen Raum zeigt, kodiko­logisch, philo­logisch und grammatisch vollständig aufzu­bereiten und zu präsentieren.<br /><br />
  Erfasst ist das volkssprachige Wortgut folgender Legesbereiche: Lex Alamannorum; Lex Baiuvariorum; Lex Francorum Chamavorum; Lex Frisionum; Leges Langobardorum; Lex Ribuaria; Lex Salica und merowingische Kapitularien; Lex Saxonum und Lex Thuringorum.
