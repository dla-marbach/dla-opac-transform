noteContent_mv: "Internet Culturale erlaubt den besten Zugang zum italienischen Verbundkatalog SBN (Servizio Bibliotecario Nazionale), dem ca. 3000 italienische Bibliotheken angeschlossen sind.<br />\nDas Portal der Biblioteca Digitale Italiana und des Network Turistico Culturale bietet darüber hinaus auch noch weitere Dienste. Es wurde mit öffentlichen Mitteln durch den Istituto centrale per il Catalogo Unico delle Biblioteche italiane e per le Informazioni Bibliografiche (ICCU) aufgebaut, dem Betreiber des italienischen Verbundkataloges, der dem Ministero per i Beni e le Attività Culturali untersteht. \n<br />\nDas Angebot stellt nicht nur Texte und Bilder von literatur- und kulturhistorischem Wert in digitaler Ansicht online zur Verfügung, sondern erlaubt nach einer zweiten Entwicklungsphase auch deren kostenpflichtigen Bezug über ein E-Commerce-System. Die Website ermöglicht neben dem einfachen digitalen Zugang zu traditionellen Dokumenten auch thematische Zu- und Rundgänge, die Überblicke über das Werk einzelner Autoren oder Musiker, über einzelne Institutionen oder über einzelne Monumente und Kunstwerke bieten."
