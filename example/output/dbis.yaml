noteContent_mv: "\"Literaturport\" ist eine Informationsplattform für die verschiedensten Bereiche deutschsprachiger Literatur unter besonderer Berücksichtung der Region Berlin-Brandenburg:\r\n<ul>\r\n<li><b>Autorenlexikon / Zeitgenössische Autoren:</b>\r\n<br>Der zeitgenössische Teil (ab 1990) umfasst Autoren aus dem gesamten deutschsprachigen Raum und wird von den Autoren selbst verfasst. Es gibt Hinweise zu Würdigungen, bisherigen Veröffentlichungen und kostenlose Hörproben.</li>\r\n<li><b>Autorenlexikon / Historische Autoren:</b>\r\n<br> Der historische Teil erschließt Beziehungen zwischen Leben und Werk von über 3.500 Schriftstellern auf der einen Seite und über 900 Orten in der Region Berlin-Brandenburg auf der anderen Seite. Er funktioniert wie ein Findbuch: Geboten wird der Weg zu den Informationen (Kurzinformation zur Person und zum Ortsbezug mit Hinweis auf die Quelle), nicht aber die komplette Information selbst.</li>\r\n<li><b>Literaturlandschaft:</b>\r\n<br>In der  Sparte Literaturlandschaft findet sich eine ausführliche Listung aller regionalen literarischen Einrichtungen wie etwa Museen, Bibliotheken, Literaturhäuser oder Stiftungen der Region Berlin-Brandenburg.</li>\r\n<li><b>Literatouren:</b>\r\n<br>Die Literatouren kamen 2008 als neue Rubrik hinzu. Es sind literarische Spaziergänge namhafter Berliner und Brandenburger Autoren durch ihre Heimatstadt und -region. Jeder Autor schreibt einen literarischen Text, in dem er einen Spaziergang durch seine Lieblingsecken nachzeichnet; dies wird von atmosphärischen Fotos und einer Hörversion der Touren begleitet. Bisher gibt es Literatouren u.a. von Thilo Bock, Bas Böttcher, Günter de Bruyn, Tanja Dückers, Julia Franck, Judith Hermann, Matthias Körner, Katja Lange-Müller, Kristof Magnusson, Veronika und Christoph Peters, Tilman Rammstedt, Wolfgang Schlüter, Ingo Schulze, Lutz Seiler und Elke Schmitter.</li>\r\n<li><b>Hörproben:</b>\r\n<br> Die Rubrik umfasst Hörproben aktueller deutschsprachiger Werke - mit einer Vielzahl von Werken aller Genres, hauptsächlich Auszügen aus Neuerscheinungen, teilweise vollständigen Texten namhafter Autoren.</li>\r\n<li><b>Preise / Stipendien:</b>\r\n<br>Hier finden sich aktuelle Literaturstipendien, Wettbewerbe und weitere Ausschreibungen für Autoren und Übersetzer.</li>\r\n<li><b>Veranstaltungen:</b>\r\n<br>Die Rubrik Veranstaltungen bietet eine Auswahl empfehlenswerter literarischer Events in der Region Berlin-Brandenburg.</li>\r\n<li><b>Leselampe:</b>\r\n<br>Buchempfehlungen für jede Woche.</li>\r\n</ul>"
