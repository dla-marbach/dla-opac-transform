noteContent_mv: 'Der Online-Katalog des Deutschen Literaturarchivs Marbach bietet fünf Sucheinstiege: (1) Handschriften für (Werk-)Manuskripte, Briefe und Lebensdokumente; (2) Bibliothek für Bücher, Zeitschriften, Beiträge in Zeitschriften und Sammelwerken, Rezensionen, E-Books und E-Journals, literarische Weblogs, Hörfunk- und Fernsehmanuskripte, audio-visuelle Materialien und Mikroformen; (3) Bilder und Objekte für Skulpturen, Gemälde, Grafiken, Fotografien und Gegenstände; (4) Bestände für allgemeine Beschreibungen sämtlicher Bestände (Nachlässe, Sammlungen, Archive etc.) der verschiedenen Abteilungen; (5) Namen für Informationen über Personen und Körperschaften (Institutionen), die in den Beständen des Deutschen Literaturarchivs eine Rolle spielen.'
