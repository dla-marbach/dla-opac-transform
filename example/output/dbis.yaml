noteContent_mv: "Die Sammlung historischer Kinder- und Jugendliteratur Aiga Klotz bildet mit knapp 12 000 Bänden einen charakteristischen Grundstock der Kinder- und Jugendliteratur des späten 19. und der 1. Hälfte des 20. Jahrhunderts. Anfang 2016 von der Universität Bielefeld unter der Federführung von Frau Prof. Dr. Petra Josting, Fakultät für Linguistik und Literaturwissenschaft, erworben, stellt die Sammlung eine epochale und inhaltliche Ergänzung zum Sammel- und Forschungsschwerpunkt Kinder- und Jugendliteratur dar. Die digitale Sammlung enthält neben urheberechtsfreien Werken auch digitalisierte sog. Vergriffene Werke, deren Urheberrechte zwar noch nicht erloschen, für welche aber keine Rechteinhaber mehr nachweisbar sind. Die Universitätsbibliothek hat die Lizenzen für die dauerhafte digitale Präsentation dieser Werke erworben. Die digitale Sammlung wird stetig ergänzt.\r\n<br>\r\n<a href=https://blog.ub.uni-bielefeld.de/?p=9590>Weitere Beschreibung im Blog ub.aktuell / Quelle UB Bielefeld</a>"
