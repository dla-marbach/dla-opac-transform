id: DBIS5327
display: Fachportal Pädagogik
category: Digitale Nachschlagewerke
categoryMedium_mv: Online-Ressource
categoryPublication_mv: Fachbibliographie, Portal, Volltextdatenbank
dateCataloged: "2020-08-18"
dateModified: "2026-01-07"
displayAddition1: Fachbibliographie, Portal, Volltextdatenbank
displayName: DIPF | Leibniz-Institut für Bildungsforschung und Bildungsinformation
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Das Fachportal Pädagogik ist der zentrale Einstieg in die erziehungswissenschaftliche Fachinformation für Pädagogen aus Forschung und Praxis.<br />\n<br />Nach einem Relaunch 2017 ist das Portal nun in folgende drei Bereiche strukturiert:\n<ul>\n<li>Literatur:<br />\nRund um Fachliteratur werden Services angeboten, die von der Recherche in Fachdatenbanken, über die Ver­öffentlichung von Open-Access-Volltexten bis hin zu Angeboten für die Versorgung mit internationaler Literatur reichen.<br />\nDie Literaturrecherche basiert im Fachportal wie gewohnt auf der <a href=\"http://www.fachportal-paedagogik.de/literatur/produkte/fis_bildung/fis_bildung.html\">FIS Bildung Literaturdatenbank. </a>In den Such- und Nachweisraum sind zusätzliche Datenbestände wie aktuelle englischsprachige Monografien (Library of Congress) und italienischsprachige Publikationen (Casalini Libri) integriert. \n</li><li>Forschungsdaten<br />\nDas Angebot bietet eine über­greifende Suche nach Daten und Instrumenten der Bildungs­forschung, Informationen zum Forschungs­daten­management sowie die Möglich­keit, eigene Daten und Instrumente zur Nach­nutzung bereit­zustellen.</li>\n<li>Forschungsinformation<br />\nMit Themendossiers, Informationen zum wissenschaft­lichen Nachwuchs, zu Statistiken, Institutionen, zur Forschungsförderung sowie zu internationalen Aspekten der Bildungsforschung wird ein Überblick zu aktuellen Entwicklungen angeboten.</li></ul><p>\nÜber den kostenfreien Fachinformationsdienst FID Erziehungswissenschaft und Bildungsforschung können  internationale Fachliteratur und Zeitschriften beschafft und direkt an Ihren Arbeitsplatz geliefert werden. Außerdem können auf Anfrage urheberrechtsfreie, gedruckte Quellen digitalisiert werden.</p><p>\nDie Services vom Open-Access-Server peDOCS sind in den Bereich Literatur des Fachportals integriert.</p>"
noteRequirements_mv:
  - '<a href="https://www.uni-bamberg.de/fileadmin/ub/dbis/FIS_Bildung_aus_RefHunter_Version_5.0_2020.pdf">Datenbankinfoblatt Fachportal Pädagogik </a><br />Aus: Nordhausen, T. &amp; Hirt, J. (2020). RefHunter. Manual zur Literaturrecherche in Fachdatenbanken. Version 5.0 (Martin-Luther-Universität Halle-Wittenberg &amp; FHS St.Gallen, Hrsg.), Halle (Saale) und St.Gallen.'
