noteContent_mv: "Der Dokumentations-Katalog ermöglicht die gemeinsame wie separate Recherche zu den folgenden Beständen der Wienbibliothek im Rathaus:\n<ul>\n<li><b>Der Zeitungsindex</b>\nwertet die wichtigsten Wiener Zeitungen seit 1930 aus. Aufgenommen werden Wien betreffende Artikel über kulturelle, soziale, kommunale und politische Ereignisse sowie Berichte über Persönlichkeiten im Blickpunkt der Öffentlichkeit.<br />\nOnline suchbar sind Zeitungsartikel ab dem Erscheinungsjahr 2007.\n</li>\n<li><b>Das Tagblatt-Archiv </b>\nenthält vorwiegend Zeitungsausschnitte aus dem „Neuen Wiener Tagblatt“ (1867 – 1945), aber auch aus zahlreichen in- und ausländischen Zeitungen bis in das Jahr 2000. Den zentralen Teil des Archivs bilden die in rund 100.000 Personenmappen alphabetisch geordneten biografischen Unterlagen. Die Sachmappen enthalten thematisch sortierte Zeitungsausschnitte.<br /> \nOnline suchbar sind bereits alle Persönlichkeiten von A bis Z, während die Sachmappen erst am Beginn der Auswertung stehen.\n</li>\n<li><b>Die Fotosammlung</b>\nenthält rund 9.000 historische Fotografien, nicht nur mit Wien- und Österreich-Bezug.\n</li>\n</ul>"
