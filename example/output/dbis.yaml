noteContent_mv: "Die digitale Kollektion der Sammlung Georg Thomas von Asch (1729-1807) enthält (bisher) handschriftliche Dokumente aus  dem Nachlass des Baron von Asch (1729-1807), insbesondere dessen Korrespondenz an Christian Gottlob Heyne (1729-1812).<br />  \nDer russische Baron Georg Thomas von Asch übersandte als Alumnus der Göttinger Universität bereits zu Lebzeiten seiner Alma Mater eine Vielzahl seltener und kostbarer Drucke, Handschriften, Karten, Kunstwerke und Forschungsgegenstände aller Art. Die Bibliotheca Aschiana umfasst dabei mit ihren ca. 2.000 Büchern den größten Teil dieser Schenkung. Für seine Sammeltätigkeit nutze der Mediziner seine weitreichenden Beziehungen zu den im russischen Reich wirkenden Wissenschaftlern."
