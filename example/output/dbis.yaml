id: DBIS106123
display: 'Filmzensur West-Ost: der Interministerielle Ausschuss und die Zensur von DEFA-Filmen in der BRD'
category: Digitale Nachschlagewerke
categoryMedium_mv: Online-Ressource
categoryPublication_mv: Faktendatenbank, Portal
