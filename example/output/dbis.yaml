filterType_mv: Daten
noteContent_mv: "Die Datenbank Äldre svensktryck der Königlichen Bibliothek besteht aus drei Teilgebieten:\n<ul>\n<li><b>Svensk bibliografi, 1600-talet (Collijn)</b> umfasst einen Großteil der in Schweden und den schwedischen Provinzen herausgegebenen Drucke aus dem 17. Jahrhundert, derzeit etwa 6000 Titel.\nDies ist die Datenbankversion von Isaak Collijns Sveriges bibliografi : 1600-talet, die in zwei Bänden zwischen 1942 und 1946 erschienen ist. Die gedruckten Versionen wurden in eine maschinenlesbare Form konvertiert und 1998 in die LIBRIS-Datenbank aufgenommen.</li>\n<li><b>Svensk bibliografi 1700-1829 (SB17)</b> wurde 1998 in die LIBRIS-Datenbank integriert und umfasst einen Großteil der in Schweden und den schwedischen Provinzen herausgegebenen Drucke aus dem 18. Jahrhundert. Die Bibliografie mit etwa 50.000 Titeln basiert hauptsächlich auf den Sammlungen der Königlichen Bibliothek.\nIn die Bibliografie werden keine Periodika, Dissertationen und Suecana aufgenommen.\n</li>\n<li>\n<b>Svenskt offentligt tryck -1833 (SOT)</b> enthält Verweise auf die schwedischen öffentlichen Amtsblätter (årstrycket), die vom 16. Jahrhundert bis 1833 publiziert wurden. Deren Digitalisierung ist bis einschließlich 1632 erfolgt und wird fortgesetzt. Eine Auswahl von Amtsblättern aus dem 18. Jahrhundert ist ebenfalls digitalisiert worden. \nDie Bibliografie basiert hauptsächlich auf den Sammlungen der Königlichen Bibliothek und enthält die Amtsblätter auf nationaler Ebene sowie die Stockholmer Verordnungen.</li></ul>"
