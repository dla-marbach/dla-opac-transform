noteContent_mv: |-
  Diese CD-ROM »Gotthold Ephraim Lessing: Werke« enthält:
  <ul><li>Gedichte: Lieder - Oden - Sinngedichte</li>
  <li>Fabeln: Fabeln und Erzählungen</li>
  <li>Dramen: Damon, oder die wahre Freundschaft - Der junge Gelehrte - Die alte Jungfer - Der Misogyn - Der Freigeist - Die Juden - Der Schatz - Miß Sara Sampson - Philotas - Minna von Barnhelm - Emilia Galotti - Nathan der Weise</li>
  <li>Dramenfragmente: Samuel Henzi - D. Faust</li>
  <li>Ästhetische Schriften: Rezensionen - Briefe - Vorreden - Abhandlungen von dem weinerlichen oder rührenden Lustspiele - Ein Vade mecum für den Hrn. Sam Gotthl. Lange - Rettungen des Horaz - Briefwechsel über das Trauerspiel - Abhandlungen über die Fabel - Briefe, die neueste Literatur betreffend - Laokoon - Hamburgische Dramaturgie - Wie die Alten den Tod gebildet - Leben und leben lassen - Selbstbetrachtungen und Einfälle u.a.</li>
  <li>Theologiekritische und philosophische Schriften: Gedanken über die Herrnhuter - Das Christentum der Vernunft - Pope ein Metaphysiker! - Anti-Goeze - Ernst und Falk. Gespräche für Freimäurer - Die Erziehung des Menschengeschlechts - Gespräche mit Friedrich Heinrich Jacobi u.a.</li></ul>(Digitale Bibliothek ; 5)
