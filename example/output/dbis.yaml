filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Die KWAe befindet sich noch im Aufbau und soll bei ihrer Fertigstellung komplementäre Inhalte zu den gedruckten Bänden der Kritischen Robert Walser-Ausgabe (KWA) anbieten. Walser (1878-1956), dem zu Lebzeiten die breite Anerkennung versagt blieb, wird heute zu den wichtigsten deutsch-schweizerischen Erzählern des 20. Jahrhunderts gezählt. Von Autorenkollegen wie Hermann Hesse, Kurt Tucholsky, Robert Musil, Franz Kafka und Walter Benjamin sehr geschätzt, beeinflusste er auch zeitgenössische Autoren wie Elfriede Jelinek, Martin Walser oder Max Goldt.<br />

  Die Online-Datenbank enthält die in der KWA edierten Textträger als digitale Bilder und für Manuskripte zusätzlich als Transkription. Außerdem enthält sie die Bände der KWA als E-Books. Sukzessive sollen die bisher auf CD/DVD oder USB-Stick zusammen mit den Einzelbänden erschienenen elektronischen Inhalte in die Online-Version integriert werden. Die Funktionen des Programms sollen sukzessive erweitert werden, bis sie der Funktionalität der bisherigen KWAe auf Datenträger weitgehend entsprechen.
