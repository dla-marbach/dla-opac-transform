noteContent_mv: "Das Endangered Languages Archive (ELAR) der SOAS University of London sammelt multimediale Materialien aus dem Sprachalltag gefährdeter Sprachen aus aller Welt. \nDie Sammlungen in ELAR beinhalten Audio- und Videoaufnahmen des alltäglichen Sprachgebrauchs, verbale Kunst, Lieder, Erzählungen, Riten und mehr. Die Sammlungen enthalten auch Wörterbücher, pädagogisches Material (z.B. für den Sprachunterricht) sowie Transkriptionen und Übersetzungen der Aufnahmen in die wichtigsten Kontaktsprachen wie z. B. Spanisch, Mandarin, Englisch oder Russisch.<br /><br />\nDas Archiv ist frei durchsuchbar, die Beschreibungen der einzelnen Kollektionen sind ebenfalls frei zugänglich. Für den Zugang zu den Materialien ist eine Registrierung notwendig, z.T. muss eigens eine Genehmigung eingeholt werden."
