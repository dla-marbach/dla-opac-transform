noteContent_mv: "Das »Westfälische Autorenlexikon« porträtiert über 2.000 Schriftsteller, die in Westfalen geboren oder verstorben sind sowie Autoren, die mindestens 10 Jahre lang in Westfalen literarisch tätig waren. Die Gesamtzahl der bibliographischen Angaben beläuft sich auf ca. 70.000 Nennungen. Das Lexikon umspannt den Zeitraum 1750 bis 1950 (Geburtsjahrgänge der Schriftsteller). Indem es die gesamte Bandbreite des literarischen Lebens in Westfalen berücksichtigt, erschließt es nicht nur die literarische, sondern auch die kulturelle und politische Vergangenheit der Region. Unter Westfalen wird dabei nicht nur die ehemalige Provinz Westfalen oder der westfälische Landesteil des Landes Nordrhein-Westfalen verstanden, sondern der Kulturraum Westfalen mit wechselnden Grenzen in unterschiedlichen Zeiträumen. <br>\r\nDie einzelnen Lexikonartikel enthalten Autorenporträts mit knappen Informationen über Leben und Werk. Sie nennen Ehrungen und Literarische Preise und bieten ein Werkverzeichnis, das auch eine Auswahl an Auflagen und Rezensionen aufführt. Neben den selbständigen Veröffentlichungen lässt sich die Mitarbeit an Büchern, Zeitschriften und Zeitungen nachvollziehen, ferner werden Herausgeberschaft, Übersetzungen und Übersetzertätigkeit, Rundfunk- und Fernseharbeiten, Vertonungen und Verfilmungen genannt. Im Bereich der Sekundärliteratur werden Monographien über Person und Werk sowie die wichtigsten Aufsätze in Zeitschriften und, soweit verfügbar und sinnvoll, Zeitungsartikel über die Autoren aufgeführt."
