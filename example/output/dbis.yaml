filterType_mv: Daten
noteContent_mv: "<!--<B><P>Diese Datenbank wird seit Januar 2019 nicht mehr aktualisiert und wird in einer neuen Version fortgeführt. Der Inhalt soll bis Ende 2020 vollständig in die neue Version überführt worden sein. Die Fortsetzung der Weimarer Nietzsche Bibliographie finden Sie unter:</B> \r\n<A HREF=https://opac.lbs-weimar.gbv.de/DB=4.4/>www.nietzsche-bibliographie.de\r\n</A>\r\n</P>-->Im Herbst 1995 wurde an der Herzogin Anna Amalia Bibliothek in Weimar mit der Erarbeitung einer umfassenden retrospektiven Bibliographie zu Leben, Werk und Wirkung Friedrich Nietzsches begonnen. In gedruckter Form konnte der 1. Band dieser Weimarer Nietzsche-Bibliographie, beinhaltend die Primärliteratur, im Jahr 2000 vorgelegt werden. Die Bände 2 bis 4, die Sekundärliteratur verzeichnend, sind im Jahre 2002 erschienen. \r\nDie Berichtszeit der gedruckten Weimarer Nietzsche-Bibliographie reicht von 1867 - dem Jahr der ersten Veröffentlichung Nietzsches - bis 1998.\r\nSeit Frühjahr 2003 werden die Arbeiten an der Weimarer Nietzsche-Bibliographie über das Berichtsjahr 1998 hinaus fortlaufend weitergeführt, vorerst wird neuverzeichnete Literatur in einer Online-Datenbank zusammen mit dem Datenbestand der gedruckten Bibliographie angezeigt. Aus Kapazitätsgründen liegt der Schwerpunkt bei der Neuverzeichnung auf der in der Herzogin Anna Amalia Bibliothek Weimar neu erworbenen internationalen Nietzsche-Literatur, daneben werden noch einige bibliographische Standardquellen ausgewertet."
