filterType_mv: Daten
noteContent_mv: |-
  Das <i>TLS Historical Archive</i> umfasst im Volltext alle Hefte des Times Literary Supplement von der ersten Nummer aus dem Jahre 1902 bis ins Jahr 2005 und stellt ein Panorama der Werke bedeutender Schriftsteller und Denker in diesem Zeitraum dar. Es enthält darüber hinaus Rezensionen aus den Bereichen Theater, Kino, Musik und Ausstellungen.
  Die Datenbank ist komplett volltextrecherchierbar, einschließlich der Suche nach anonymen Beiträgen, und enthält einfache und erweiterte Sucheinstiege.

  Das TLS – bis 2009 unter dem Titel „Times Literary Supplement – Centenary Archive (1902-1990)“ – wurde 2010 erweitert, verbessert und unter dem neuen Titel „TLS – Historical Archive (1902-2005)“ angeboten.
  Insgesamt sind mehr als 300.000 Besprechungen, Briefe, Gedichte und Artikel aus mehr als 5.000 Ausgaben des TLS in ihrem ursprünglichen Kontext verfügbar.
