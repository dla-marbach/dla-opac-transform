noteContent_mv: "Die Philosophische Audiothek präsentiert Tondokumente philosophischen Inhalts im MP3-Format.<br>\r\nEinen Kern der Sammlung bildet das Archiv einer Sendereihe im Wiener Freien Radio Orange. Seit dem 26. April 2000 laufen die Philosophischen Brocken 14-tägig, Mittwoch von 13-14 Uhr. Sie präsentieren philosophische Persönlichkeiten, kollegiale Debatten und Arbeiten von Absolventinnen und Absolventen, vorwiegend aus dem Umkreis des Instituts für Philosophie der Universität Wien.<br>\r\nDarüber hinaus finden sich Vorlesungsreihen, Symposien und Einzelvorträge. <br>\r\nDie Tondokumente sind nach Kategorien geordnet. Die Audiofiles können als Stream abgerufen oder als Dokumente heruntergeladen werden. (Audio-Streaming-Portal)"
