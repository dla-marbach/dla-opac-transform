noteContent_mv: Aozora Bunko (jap. 青空文庫, dt. „Bibliothek des blauen Himmels“) ist ein japanisches Projekt zum Aufbau einer elektronischen Bibliothek frei zugänglicher Texte, ähnlich dem Project Gutenberg. Auf der Website werden literarische Werke japanischer Schriftsteller und Dichter, vorwiegend aus der Meiji- und frühen Shōwa-Zeit, deren Urheberrecht erloschen ist oder deren Urheberrecht auf Aozora übertragen wurde, kostenfrei angeboten. Darüber hinaus werden auch Übersetzungen ausländischer Werke und von den Autoren selbst redigierte Werke der Gegenwartsliteratur angeboten. Das Projekt wurde von dem Herausgeber und Schriftsteller Michio Tomita 1997 ins Leben gerufen.
