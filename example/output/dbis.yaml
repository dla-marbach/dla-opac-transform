noteContent_mv: "Das Goethe-Wörterbuch ist eines der umfangreichsten deutschen Wörterbuchprojekte. Es wurde im Jahr 1946 begonnen.<br>\r\nMit ihm entstehen gleichzeitig ein Autorenwörterbuch, ein umfassender Thesaurus der Goethezeit sowie ein Nachschlagewerk für unterschiedlichste, sprach- und literaturgeschichtliche, kultur-, geistes- und realgeschichtliche Sachinteressen. <br>\r\nDas Goethe-Wörterbuch entsteht in vier Arbeitsstellen in Berlin, Leipzig, Hamburg und Tübingen und wird von der Berlin-Brandenburgischen Akademie der Wissenschaften, der Akademie der Wissenschaften in Göttingen und der Heidelberger Akademie der Wissenschaften gefördert.<br>\r\nDie Digitalisierung der bereits abgeschlossenen vorliegenden Bände wird in einem von der DFG finanzierten Projekt vom Kompetenzzentrum für elektronische Erschließungs- und Publikationsverfahren in den Geisteswissenschaften an der Universität Trier durchgeführt."
