filterType_mv: Daten
noteContent_mv: "Zum 105. Geburtstag ihres Autors veröffentlichte die \nArno-Schmidt-Stiftung ein web-basiertes \nFindmittel, mit dem die gesamte Bargfelder Ausgabe der Werke Schmidts \nonline durchsucht werden kann \n(https://www.arno-schmidt-stiftung.de/eba/). \nDas Suchportal löst damit \ndie „Bargfelder Ausgabe auf CD-ROM” aus dem Jahr 1998 ab. Wie die \nCD-ROM-Version erlaubt auch das neue Portal die Volltextrecherche im \nüber 9.900 Seiten umfassenden Bestand und berücksichtigt Schmidts teils \nunkonventionelle Orthographie. Anders als die Vorgängerversion basiert \nsie nicht nur auf einem Volltextindex mit absatzweisen Referenzen zu den \nentsprechenden Seiten der Ausgabe. Neben dem Index für die Recherche im \nText stützt sich das Portal bei der Präsentation der Suchergebnisse auf \nein automatisch erzeugtes, zeilenweises Referenzsystem zwischen dem \nVolltext und entsprechenden Ausschnitten („snippets”) digitaler \nReproduktionen aller Buchseiten. Das System ermöglicht somit \nErgebnisdarstellungen, wie man sie von Google Books kennt und die, wegen \nder formalen Besonderheiten (Marginalien, mehrspaltiger Text) gerade im \nSpätwerk Schmidts, die Erschließung desselben erleichtern sollen."
schemaVersion: 0.16.0
source: AK
subjectOther_mv:
  - Schmidt
  - Bargfeld
  - Findmittel
