noteContent_mv: 'Die digitale Edition von Wilhelm von Humboldts sprachwissenschaftlicher Korrespondenz geht hervor aus dem DFG-Projekt „Wilhelm von Humboldt: Schriften zur Sprachwissenschaft“ an der Berlin-Brandenburgischen Akademie der Wissenschaften. Bisher sind ca. 550 Briefe in deutscher, französischer, englischer und spanischer Sprache veröffentlicht, davon etwa 280 Briefe erstmals nach den im Nachlass in Berlin und Krakau erhaltenen Handschriften. Das Editionsvorhaben erfasst nun weitere ca. 500 Briefe. Mit den Briefen und Briefentwürfen Humboldts werden soweit möglich auch die Antworten seiner Briefpartner publiziert. Neben dem kritisch edierten Text der Briefe wird eine Leseversion angeboten, und, wo immer dies möglich ist, werden die Faksimiles der Handschriften präsentiert. Die Datenbank versteht sich als work in progress, d. h. weitere Briefe und Faksimiles sowie Kommentierungen werden kontinuierlich hinzugefügt.'
