noteContent_mv: "Das Billboard Magazine gilt als bedeutendes Fach- und Branchenblatt für Musik und Entertainment in den USA. Ursprünglich 1894 für Karnevalsunterhaltung gegründet, veröffentlichte die Zeitschrift in den 1930er- und 1940er-Jahren erste Musik-Hitparaden und –charts. Das im Besitz des niederländischen Mischkonzerns The Nielsen Company befindliche Magazin erscheint wöchentlich und veröffentlicht offizielle US-Verkaufscharts für Musikalben (The Billboard 200), Singles (The Billboard Hot 100) und weitere Hitlisten für verschiedene Musikrichtungen, darunter R&B, Hip-Hop, Country und Latin.<br /><br />\r\nVia Google Books lassen sich kostenfrei die Jahrgänge von 1942 bis 2011 einsehen. Alle oder einzelne Zeitschriftenhefte können nach Stichworten durchsucht werden. Auch lassen sich Permalinks erzeugen. Das Kopieren, Abspeichern oder Ausdrucken ist nicht möglich."
