noteContent_mv: "Aktualisierte Online-Version des 1981 von Steven A. Grant erschienenen Leitfadens zu Handschriften und Archiv-Materialien in den USA, die sich auf das Russische Reich und die ehemalige Sowjetunion mit all ihren Nationalitäten und Regionen beziehen. <br><br>\r\nDie hauptsächlich unveröffentlichten Materialien (Fotografien, Filme, Tonbandaufnahmen und grafisches Material Korrespondenz, Berichte, Organisationsunterlagen, Geschäftsbücher, Essays, literarische Manuskripte, Tagebücher, Zeitschriften, Memoiren, Autobiografien) decken ein vielfältiges Themenspektrum ab (Politik, Geschichte, Kunst, Literatur, Musik, Religion, Wirtschaft u.a.). <br><br>\r\nDas Verzeichnis umfasst öffentliche und private Institutionen, darunter Universitätsbibliotheken und -archive, öffentliche Bibliotheken, Museen, ethnische Organisationen, Kirchen- und Wirtschaftsarchive, Bundes- und Landesregierungsarchive sowie öffentliche und private historische Gesellschaften.<br><br>\r\nDie Einträge sind alphabetisch nach Bundesland und darunter nach Institution geordnet und können nach Bundesland gefiltert sowie im Volltext durchsucht werden."
