filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "<b>Historische Presse der deutschen Sozialdemokratie online </b> ist ein Zeitungsdigitalisierungsprojekt, mit welchem die historischen Ausgaben der Zeitungen Vorwärts, „Freiheit“, „Der Sozialdemokrat“ und „Neuer Vorwärts“ in digitaler und im Volltext durchsuchbarer Form online zur Verfügung gestellt werden. \nEs handelt sich dabei um eine Weiterentwicklung des Zeitschriftenarchivs „Vorwärts bis 1933“, welches Ende 2017 vervollständigt wurde und somit alle „Vorwärts“-Ausgaben von 1876 bis 1933 digital nachweist. Zusätzlich aufgenommen wurden die Zeitschriften  „Freiheit“, „Der Sozialdemokrat“ und „Neuer Vorwärts“.\n\n\n<ul>\n       <li>„Der Sozialdemokrat“ schließt die Lücke zwischen dem Leipziger „Vorwärts“ (1876-1878) und dem Berliner Nachfolger, der von 1891 bis 1933 erschien.</li>\n<li>Die „Freiheit“ war das Presseorgan der Unabhängigen Sozialdemokratischen Partei Deutschlands (USPD), die sich 1917 aus Protest gegen die Burgfriedenspolitik der Mehrheits-SPD im 1. Weltkrieg gründete.</li>\n<li>Der „Neue Vorwärts“ erschien ab Mitte 1933  im Umfeld der „Sozialdemokratischen Partei Deutschland im Exil“ (SOPADE).</li>\n</ul>\n\n\nDie Digitalisate sind chronologisch geordnet, sodass in ihnen nach einzelnen Ausgaben gesucht werden kann. Außerdem kann die Datenbank mithilfe einer Wortsuche erforscht werden, welche die Treffer ebenfalls chronologisch auflistet. \nDas Ziel der Friedrich-Ebert-Stiftung, die für das Projekt verantwortlich zeichnet, ist es, alle historischen Zeitschriften der Sozialdemokratie digital zu erfassen."
publicationHistory: 1865-1866
