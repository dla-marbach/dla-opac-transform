noteContent_mv: "Das Online-Lexikon der Argumente ist ein Nachschlagewerk und gleichzeitig eine Übersicht über Theorien und Kontroversen in der Philosophie. Es bietet Synopsen in Tabellenform, Begriffserklärungen und eine Suchefunktion, die Gegenargumente systematisch auffindbar macht. Der Schwierigkeitsgrad geht von verständniserleichternden Definitionen bis hin zur Diskussion zwischen Forschern. Die Seite ist nichtkommerziell, kostenlos nutzbar und werbefrei.<br>\r\nDas Lexikon der Argumente stellt kontroverse Theorien und Positionen einander gegenüber. Es ist offen für Beiträge von Lesern, insbesondere WissenschaftlerInnen und wissenschaftlichen Institutionen."
