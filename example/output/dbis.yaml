noteContent_mv: "Der Thesaurus linguae Latinae ist das maßgebliche Wörterbuch des antiken Lateins: Als einziges Lexikon bezieht der Thesaurus alle überlieferten lateinischen Texte von den Anfängen bis 600 n. Chr. ein, berücksichtigt also neben der klassischen Latinität auch ausführlich die Besonderheiten der spätantiken und christlichen Texte. Untersucht werden nicht nur literarische Werke, sondern auch juristische und medizinische Gebrauchstexte, Inschriften, Graffiti und vieles mehr.<br />\nIn Absprache mit dem Verlag De Gruyter bietet die Bayerische Akademie der Wissenschaften eine Open-Access-PDF-Version (organisiert nach Bänden und Lemmata) der bisher erschienenen Bände A - M und O - P, so wie Teile von N und R an. \nAktuell wird an N (Band IX/1) und R (Band XI/2) gearbeitet. Hier werden neue Faszikel mit einer moving wall veröffentlicht, die mit dem Verlag De Gruyter abgestimmt ist.\nDer Zugang ist kostenlos."
