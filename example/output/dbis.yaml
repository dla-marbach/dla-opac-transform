filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Das Repertorium der Briefe Ferdinand Freiligraths (1810-1876) beinhaltet eine Aufbereitung sämtlichen überlieferten (veröffentlichten und unveröffentlichten) Korrespondenzmaterials des Dichters sowie aller nicht mehr überlieferten, aber erschließbaren diesbezüglichen Dokumente. Neben den Briefen wurden auch alle briefähnlichen Zeugnisse, wie Karten, Telegramme, Widmungsschreiben, Visitenkarten, Entwürfe u.ä., berücksichtigt.\r\nInsgesamt konnten so noch rund 5350 Briefzeugnisse Freiligraths nachgewiesen werden. \r\nZiel dieses Projektes war es, zum ersten Mal eine systematische Erfassung des Briefwerks Freiligraths nach archivalisch-bibliographischen Grundsätzen vorzunehmen sowie durch eine inhaltliche Aufschlüsselung zu ergänzen und damit für die wissenschaftliche Praxis möglichst effizient nutzbar zu machen. Das Repertorium versteht sich somit in seiner Beschreibung aller wichtigen Parameter und Bezugsgrößen der Textzeugen (wie Schreib- und Adressatenkennung, Standort, Drucke und Druckvergleich, Umfang, Papierbeschreibung und -erhaltung etc.) sowohl als unverzichtbare editorische Vorleistung für eine nach wie vor fehlende Gesamtausgabe der Briefe als auch vor allem durch die Regestenerschließung der Briefinhalte als ein wichtiges Hilfsinstrument für die literaturgeschichtliche Forschung im weitesten Sinne."
publicationHistory: 1817-1876
