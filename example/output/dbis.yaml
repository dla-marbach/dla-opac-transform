noteContent_mv: "Die Stellenbibliographie von David N. Yeandle, bearbeitet von Carol Magner, bietet zu jedem einzelnen Vers des Parzival bibliographische Hinweise und  thematische Angaben zu den jeweiligen Kommentaren der Sekundärliteratur. Sie bietet auch eine lemmatisierte Konkordanz zum Parzival-Text, die mit den lexikographischen Hilfsmitteln der Universität Trier für jedes Wort des Parzival direkt verlinkt ist. Ein lemmatisierter Index der Werktitel ermöglicht das detaillierte Suchen nach Themen und Vokabeln der Sekundärliteraturtitel. Der Volltext der Anmerkungen der Parzival-Ausgabe von Bartsch (bearbeitet von Marta Marti) erscheint in der SBP neben dem Text des Parzival. Die SBP enthält neben dem Parzival-Text mit bibliographischen Stellenangaben folgende Register:<BR><ul>\r\n<li>Thematisches Register (hierarchisch)</li>\r\n<li>Thematisches Register (alphabetisch)</li>\r\n<li>Autorenregister</li>\r\n<li>Lemmatisierter Wortindex der Werktitel</li>\r\n<li>Werktypenregister</li>\r\n<li>Werksprachenregister</li>\r\n<li>Werkdatenregister</li>\r\n<li>Konkordanz</li></ul>"
