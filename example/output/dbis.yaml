noteContent_mv: |-
  Neue Sachlichkeit“ bezeichnet nicht nur eine Stilrichtung der deutschen Malerei der 1920er-Jahre, sondern auch zeitgleiche Strömungen in Literatur, Musik, Architektur, Film und Fotografie.
  Die Datenbank weist internationale wissenschaftliche Fachpublikationen der verschiedenen Disziplinen nach, die sich thematisch mit dem Phänomen Neue Sachlichkeit beschäftigen.
  <p>Von der Auswertung ausgenommen sind in der Regel Publikationen mit einem allgemeineren Inhalt, etwa Literaturgeschichten, Lexika und allgemeine Handbücher.</p>
  <p>Die Suchoberfläche steht in deutscher und englischer Sprache zur Verfügung. Neben einer Schnellsuche, kann gezielt mittels Autorennamen, Titelstichwörtern, Schlagwörtern, Kunstgattung oder auch geographischem Bezug gesucht werden.</p>
  <p>Für die Eingrenzung von Suchergebnissen stehen Filtermöglichkeiten zur Verfügung.</p>
