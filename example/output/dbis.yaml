noteContent_mv: |-
  Der Diskursmonitor ist eine gemeinschaftlich erarbeitete Online-Plattform zur Aufklärung und Dokumentation von strategischer Kommunikation.

  Sie finden hier fachlich fundierte Informationen zu der Frage, wie mit Sprache, Bildern und Medien politische Interessen verfolgt werden: das Glossar erläutert und illustriert wichtige Begriffe aus Praxis und Forschung; das Review und das Barometer geben Einblicke in die aktuelle Diskursgroßwetterlage in verschiedenen gesellschaftlichen Bereichen; die Werkstatt bietet Handreichungen für die Praxis.

  Der Diskursmonitor ist ein disziplinenübergreifendes, webbasiertes Informations- und Dokumentationsportal zur strategischen Kommunikation in öffentlichen Diskursen (www.diskursmonitor.de). Das Portal richtet sich nicht nur an die Fachcommunity der Diskursforschung sowie verwandter Fachbereiche (etwa Sozial- und Kulturwissenschaften), sondern vor allem auch an Praktiker und Praktikerinnen aus Politik, Medien, Bildung, Justiz und Zivilgesellschaft. Sein Ziel ist erstens die bislang verstreute und nur innerakademisch zugängliche Diskursforschung aus verschiedenen Disziplinen im Hinblick auf ihre Essenz systematisch aufzubereiten und leichter zugänglich zu machen; zweitens sollen aktuelle diskursive Entwicklungen auf Basis qualitativer und computergestützter Verfahren aufgezeigt und damit verhandelbar werden; drittens werden Materialien und Handreichungen für den Einsatz in Lehr-Lern-Kontexten (Schulen, NGOs usw.) bereitgestellt. Der Diskursmonitor verbindet ein originäres diskursanalytisches Forschungsinteresse – die Erfassung, Systematisierung und Beschreibung strategischer Kommunikation – mit dem Anspruch einer engagierten wissenschaftlichen Diskursintervention. Der Diskursmonitor versteht sich als Beitrag zur (kommunikativen) ‚Waffengleichheit‘ unter den verschiedenen konfligierenden Interessensgruppen im politischen Diskurs, indem er unbemerkte Diskursstrukturen sichtbar macht.
