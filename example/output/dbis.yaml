filterType_mv: Daten
noteContent_mv: |-
  Die African Studies Library ist das Fachportal für die Afrikastudien und bietet ein zentrales Rechercheportal für eine integrierte Katalogsuche von Fachausschnitten nationaler und internationaler Bibliotheksbeständen. Durch ein Log-in ist es möglich, personalisierte Dienste zu nutzen, wie zum Beispiel Merklisten anzulegen. Hierfür brauchen Sie kein neues Nutzerkonto, sondern können sich einfach über Ihre ORCID-ID anmelden.<br />Außerdem bietet der zweisprachige (Englisch, Französisch) African Studies Toolbox Blog weitere hilfreiche Ressourcen zur Afrikaforschung: Infos zu Forschungsdatenmanagement, Open Access, Online-Ressourcen für die Afrikastudien oder Infos zu besonderen afrikabezogenen Bibliothekssammlungen und Archiven. Auf der News-Seite ﬁnden Sie Neuigkeiten über Konferenzen, Webinare und Stellenangebote zu afrikabezogener Forschung.<br />Auch Informationen und Zugangsmöglichkeiten zu den lizenzierten Datenbanken sind im Portal enthalten; alle interessierten Wissenschaftlerinnen und Wissenschaftler in Deutschland können sich kostenfrei für diese registrieren.<p>
  Lizenzierte Datenbanken:<br />
  </p><ul><li>African Books Collective: FID-Lizenz durch das Kompetenzzentrum für Lizenzierung, gehostet durch die UB JCS.</li><li>African Writers Series: Nationallizenz, Heineman Publishing via ProQuest.Apartheid: Global Perspectives, 1946-1996: Nationallizenz via Newsbank-Readex.</li><li>Corpus de la première littérature francophone de lAfrique noire : Nationallizenz via Classiques Garnier Numérique.</li><li>Sabinet: Ein Paket wissenschaftlicher Zeitschriften des südafrikanischen Anbieters Sabinet.</li></ul><p>Das Rechercheportal African Studies Library löst die bisherige Literatursuche „ilissAfrica“ (Internet Library Sub-Saharan Africa) ab. Es wurde die Zahl der eingebundenen Bibliothekskataloge erhöht sowie Funktionalitäten und der Nutzungskomfort verbessert.<br />

  Die African Studies Library ist ein Projekt des seit 2016 von der Deutschen Forschungsgemeinschaft (DFG) gefördertem Fachinformationsdienst (FID) Afrikastudien.</p>
