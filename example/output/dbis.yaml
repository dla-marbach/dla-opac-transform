noteContent_mv: 'Die Notizbücher des Literaturnobelpreisträgers Peter Handke bilden einen größtenteils noch unveröffentlichten Werkkomplex. Der Autor hielt täglich fest, was er zu Hause oder auf Reisen erlebte: Träume, Gedanken und Wahrnehmungen ebenso wie Zitate aus Lektüren oder Einfälle zu eigenen Werken. Die im März 1976 begonnenen „Reportagen” von „Bewusstseins-Ereignissen” aller Art, auch in Form von Zeichnungen, machen die Notizbücher zu einzigartigen Dokumenten und unverzichtbaren Quellen für die Handke-Forschung. 21 Notizbücher von 1976 bis 1979 (knapp 3000 Seiten) werden erstmals publiziert und sind in einer synoptischen Ansicht von Faksimile, Transkription, Lesefassung und der Codierung in TEI-XML zu sehen. Ein Orts-, Personen- und Werkregister erschließt das gesamte Korpus. Die digitale Edition wird vom Österreichischen Literaturarchiv Wien und vom Deutschen Literaturarchiv Marbach in Zusammenarbeit mit der Abteilung Forschung und Datenservices der Österreichischen Nationalbibliothek erarbeitet. Alle Forschungsdaten werden langzeitarchiviert und offen für die Nachnutzung zur Verfügung gestellt.'
