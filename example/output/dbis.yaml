noteContent_mv: Die unter dem Namen Hallesche Berichte bekannten, periodisch erschienenen Missionsberichte aus Indien im 18. Jahrhundert gelten als erste protestantische Missionszeitschrift. Die von den Missionaren der Dänisch-Halleschen Mission aus Südostindien nach Halle gesandten Briefe und Berichte wurden 1710 erstmals unter dem Namen „Der Königlich dänischen Missionarien aus Ost=Indien eingesandter ausführlichen Berichten erster Theil, Halle 1710“ veröffentlicht. Diesem ersten Bericht folgten 108 Continuationen bis zum Jahr 1772, die in der Buchhandlung des halleschen Waisenhauses verlegt wurden. Alle Einzelbeiträge der 108 Continuationen sind in der Datenbank erfasst. Über eine Register-, eine einfache oder kombinierte Suche ist so der Zugriff auf die insgesamt 1727 Briefe, Tagebücher, Berichte und Abhandlungen, aber auch auf die 47 Abbildungen möglich. Von den Einzelbeschreibungen führen Links zum Digitalisat des jeweiligen Beitrags. Weitere Verknüpfungen führen zu den Beschreibungen der Handschriften, die den Drucken zugrunde liegen und die im Archiv der Franckeschen Stiftungen aufbewahrt werden, wo sie in einer  <a href="https://digital.francke-halle.de/fsha/nav/classification/366795?s=date">Datenbank</a> erschlossen wurden.
