filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Der ‚Handschriftencensus‘ hat sich zum Ziel gesetzt, das gesamte deutschsprachige Handschriftenerbe des Mittelalters systematisch zu erfassen. Es handelt sich um aktuell (Stand Oktober 2023) über 7000 Werke aus ca. 26.000 Handschriften und Fragmente aus der Zeit von etwa 750 bis um 1520, die weltweit in mehr als 1.500 Bibliotheken, Sammlungen und Archiven verstreut und häufig sogar in einzelne Blätter zerlegt an verschiedenen Orten aufbewahrt werden.<br>\r\nDer Zugang zur Bestandsaufnahme der handschriftlichen Überlieferung deutschsprachiger Texte des Mittelalters ist möglich über ein Gesamtverzeichnis Aufbewahrungsorte oder das Gesamtverzeichnis Werke. Die Forschungsliteratur zu deutschsprachigen Handschriften des Mittelalters versammelt sämtliche in den Handschriftenbeschreibungen aufgeführten Literaturangaben sowie Handschriftenkataloge und -verzeichnisse.<br>\r\nIm ‚Handschriftencensus‘ eingebunden sind das ‚Marburger Repertorium deutschsprachiger Handschriften des 13. und 14. Jahrhunderts‘ und das ‚Paderborner Repertorium der deutschsprachigen Textüberlieferung des 8. bis 12. Jahrhunderts‘. Assoziiert sind zudem das ‚Freidank-Repertorium‘ und das ‚Marburger Repertorium zur Übersetzungsliteratur im deutschen Frühhumanismus‘.<br>\r\nSeit 2017 ist der Handschriftencensus ein von der Akademie der Wissenschaften und der Literatur Mainz gefördertes Vorhaben."
