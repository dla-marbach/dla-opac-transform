noteContent_mv: "Ein Projekt des Kompetenzzentrums für elektronische Erschließungs- und Publikationsverfahren in den Geisteswissenschaften an der Universität Trier, das sich mit der Erstellung und Erschließung digitaler Wörterbücher, Nachschlagewerke und Enzyklopädien einschließlich der ihnen zugrunde liegenden Primärquellen beschäftigt, die auf intelligente Weise untereinander vernetzt werden. \n<br />Eingebunden sind derzeit unter anderem folgende Wörterbücher:\n<ul>\n<li>Deutsches Wörterbuch von Jacob und Wilhelm Grimm</li>\n<li>Althochdeutsches Wörterbuch </li>\n<li>Mittelhochdeutsches Wörterbuch</li>\n<li>Mittelhochdeutsches Handwörterbuch von Matthias Lexer (und Nachtrag)</li>\n<li>Findebuch zum mittelhochdeutschen Wortschatz</li>\n<li>Pfälzisches Wörterbuch</li>\n<li>Rheinisches Wörterbuch (und Nachtrag)</li>\n<li>Wörterbuch der elsässichen Mundarten</li>\n<li>Wörterbuch der deutsch-lothringischen Mundarten</li>\n<li>Goethe-Wörterbuch</li>\n<li>Mittellateinisches Wörterbuch</li>\n</ul>\nDes Weiteren sind zusätzliche externe Wörterbücher mit dem Wörterbuchnetz auf Artikelebene verknüpft. Das <a href=\"https://mlw.badw.de/mlw-digital/mlw-open-access.html\"> <b>Mittellateinische Wörterbuch (MLW) </b> </a> wird auch als Open-Access-PDF-Version angeboten."
