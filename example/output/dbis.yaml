noteContent_mv: "Im Rahmen des Projektes Codices Electronici Sangallenses (Digitale Stiftsbibliothek St. Gallen) wurden mittelalterliche Handschriften der Stiftsbibliothek St. Gallen durch eine virtuelle Bibliothek erschlossen.\r\nDie schönsten illuminierten Handschriften wurden in einer Auflösung reproduziert, die nicht nur für die praktische Arbeit mit Handschriften ausreicht, sondern auch detaillierte (z. B. kunsthistorische) Analysen von Miniaturen erlaubt. Metadaten zu den Handschriften (in erster Linie wissenschaftliche Handschriftenbeschreibungen) wurden in einem Datenbanksystem verwaltet und durch verschiedene Zugriffsinstrumente mit den Digitalisaten verknüpft. Dadurch wurde ein Arbeitsinstrument für die handschriftenorientierte Forschung erstellt, das langfristig angelegt ist und potentiell alle Informationen zu den einzelnen Handschriften einbinden kann. Dieses Arbeitsinstrument ersetzt die Konsultation der wertvollen Originale bis zu einem gewissen Grad und trägt so maßgeblich zu deren Schonung bei.\r\nPräsentiert werden die Handschriften auf der Internetseite des Projektes e-codices - Virtuelle Handschriftenbibliothek der Schweiz."
