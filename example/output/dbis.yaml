noteContent_mv: "Im Zentrum des von der DFG von 2007 bis 2012 geförderten Projekts Übersetzungsliteratur im deutschen Frühhumanismus stehen die frühhumanistischen Übersetzer und ihre deutschsprachigen Werke bis 1500. Erfasst werden damit nicht nur die Übersetzer der ersten Generation, sondern darüber hinaus auch Autoren der Übergangszeit, deren Wirkungsspektrum vor allem an der Universität, dem Heidelberger Hof sowie den Metropolen Straßburg, Basel, Augsburg und Nürnberg liegt.\r\nBreiten Raum nimmt im MRFH die Überlieferungsgeschichte der Übersetzungen ein, in der sich zugleich der Umbruch vom handschriftlichen zum gedruckten Buch widerspiegelt."
