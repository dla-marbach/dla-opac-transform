noteContent_mv: "Der Bezalel Narkiss Index of Jewish Art weist Abbildungen und Informationen über jüdische Kunstartefakte auf der ganzen Welt nach. Die Datenbank enthält über 260.000 Bilder (mit Wasserzeichen versehen) von Objekten und Artefakten aus 700 Museen, Synagogen und privaten Sammlungen aus 41 verschiedenen Ländern. Ebenfalls enthalten sind Architekturzeichnungen von 1500 Synagogen und rituellen Bauwerken von der Antike bis zur Gegenwart (Stand: 08/2017). Die Datenbank gilt laut Anbieter als umfassendste ihrer Art. Über 30 Jahre nahm die Erstellung des Index in Anspruch, weitere sechs Jahre dessen Digitalisierung. Einige der eingetragenen Objekte existieren heute nicht mehr. 2012 setzte die israelische Regierung den Bezalel Narkiss Index of Jewish Art auf die Liste des immateriellen nationalen Kulturerbes.<br/><br/>\r\nDie Digitalisierung der Archive des Center for Jewish Art (CJA) an der Hebrew University of Jerusalem erfolgte in Zusammenarbeit mit der National Library of Israel und der Judaica-Abteilung der Harvard University Library."
