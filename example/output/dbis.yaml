noteContent_mv: |-
  Die Daten deutscher Dichtung sind seit ihrem ersten Erscheinen 1953 eines der am weitesten verbreiteten Nachschlagewerke zur deutschen Literatur. Die Verfasser Herbert A. und Elisabeth Frenzel behandeln die Geschichte der deutschen Literatur von den Anfängen über Klassik und Romantik bis zum Realismus und Naturalismus. Sie interpretieren und ordnen die deutsche Dichtung des 20. Jahrhunderts bis in die Gegenwart nach dem gleichen Prinzip. Neben den Angaben über die Erstveröffentlichung eines Werks oder Termin und Ort der Uraufführung eines Schauspiels werden Inhalt, Form und Wirkung dargestellt. Dies und die zusammenfassenden Einleitungen und Biographien charakterisieren die Autoren und ihren Bezug zur dargestellten Epoche der deutschen Literatur.<br />
  Die CD-ROM basiert auf der im Deutschen Taschenbuch Verlag veröffentlichten 34. Auflage der Buchausgabe vom Oktober 2004. Die 35. Auflage hat der Verlag wegen umstrittener Tendenzen zurückgezogen.<br />
  (Digitale Bibliothek ; 147)<br />
