noteContent_mv: "Mit der Übersetzungsdatenbank Linguee der DeepL GmbH ist es möglich, nach Übersetzungen von Wörtern und Textstellen im Satzzusammenhang zu suchen.\r\n<br> Ein Computerprogramm durchforstet das Internet, erkennt übersetzte Webseiten und bewertet deren Qualität. Neben professionell übersetzten Webseiten von Unternehmen, Organisationen und Universitäten werden auch zweisprachige Texte wie z. B. Patentschriften, EU-Dokumente oder wissenschaftliche Veröffentlichungen berücksichtigt.\r\n<br>Linguee eignet sich besonders, wenn man professionelle Texte in einer Fremdsprache formulieren muss und nach speziellen Vokabeln und Wendungen aus dem Berufsumfeld sucht. Linguee stellt in den 100 Millionen von übersetzten Texten zudem viele seltene Vokabeln bereit, die woanders nicht zu finden sind.\r\n<br>Neben dem Wörterbuch Linguee bietet DeepL auch einen gleichnamigen maschinellen  <a href = https://www.deepl.com/translator>Übersetzer/Translator</a> an. Mit diesem können auch Word- und PowerPoint-Dateien übersetzt werden. Der Übersetzer ist bislang für die Sprachen Englisch, Spanisch, Französisch, Portugiesisch, Italienisch, Niederländisch, Polnisch, Russisch, Japanisch und Chinesisch verfügbar."
