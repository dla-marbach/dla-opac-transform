noteContent_mv: »Die Nymphe« wurde in den 60er Jahren in München (in der Nymphenburger Straße) als Frauenprojekt gegründet und hat gleichzeitig angefangen, eine Bibliothek aufzubauen, wo Frauen aus der näheren oder weiteren Umgebung, frauenspezifische Bücher lesen und ausleihen konnten. »Die Nymphe« hat sich aufgelöst und den Bücherbestand an eines der Frauenprojekte von Condrobs e.V., an Viva Clara, übergeben. Diese Bibliothek mit ihren unbestreitbar wertvollen Schätzen aus der interessantesten Zeit der Frauenbewegung heißt es jetzt zu erhalten. Durch die finanziellen Schwierigkeiten, eine Bibliothek zu unterhalten (Kaution, Miete, langfristiger Mietvertrag, etc.), ist ein Teil der Bücher in alle Winde verstreut. Die noch vorhandenen, sollen hier der Nachwelt erhalten und zugänglich gemacht werden.
