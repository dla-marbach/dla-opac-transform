filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Guido Maria Dreves schuf mit den <i>Analecta Hymnica Medii Aevi</i> unter Mitarbeit von Clemens Blume und Henry M. Bannister die bislang größte Sammlung mittelalterlicher lateinischer Dichtung (Hymnen, Sequenzen, Tropen, Reimoffizien und Psalterien). Von 1886 bis 1926 erschienen 55 Bände.<br />
  Die elektronische Ausgabe von Dr. Erwin Rauner versucht die Erkenntnisziele ihrer Herausgeber zu erfüllen, indem nicht nur der gesamte Text der Analecta Hymnica, sondern auch erstmals die den Dichtungen beigegebenen Quellennachweise (Handschriften und Drucke) abfragbar sind. <br />
  Die Datenbank bietet diverse Suchmöglichkeiten. Recherchiert werden kann neben den bibliographischen Daten in den Registern u.a. nach Versenden und Reimen. Bei der Volltextsuche können systematische (nur in Versen, nur im Apparat, nur in den Handschriften, nur in Drucken), thematische oder chronologische Sucheinschränkungen getroffen werden.
