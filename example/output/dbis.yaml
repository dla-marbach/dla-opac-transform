noteContent_mv: "<b>Der Zugriff ist abhängig von der Lizenz der jeweiligen Einrichtung!</b> <br />\nMUNZINGER Online bietet Kurzbiographien von Personen aus aller Welt, Informationen zu allen Ländern der Erde, Nachschlagewerke zu Literatur, Film und Musik, Presse- und Musikportale, Sachbücher, Reiseliteratur, Zeitungen und Zeitschriften. \n<br />\n<br />PRODUKTE:\n<ul>\n<li><b>Biographien:</b><br />\n- Munzinger Personen (Archiv)<br />\n- Munzinger Sport (Internationales Sportarchiv)<br />\n- Munzinger Pop (Pop-Archiv International)</li>\n<li><b>Länderinformationen:</b><br />\n- Munzinger Länder (Internationales Handbuch - Länder aktuell)<br />\n- Munzinger Chronik (Internationales Handbuch - Zeitarchiv)</li>\n<li><b>Literatur - Film - Musik:</b><br />\n- Kindlers Literatur Lexikon (KLL)<br />\n- Kritisches Lexikon zur deutschsprachigen Gegenwartsliteratur (KLG)<br />\n- Kritisches Lexikon zur fremdsprachigen Gegenwartsliteratur (KLfG)<br />\n- Neue Rundschau Archiv<br />\n- Lexikon der Illustration<br />\n- Komponisten der Gegenwart (KdG)<br />\n- film-dienst (Kritiken)<br />\n- Naxos Music Library <br />\n- Naxos Music Library Jazz<br />\n- Naxos Spoken Word Library<br />\n- Naxos Video Library</li>\n<li><b>Wörterbücher und Lexika:</b><br />\n- Duden-Werke<br />\n</li>\n<li><b>Presse:</b><br />\n- Frankfurter Allgemeine Archiv<br />\n- Süddeutsche Zeitung<br />\n- Hamburger Abendblatt<br />\n- Berliner Morgenpost<br />\n- Der Spiegel<br />\n- Library PressDisplay</li>\n<li><b>Termine:</b><br />\n- Munzinger Gedenktage (Jubiläen und Jahrestage)</li>\n</ul>"
