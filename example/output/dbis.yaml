noteContent_mv: Das Portal „Corvey digital“ ist eine Online-Datenbank zum Nachweis mittelalterlicher Handschriften mit Provenienz der ehemaligen Reichsabtei Corvey. Die Datenbank ist das Ergebnis des Projekts „Mittelalterliche Buchhandschriften der Klosterbibliothek Corvey digital“, das in Kooperation mit der Erzbischöflichen Akademischen Bibliothek Paderborn an der Universitätsbibliothek der Philipps-Universität Marburg durchgeführt und 2020 bis 2021 von der Deutschen Forschungsgemeinschaft (DFG) gefördert wurde. Ziel des Projekts ist es, die in Marburg und Paderborn befindlichen Handschriften Corveyer Provenienz an der Universitätsbibliothek Marburg nach DFG-Vorgaben zu digitalisieren.<br/>Ziel des Portals ist es, die weltweit aufbewahrten Buchhandschriften Corveyer Provenienz zusammenzuführen. Im Portal sollen neben den Digitalisaten der in Marburg und Paderborn aufbewahrten Buchhandschriften viele weitere Stücke verfügbar werden.
