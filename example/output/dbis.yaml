noteContent_mv: |-
  Die Datenbank fußt auf einer zwischen 1972 und 2004 erschienenen fünfbändigen, inzwischen eingestellten Druckausgabe der Bibliographie Pariser Drucke des 16. Jahrhunderts, bearbeitet von Brigitte Moreau und basierend auf nur handschriftlich vorliegenden Untersuchungen Philippe Renourds (1862-1934). Sie wird laufend erweitert und nutzt die Möglichkeiten des Semantic web. <br />
  Die Bibliographie hat zum Ziel, alle Buchtitel zu erfassen, die während des 16. Jahrhunderts in Paris gedruckt worden sind. Während die Druckausgabe lediglich die Jahre 1501 bis 1540 abdeckte, weist die Datenbank inzwischen alle Ausgaben bis 1550 nach. <br />
  Neben einer einfachen und facettierten Suche, besteht die Möglichkeit des Browsens über Indices zu Autoren, Druckern und Druckereien, Werktiteln und Druckjahr. Weitere Indices sind in Vorbereitung.<br />
  Die Titelaufnahmen sind verknüpft mit Digitalisaten der Ausgaben (sofern vorhanden) sowie mit Normdaten zu Personen und Institutionen. Konsequent verlinkt sind die Aufnahmen zudem mit anderen Werken des Autors, Druckers und weiteren Werkauflagen sowie mit Titelnachweisen in internationalen Katalogen.
