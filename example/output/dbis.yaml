noteContent_mv: "Das Musicallexikon bietet Informationen zu den Ur- und Erstaufführungen des populären Musiktheaters im deutschsprachigen Raum seit 1945 und fügt sie zu einer Chronik zusammen. Im Gegensatz zu den üblichen Musicalführern stehen dabei nicht die Werke im Zentrum, sondern die Inszenierungen. Die Sortierung erfolgt alphabetisch nach Stücktiteln, chronologisch und nach Ländern geordnet (Deutschland, DDR, Österreich und Schweiz).<br>\r\nDas Musicallexikon wird herausgegeben von Wolfgang Jansen und Klaus Baberg in Verbindung mit dem Zentrum für Populäre Kultur und Musik der Albert-Ludwigs-Universität Freiburg."
