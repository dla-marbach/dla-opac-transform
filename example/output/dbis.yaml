filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Die Österreichische Literatur von Grillparzer bis Schnitzler präsentiert das Werk von 29 Autoren und Autorinnen, die diesen bedeutsamen Abschnitt der österreichischen Literatur nachhaltig mitgeprägt haben. Neben österreichischen Klassikern sind wichtige deutschsprachige Autoren der heutigen Tschechischen Republik ebenso vertreten wie Werke bedeutender Schriftstellerinnen. Zum Textbestand gehören Romane, Dramen, Erzählungen und Gedichte sowie eine Auswahl von Essays und autobiographischen Schriften.<br />
  Die Ausgabe enthält Werke von Peter Altenberg, Ludwig Anzengruber, Adolf Bäuerle (eigentlich Johann Andreas), Eduard von Bauernfeld, Ada Christen, Felix Dörmann, Marie von Ebner-Eschenbach, Bruno Ertler, Joseph Alois Gleich, Franz Grillparzer, Anastasius Grün, Friedrich Halm (eigentlich: Eligius Franz Joseph Freiherr von Münch-Bellinghausen), Hugo von Hofmannsthal, Franz Kafka, Friedrich Kaiser, Nikolaus Lenau, Karl Meisl, Johann Nestroy, Betty Paoli, Ferdinand Raimund, Rainer Maria Rilke, Peter Rosegger, Ferdinand von Saar, Arthur Schnitzler, Franz und Paul von Schönthan, Adalbert Stifter, Bertha von Suttner, Georg Trakl und Anton Wildgans.<br />
  (Digitale Bibliothek : Sonderband ; 7)
