filterType_mv: Daten
noteContent_mv: Mit <i>avldigital.de</i> bietet der Fachinformationsdienst Allgemeine und Vergleichende Literaturwissenschaft (FID AVL) ein Onlineportal, das ein fachliches Recherchetool, Publikationsdienstleistungen und Informationsservices unter einem Dach vereint. Das Angebot entsteht in engem Austausch mit der Forschung und zielt darauf ab, dem aktuellen Literatur- und Informationsbedarf von Komparatist*innen punktgenau Rechnung zu tragen.<br /><ul><li>Das Modul „Recherchieren“ bietet einen Fachkatalog, der Nachweise von Monographien, Zeitschriften, Fachaufsätzen und E-Books aus unterschiedlichen bibliothekarischen und bibliographischen Datenquellen zusammenführt. Die Inhalte orientieren sich dabei gleichermaßen an einer „weiten“ Definition des Faches (die neben konkret komparatistischer Forschungsliteratur auch Publikationen aus den Einzelphilologien, der Theater-, Film- und Medienwissenschaft, der Kulturwissenschaft und der Ästhetik berücksichtigt) wie einem „engen“ Profilzuschnitt, der den Vergleich und die Theorie in den Mittelpunkt stellt. Auch die mit Mitteln des FID an der UB Frankfurt erworbene Forschungsliteratur sowie die Bestände des ehemaligen Sondersammelgebiets AVL sind hier verzeichnet.<br /></li><li>Das Modul „Publizieren“ bietet einen fachlichen Dokumentenserver sowie einen E-Journal-Hostingservice. Durch Kooperationen mit Forschungseinrichtungen und Fachverlagen können systematisch aktuelle Forschungsbeitrage in Open Access verfügbar gemacht werden. <br /></li><li>Das Modul „Vernetzen“ dient als Kommunikationsplattform für die komparatistische Fachcommunity und als Schnittstelle zur Komparatistik im Ausland. Im Forscher*innen-Verzeichnis können sich Personen ein einfaches Profil zur Darstellung Ihrer Forschungsaktivität anlegen. Aktuelle Meldungen wie Calls for Papers, Veranstaltungsankündigungen und Ausschreibungen können verbreitet werden. Hinzu kommt eine Datenbank mit Forschungsinstitutionen, laufenden Drittmittelprojekten und wissenschaftlichen Websites.</li></ul><p>Im Zuge der DFG-Förderung des FID AVL (zunächst bis einschl. 2021) wird <i>avldigital.de</i> kontinuierlich weiterentwickelt und um neue Datenquellen und Funktionen ergänzt.</p>
