noteContent_mv: |-
  Anthologie von Lyrik (zuerst deutschsprachig, später international) mit der Möglichkeit, die Gedichte auch gesprochen zu hören.<br />
  Aus den FAQ von lyrikline: Im November 1999 wurde lyrikline.org als deutschsprachige Plattform gestartet. Mit dem 1. Welttag der Poesie am 21. März 2000 kamen die ersten nicht deutschen Autoren hinzu. Am 21. März 2000 war www.lyrikline.org zentraler Veranstaltungsort des 1. UNESCO-Welttages der Poesie in Deutschland. Seitdem demonstrieren internationale Autoren, welche Möglichkeiten in der multilingualen www.lyrikline.org angelegt sind. ...<br /><br />
  Suche möglich nach:
  <ul>
  <li>Autoren: A-Z; nach Sprache; nach Edition; nach Übersetzung; ...</li>
  <li>Volltextsuche in den Gedichten oder in den Titeln der Publikationen über Dialog / Suche.</li>
  </ul>
  Die Einträge zu den aufgenommenen Autoren umfassen:
  <ul>
  <li>Gedichte (nur die in lyrikline aufgenommenen)</li>
  <li>Biographie (mit Foto)</li>
  <li>Publikationen (chronologisch geordnet)</li>
  <li>Preise, die verliehen wurden</li>
  <li>ggf. auch Links im WWW</li>
  </ul>
  Viele der nicht-deutschsprachigen Gedichte liegen auch in deutscher oder anderssprachiger Übersetzung vor.<br /><br />
  lyrikline.org geht zurück auf eine Idee und Initiative der literaturWERKstatt berlin.
