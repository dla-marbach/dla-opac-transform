noteContent_mv: 'Dieses Biografische Lexikon der Kommunikationswissenschaft (BLexKom) gibt dem Fach (im deutschsprachigen Raum) ein Gesicht. Vorgestellt werden die zentralen Akteure der Kommunikationswissenschaft: Professoren, Habilitierte und alle anderen Personen, die einen gewichtigen Beitrag geleistet haben – von Karl Bücher bis zu den frisch Berufenen. Jeder Eintrag bietet neben biografischen Angaben einen Überblick über die wichtigsten Publikationen und über die Sekundärliteratur sowie eine knappe Einordnung von Person und Werk in soziale und kognitive Hintergründe des Fachs. BLexKom wird vom Münchner Fachinstitut und dem Herbert von Halem Verlag produziert und greift dabei vor allem auf die Expertise zurück, die in zahlreichen fachgeschichtlichen Forschungsprojekten am Lehrbereich von Michael Meyen entwickelt wurde.'
