displayAddition1: Sammlung Nicht-Textueller-Materialien, Portal, Volltextdatenbank
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Die digitalen Sammlungen des Harry Ransom Centers der Universität von Texas in Austin bieten Zugriff auf mehr als 7000 Objekte aus den Bereichen Literatur, Fotografie, Film, bildende und darstellende Kunst ab dem 16 Jh. ff. (Stand: 12/2017). Den überwiegenden Teil machen Manuskripte, Mitteilungsblätter, Fotografien, Briefe, Plakate und Zeichnungen aus.<br /><br />

  Die Objekte teilen sich in über 70 Sammlungen auf, darunter folgende:<br />
  <ul>
   <li><b>Carl H. Pforzheimer Colletion</b>:<br />1400 englische Manuskripte aus dem 16.-19. Jh.<br /></li>
         <li><a href="http://dbis.uni-regensburg.de/dbinfo/detail.php?bib_id=alle&colors=&ocolors=&lett=fs&tid=0&titel_id=102441"><b>Gabriel García Márquez Collection</b></a>:<br />Fotografien, Manuskripte und Bücher aus dem Nachlass des kolumbianischer Schriftstellers, Journalisten und Literaturnobelpreisträgers (1927-2014).<br /></li>
         <li><b>Circus Collection</b>:<br />Über 800 Artikel, Fotografien, Plakate und Programme von amerikanischen und ausländischen Zirkussen und Schaustellern vom 19.-20 Jh.<br /></li>
         <li><b>Elliott Erwitt Photography Collection</b>:<br />Über 4000 Bilder unfassendes Online-Archiv des gleichnamigen US-amerikanischen Fotografen aus den 1940er-Jahren bis 2010. Erwitt (* 1928) stand zeitweise der Fotoagentur „Magnum Photos“ vor.<br /></li>
         <li><b>E. O. (Eugene Omar) Goldbeck Photography Collection</b>:<br />Fast 1000 Fotografien umfassendes Online-Archiv des kommerziellen US-amerikanischen Fotografien E. O. Goldbeck ( 1892-1986), der sich auf Panoramaaufnahmen spezialisierte.</li>
  </ul>
