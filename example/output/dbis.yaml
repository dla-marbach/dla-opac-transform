noteContent_mv: |-
  Das Joint Research Centre (JRC) ist der wissenschaftliche Dienst der Europäischen Kommission, die es mit seinen Forschungen berät. Diese konzentrieren sich auf die Bereiche Energie, Transport, Umwelt- und Klimawandel, Landwirtschaft und Lebensmittelsicherheit, Gesundheit und Verbraucherschutz, Informations- und Kommunikationstechnologien, Referenzmaterialien sowie Sicherheit (inklusive nuklearer Sicherheit im Euratom-Programm).
  <br />
  Die vom Joint Research Centre (JRC) erstellten Datenbanken und Angebote sind überwiegend kostenfrei verfügbar (einige setzen allerdings eine Registrierung voraus). Hierzu gehören u.a.:
  <br /><br />
  - African, Caribbean and Pacific (ACP) Countries Environmental Observatory<br />
  - AGRI4CAST Resources Portal<br />
  - The Atmosphere, Biosphere, Climate - Integrated Station (ABC-IS)<br />
  - Bioeconomy Observatory (BIOBS)<br />
  - ChemAgora Portal<br />
  - Community Image Data Portal (CID)<br />
  - Digital Map Archive<br />
  - Digital Observatory for Protected Areas (DOPA)<br />
  - ECCAIRS Portal - European Co-ordination Centre for Accident and Incident Reporting Systems<br />
  - Emission Database for Global Atmospheric Research (EDGAR)<br />
  - Environmental Marine Information System (EMIS)<br />
  - EU Aid Explorer<br />
  - Europe Media Monitor (EMM) - Newsbrief & Newsexplorer<br />
  - European Alien Species Information Network (EASIN)<br />
  - European Drought Observatory (EDO)<br />
  - European Forest Fire Information System (EFFIS)<br />
  - European Soil Data Centre (ESDAC)<br />
  - FATE Maps Data Portal<br />
  - Forest Pattern Map Viewer (EFDAC Map Viewer)<br />
  - Global Disaster Alert and Coordination System (GDACS)<br />
  - Global Flood Detection System (GFDS)<br />
  - Information Platform for Chemical Monitoring (IPCheM)<br />
  - INSPIRE Geoportal<br />
  - Major Accident Reporting System (eMARS)<br />
  - Medical Information System - MEDISYS<br />
  - Migration Data Catalogue & Knowledge Centre on Migration and Demography (KCMD) Data Catalogue (ehem. Migration Data Catalogue)<br />
  - National Renewable Energy Action Plans (NREAPs) and Progress Reports Data Portal<br />
  - Rapid natural-hazard triggered technological accidents (Natech) risk analysis and mapping<br />
  - Research and Innovation Observatory (RIO)<br />
  - Spatial economic analysis of coastal fishing communities<br />
  - The European Atlas of the Seas<br />
  - The European Union System for the Evaluation of Substances (EUSES)<br />
  - Urban Data Platform<br /><br />

  Die Datenbanken sind nach Name und Abkürzung sortiert und mit einer kurzen Inhaltsbeschreibung versehen. Diese Informationen sind auch über ein Suchfeld recherchierbar.
