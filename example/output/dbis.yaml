noteContent_mv: |-
  Die Datenbank enthält digitalisierte chinesische, japanische und koreanische Handschriften und Drucke aus dem Bestand der Bayerischen Staatsbibliothek, die zwischen dem 7. bis zum 19. Jahrhundert entstanden sind.<br />
  Die chinesische Sammlung zählt zu einer der weltweit bedeutendsten außerhalb Chinas und umfasst aktuell ca. 230.000 gedruckte Bände und über 3.000 Handschriften. Zu den wertvollsten Stücken zählen rund 20 Drucke aus den Dynastien Song (960-1279) und Yuan (1279-1368) sowie über 100 Drucke aus der Ming-Dynastie (1368-1644). <br />
  Aktuell (Stand April 2020) besteht Zugriff auf über 2 Millionen Einzelimages. Ein beträchtlicher Teil des urheberrechtsfreien Japonica-Bestands und der Großteil des urheberrechtsfreien Sinica-Bestands der Bayerischen Staatsbibliothek können mithilfe verschiedener Sucheinstiege recherchiert und eingesehen werden. Damit ist eine der großen ostasiatischen Sammlungen des europäischen Raumes online frei zugänglich.
