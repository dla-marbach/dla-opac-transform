noteContent_mv: |-
  Die Edition basiert auf der Studienausgabe von Karl Schlechta, die Nietzsches philosophische Werke erstmals auf einer gesicherten Textgrundlage präsentierte und als die bis heute meistrezipierte Lese- und Studienausgabe gelten kann. Sie enthält sämtliche zu Lebzeiten erschienenen Schriften Nietzsches, alle wichtigen Werke aus dem Nachlass, eine kommentierte Auswahl seiner Briefe sowie eine instruktive Zeit- und Lebenstafel. Detaillierte Informationen über das Leben Nietzsches und die Entstehungsbedingungen seines Werkes bietet die in die Edition integrierte monumentale Nietzsche-Biographie von Curt Paul Janz. Sie macht die engen Zusammenhänge zwischen Leben und Werk Nietzsches verständlich und ist zugleich ein Kommentar zu seinen philosophischen Werken und kompositorischen Arbeiten. Zahlreiche Textdokumente und Abbildungen vervollständigen die Biographie dieses einflussreichsten Philosophen an der Schwelle des 20. Jahrhunderts.<br />
  (Digitale Bibliothek ; 31)
