noteContent_mv: "bavarikon ist das Internetportal des Freistaats Bayern zur Präsentation von Kunst-, Kultur- und Wissensschätzen aus Einrichtungen in Bayern. Beteiligt sind Archive, Bibliotheken und Museen sowie Institutionen der Landesverwaltung, der Denkmalpflege und aus der Wissenschaft. bavarikon ermöglicht einen weltweiten und kostenlosen Zugang zu einem breiten Spektrum von Kulturgütern wie Urkunden und Archivalien, Handschriften, archäologischen Funden, Gemälden, Grafiken und Fotografien, Stadtplänen und Landkarten, Skulpturen, Zahlungsmitteln, Burgen und Schlössern sowie Volkskultur und vielem mehr. Ausgewählte Exponate werden als 3D-Modelle angeboten. (Stand: März 2023). \n\n<br />\nDie Digitalisate im Portal wurden teilweise eigens für bavarikon produziert. Das Portal wird monatlich um neue Inhalte erweitert und gewinnt laufend weitere Einrichtungen als neue Partner.\n\nbavarikon ging im April 2013 online. Es ist ein Bestandteil des Förderprogramms „Bayern Digital II“ der Bayerischen Staatsregierung und war in seinen Anfangsjahren ein Modul des „Bayerischen Kulturkonzepts“.\n<br />\nEine Liste aller beteiligten Institutionen finden Sie <a href=\"https://bavarikon.de/institutions\">hier</a>."
