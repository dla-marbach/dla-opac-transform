displayAddition1: Fachbibliographie
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: |-
  Die Naval Kishore Press Bibliographie dient als zentrales Nachweisinstrument für Druckwerke des 1858 in Lakhnau gegründeten Verlagshauses Naval Kishore Press, einem der bedeutendsten Verlagsunternehmen Indiens. Zu Lebzeiten des Gründers Munshi Naval Kishore (1836-1895) veröffentlichte der Verlag geschätzte 5.000 Titel in den Sprachen Hindi, Urdu, Arabisch, Persisch, Sanskrit und Englisch. Inhaltlich deckte das Verlagsportfolio eine große Bandbreite ab – Literatur in Hindi, Urdu, Arabisch, Persisch, Schulbücher, Ratgeber, Religion, Texte der klassischen Sanskrit-Literatur, Literatur zum Islam, zur indischen Heilkunde, Koran-Ausgaben, Übersetzung englischer Klassiker wie z.B. die Dramen William Shakespeares u.v.m.

  Ziel der Bibliographie ist es, die an Bibliotheken weltweit verteilten Bestände des Verlagshauses zentral in einer Datenbank nachzuweisen. Die Bibliographie ist im Aufbau, zu ergänzende Publikationen können per Mail gemeldet werden.

  Recherchierbar sind u.a. Verfasser und Titel sowie die Sprache einer Publikation und Themen. Browsing-Einstiege für die Sprache, Datenträgertyp und die Provenienz der Publikation stehen ebenso zur Verfügung.

  Die Bibliografie ist Teil von FID4SA - Fachinformationsdienst Südasien.
