noteContent_mv: |-
  Die Deutsche Forschungsgemeinschaft (DFG) hat 2013 bis 2016 das umfangreiche Projekt „Bewegte Netze“ gefördert, das sich mit den Beziehungen von Bauhaus-Angehörigen beschäftigte. Das Projekt ist inzwischen erfolgreich beendet, seine wissenschaftliche Verwertung hat bereits begonnen und wird mit den Feierlichkeiten zum 100-jährigen Bauhausjubiläum 2019 abgeschlossen sein.

  Im Rahmen des Projektes wurde eine Datenbank mit allen Bauhaus-Angehörigen erarbeitet, die Daten aus den drei Bauhaus-Institutionen in Weimar, Dessau und Berlin zusammenführte und durch umfassende Recherchen ergänzte. Diese weltweit einzigartige Ressource, die erstmals in der Lage ist, die Frage zu beantworten, wer eigentlich Bauhaus-Angehöriger war, ist seit September 2019 in Teilen auf einer Online-Plattform zur Personensuche zugänglich.
