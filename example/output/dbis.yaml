noteContent_mv: "Die Datenbank zum Amateur-Musiktheater (AMT) verzeichnet nicht-berufsmäßige Amateurensembles in Deutschland, einschließlich grenznaher Regionen der Nachbarländer Österreich, Schweiz, Frankreich, Niederlande und Dänemark. Im Erhebungszeitraum 2019-23 wurden all jene Gruppierungen erfasst, die mittels aufwändiger Recherchen u.a. in regionalen Spielplänen, Fachzeitschriften, Internet-Magazinen, -Portalen, -Foren und Archiven ausfindig gemacht werden konnten. Derzeit umfasst die Datenbank über 1.400 eingetragene Ensembles (Stand Mai 2023), die sich nach verschiedenen Kriterien (u.a. Region bzw. Wirkungskreis, Gründungsjahr, Trägerschaft bzw. Institution) durchsuchen lassen.\r\nZiel der AMT-Datenbank ist es, die jüngere Entwicklung des Amateur-Musiktheaters im deutschsprachigen Kulturraum kategorial differenziert und in regional fokussierter Form möglichst vollständig zu erfassen und beschreibbar zu machen. Nicht erfasst wurden hierbei Ensembles und Vereine, die hauptsächlich oder ausschließlich im Bereich des Sprech- bzw. Volkstheaters aktiv sind."
