noteContent_mv: "Die Datenbank ermöglicht die Recherche im gesamten Datenbestand des gedruckten Inkunabelkatalogs sowie in digitalisierten Bildseiten. Die Konversion erfolgte mit Zustimmung des Verlags. Aus technischen Gründen sind derzeit manche Sonderzeichen, die im Katalog verwendet werden (z.B. mittelalterliche Abbreviaturen und Ligaturen, besonders solche in Fraktur) nicht darstellbar. Sie werden je nach Browser durch eine Blockade (|) oder ein Fragezeichen (?) wiedergegeben. Eine typographisch exakte Wiedergabe findet sich im gedruckten Katalog.<br />\n<p><i>Aktualitätsstand:</i><br />\nDerzeit (August 2004) befinden sich die Beschreibungen auf dem Stand des gedruckten Katalogs. In Zukunft werden jedoch neue Erkenntnisse fallweise in die Katalogbeschreibungen eingearbeitet werden, so daß die elektronische Fassung einen aktuelleren Wissensstand wiedergeben wird. Daneben ist vorgesehen, sukzessiv auch Beschreibungen von Neuerwerbungen und bisher unkatalogisierten Inkunabelexemplaren aufzunehmen. Es wird daher empfohlen, beim Zitieren von elektronischen Katalogbeschreibungen auch das Datum anzugeben, an dem sie eingesehen wurde.</p>\n<i>Digitalisate:</i><br /> \nDigitalisate sind (Stand: August 2004) bereits vorhanden zu 76 meist deutschsprachigen Inkunabelausgaben: 6377 Seiten mit gedruckten Illustrationen (überwiegend schwarzweiße, aber auch zahlreiche kolorierte Holzschnitte). Die Abbildungen sind ikonographisch erschlossen. Demnächst folgen 575 Inkunabel-Einblattdrucke."
