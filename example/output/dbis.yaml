noteContent_mv: "LIFE war eine amerikanische illustrierte Zeitschrift mit internationaler Verbreitung. Sie wurde von 1936 bis 1972 in New York herausgegeben. Vom TIME-Verleger Henry Luce begründet, gilt das Blatt als Pionier im Bereich des Fotojournalismus. U. a. arbeiteten so bekannte Fotografen wie Margaret Bourke-White, Horace Bristol, Alfred Eisenstaedt, Andreas Feininger, Carl Mydans, W. Eugene Smith und Tony Vaccaro für LIFE. Die Fotografen dokumentierten u. a. zahlreiche Konflikte, darunter den Zweiten Weltkrieg, Korea- und Vietnamkrieg. Ebenso schrieben eine Reihe von renommierten Autoren für das Magazin; u. a. kam es 1952 in LIFE zur Erstveröffentlichung von Ernest Hemingways Novelle „Der alte Mann und das Meer“. Nach Einstellung des Magazins erschien unter dem gleichen Titel eine Monatsschrift (1978-2000) bzw. als Wochenbeilage (2004-2007).<br /><br />\r\nVia Google Books lassen sich kostenfrei die gesamten Jahrgänge von 1936 bis 1972 einsehen. Sowohl alle Zeitschriftenhefte als auch einzelne Ausgaben können nach Stichworten durchsucht werden. Auch lassen sich Permalinks erzeugen. Das Kopieren, Abspeichern oder Ausdrucken ist nicht möglich."
