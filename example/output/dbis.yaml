noteContent_mv: "Rhizom Filmgeschichte“: ein virtuelles Netzwerk, das sich um hundert wichtige Werke der deutschen Filmgeschichte spinnt: \r\n„Der aus Biologie und Philosophie hergeleitete Begriff „Rhizom“ versteht sich als dreidimensionale, ästhetisch-inhaltliche Vernetzung. „Rhizom Filmgeschichte“ lädt zur Erkundung kuratierter Themen ein. Für die cineastische Spurensuche stehen hundert Filmbeispiele bereit, die sich über jeweils 15 Schlagworte verknüpfen lassen. Eine audiovisuelle Verführung, die dem Urtrieb der Schaulust huldigt. Fünf Minuten lang ist der jeweilige Filmanfang eines Werkes in bester Bild- und Tonqualität zu sehen und zu hören. Auf diese Weise werden die begleitenden knappen, aber informativen Texte optisch und akustisch grundiert.“"
schemaVersion: 0.16.0
source: AK
