noteContent_mv: |-
  Die Suchmaschine Aleph ist Teil des <a href="https://investigativedashboard.org">Investigative Dashboard</a> einer  Plattform des Organized Crime and Corruption Reporting Project (OCCRP) und ermöglicht die Recherche in über 100 verschiedenen Datenquellen. Darunter befinden sich z.B. Firmenregister, Amtsblätter sowie Nachrichtenarchive (u.a. Washington Post, New York Times DocumentCloud, Archiv von ProPublica). Die Kombination aus strukturiert verfügbaren Daten zu Firmen und Einzelpersonen sollen es vor allem zu einem attraktiven Recherchetool für investigative Journalisten machen, die auch eigenes Material zum Bestand ergänzen können.<br /><br />
  Die Datenbank wurde 2016 von Friedrich Lindenberg erstellt, Programmierer für Software zur investigativen Datenanalyse (u.a. Open Knowledge Foundation, Spiegel Online).
