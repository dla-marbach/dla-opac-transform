filterType_mv: Daten
noteContent_mv: "Das im November 2017 gestartete Graphikportal präsentiert erstmals die Bestände graphischer Sammlungen aus Deutschland, Italien, Österreich und der Schweiz auf einer gemeinsamen Online-Plattform und stellt diese für die wissenschaftliche Recherche zur Verfügung. Gegenwärtig sind mehr als 440.000 digitalisierte Werke kostenfrei abrufbar, darunter Objekte von Albrecht Dürer, Max Liebermann, Adolph von Menzel, Rembrandt oder Henri de Toulouse-Lautrec. Bevorzugte Sammlungsbestände sind Handzeichnungen, Malerei auf Papier (inklusive Inkunabeln) sowie sämtliche druckgraphisch hergestellte Werke. Im Graphikportal finden sich auch Illustrationen aus anatomischen Lehrbüchern, Scheibenrisse oder Entwürfe für Monogramme. Künstlerische Fotografie wird aufgrund der Vielfalt der Bestände zunächst ausgeschlossen.<br><br>\r\n\r\nDerzeit vernetzt sind die Bestände aus 31 Sammlungen folgender Institutionen (Stand: 02/2023):<br><br>\r\n\r\n<ul><li>Bamberg, Staatsbibliothek</li>\r\n<li>Berlin, Kupferstichkabinett, Staatliche Museen zu Berlin</li>\r\n<li>Braunschweig, Herzog Anton Ulrich-Museum</li>\r\n<li>Braunschweig, Städtisches Museum</li>\r\n<li>Coburg, Kunstsammlungen der Veste Coburg</li>\r\n<li>Darmstadt, Institut Mathildenhöhe</li>\r\n<li>Dresden, Staatliche Kunstsammlungen Dresden, Kupferstich-Kabinett</li>\r\n<li>Florenz, Fotothek des Kunsthistorischen Instituts in Florenz</li><li>Frankfurt/Main, Goethe-Haus - Freies Deutsches Hochstift/Frankfurter Goethe-Museum</li> \r\n<li>Frankfurt/Main, Städel Museum</li>\r\n<li>Frankfurt/Main, Universitätsbibliothek</li>\r\n<li>Genf, Cabinet d’arts graphiques der Musées d’art et d’histoire</li>\r\n<li>Halberstadt, Gleimhaus, Museum der deutschen Aufklärung</li>\r\n<li>Hamburg, Kupferstichkabinett der Hamburger Kunsthalle</li>\r\n<li>Hamburg, Staats- und Universitätsbibliothek</li>\r\n<li>Heidelberg, Universitätsbibliothek</li>\r\n<li>Kassel, Museumslandschaft Hessen Kassel, Graphische Sammlung</li>\r\n<li>Köln, Wallraf-Richartz-Museum - Fondation Courboud</li>\r\n<li>Leipzig, Deutsche Nationalbibliothek - Deutsches Buch- und Schriftmuseum</li>\r\n<li>Marburg, Hessisches Landesarchiv - Hessisches Staatsarchiv</li>\r\n<li>München, Staatliche Graphische Sammlung</li>\r\n<li>Nürnberg, Germanisches Nationalmuseum</li>\r\n<li>Rom, Casa di Goethe</li>\r\n<li>Rom, Fotothek der Bibliotheca Hertziana</li>\r\n<li>Stuttgart, Staatsgalerie</li>\r\n<li>Stuttgart, Württembergische Landesbibliothek</li>\r\n<li>Wien, Albertina</li>\r\n<li>Wien, MAK – Österreichisches Museum für angewandte Kunst/Gegenwartskunst</li>\r\n<li>Wolfenbüttel, Herzog August-Bibliothek</li>\r\n<li>Zürich, Graphische Sammlung der ETH</li>\r\n<li>Zürich, Grapische Sammlung und Fotoarchiv der Zentralbibliothek</li>\r\n</ul><br>\r\n\r\nDas Graphikportal wird vom Deutschen Dokumentationszentrum für Kunstgeschichte – Bildarchiv Foto Marburg betrieben, einer Einrichtung der Philipps-Universität Marburg."
