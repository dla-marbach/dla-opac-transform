noteContent_mv: "Das Angebot erschließt das Werk des österreichischen Autors Peter Handke. Bestände aus öffentlichen Archiven und privaten Sammlungen werden verzeichnet, aufeinander bezogen und inhaltlich beschrieben. Auf der Seite ist zudem eine kleine Auswahl von Texten und Notizbüchern des Autors vollständig online zugänglich (\"Gesamtfaksimiles\").\r\n<br>\r\n<br>\r\nDie beigefügte Bibliografie erfasst im ersten Teil alle Bücher und Einzeltexte Peter Handkes sowie die von ihm selbst übersetzten Bücher, seine publizierten Briefe, Interview-Bände und (in Auswahl) auch einzeln abgedruckte Interviews. Es werden zudem alle Theater-, Film- und Hörspieluraufführungen samt dem Eintrag ihrer Produktionsdaten verzeichnet. Der zweite Abschnitt versammelt die umfangreiche Forschungsliteratur zu Peter Handke. \"Nichtwissenschaftliche\" Beiträge (Rezensionen, Theaterkritiken, Reportagen, Fotobände etc.) wurden nicht aufgenommen.\r\n<br>\r\n<br>\r\nEine Reihe von Forschungsberichten, Tagungsvorträgen, akademisch begutachteten Arbeiten etc. der internationalen Handke-Forschung stehen im Bereich \"Forschungsbeiträge\" im Volltext zur Verfügung."
