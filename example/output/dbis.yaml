noteContent_mv: "Eine Million Zeitungsartikel und kleine Druckschriften (Theaterprogramme, Buchumschläge, Verlagsprospekte, Ankündigungen etc.) seit den 1960er Jahren, davon 800.000 in Papierform, und historische Sondersammlungen (die zum Teil bis 1800 zurückreichen).\r\n\r\nSeit 1997 werden die Zeitungsausschnitte digitalisiert und sind vor Ort zu benützen - die bibliografischen Angaben sind jedoch online abrufbar.\r\n\r\n\r\nAusgewertet werden Tages-, Wochen- und Monatszeitungen bzw. -zeitschriften des gesamten deutschen Sprachraums zu folgenden Sachgebieten:\r\n<ul>\r\n<li>Österreichische Autorinnen und Autoren: Buchbesprechungen, Rezensionen von Theateraufführungen, Interviews, Porträts etc.\r\n In gleicher Weise werden die Sachgebiete Drehbuch (Autorenfilm), Kabarett und literarische Übersetzer dokumentiert</li>\r\n<li>Literatur- und Kulturbetrieb</li>\r\n<li>Kulturpolitik</li>\r\n<li>Literatur-, Sprachwissenschaft und angrenzende Bereiche</li>\r\n</ul>"
