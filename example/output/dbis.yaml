filterType_mv: Daten
noteContent_mv: "In ca. 150 Stichworten wird die historische Semantik in Deutschland untersucht, die im 20. Jahrhundert gekennzeichnet ist durch Ungleichzeitigkeiten, beschleunigten Verschleiß, begriffliche Innovationen und Bezeichnungsrevolutionen. Als ein interdisziplinäres Forschungsunternehmen schreibt das Lexikon dabei nicht lediglich gesichertes Wissen fest, sondern dient der Grundlagenforschung der Geistes-, Kultur-, Sozial- und historischen Wissenschaften. Untersucht werden Austauschprozesse zwischen wissenschaftlicher, politischer, literar-ästhetischer und alltäglicher Sprache, also die ganze Vielfalt der Generierung, Zirkulation und Bedeutungsveränderung von Begriffen. Dabei werden hermeneutische Verfahren mit digitalen Methoden kombiniert, die es erlauben, sehr große Textkorpora einzubeziehen und gezielt für begriffsgeschichtliche Zwecke auszuwerten. \nDie Artikel erscheinen sukzessive open access in der e-library des Schwabe Verlages und zum Abschluss des Projektes in fünf gedruckten Bänden. Das Lexikon wird  federführend am Berliner Leibniz-Zentrum für Literatur- und Kulturforschung in Kooperation mit dem Leibniz-Institut für Deutsche Sprache Mannheim und dem Leibniz-Zentrum für Zeithistorische Forschung Potsdam erarbeitet."
