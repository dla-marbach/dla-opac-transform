noteContent_mv: Volltextausgabe der Werke Friedrich Schillers auf der Grundlage der 10-bändigen, kommentierten Berliner Ausgabe (Berlin, 1980-2005). Der umfangreiche und detaillierte Anmerkungsteil liefert Informationen über die Entstehungs-, Überlieferungs- und Wirkungsgeschichte sowie über die Textgestaltung der einzelnen Werke. Ferner enthalten sind zahlreiche, zum Textverständnis notwendige Erklärungen sowie die Übersetzung aller fremdsprachigen Textteile. Der Anmerkungsapparat wird durch ein kommentiertes Personen- und Werkregister ergänzt. Der Anmerkungsteil kann parallel zum Haupttext angezeigt werden. Mit vielen komfortablen Such- und Textverarbeitungsfunktionen.
