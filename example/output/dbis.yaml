noteContent_mv: "Die Datenbank ist ein Ergebnis der Masterarbeit von Dennis Friedl: Der Bibliothekskatalog der Paderborner Kapuziner 1761: Eine digitale Quellenedition (Paderborn, 2022).\r\n<p>\r\nZitat Friedl: Die Datenbank setzt sich in erster Linie aus modellierten Daten zusammen, die durch die Auszeichnung von Entitäten (Personen, Orte, Organisationen und Werke) aus dem Katalog selbst extrahiert werden konnten. Wenn möglich, wurden diese Entitäten anschließend identifiziert und mit externen Datenbanken (etwa die GND oder Wikidata) verknüpft. Durch die Verknüpfung war es möglich, automatisiert bereits vorhandene Metadaten in die eigene Edition zu importieren und so die Datenbank mit Wissen zu erweitern, das aus dem Katalog allein nicht hervorgeht. Die Datenbank kann durch mehrere Suchfelder durchsucht und die Ergebnisse können mit Filtereinstellungen angepasst werden.\r\n<p>\r\nDie Datenbank ist damit dem Bereich Digital Humanities zuzuordnen. Die zugrunde liegenden Forschungsdaten stehen bei <a href=https://github.com/DennisFriedl/paderborner-kapuziner-1761> GitHub</a> zur Nachnutzung bereit."
