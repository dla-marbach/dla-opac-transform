noteContent_mv: Die digitale Version der beiden bisher erschienenen gedruckten Bände (Alphabetstrecke A-O) des Mittelelbischen Wörterbuchs des Berliner Akademie Verlages. Die Aufgabe des Mittelelbischen Wörterbuchs (MeWb) ist es, den Mundartwortschatz (den Wortschatz des Alltags) des nördlichen (niederdeutschen) und mittleren (mitteldeutschen) Teiles Sachsen-Anhalts in Hinblick auf seine Bedeutung, Lautung und sprachgeografische Verteilung sowie unter Beachtung der soziologischen Struktur und stilistischen Schichtung zu dokumentieren. Beispielsätze, Redensarten und Sprichwörter sollen nicht nur den Gebrauch des mundartlichen Wortgutes im Satzzusammenhang verdeutlichen, sondern gleichzeitig auch in Lebenswelt und Denkweise der Mundartsprecher einführen.
