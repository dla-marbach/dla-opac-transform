id: DBIS101140
display: VDLied - Das Verzeichnis der deutschsprachigen Liedflugschriften digital
category: Digitale Nachschlagewerke
categoryMedium_mv: Online-Ressource
categoryPublication_mv: Fachbibliographie, Volltextdatenbank
dateCataloged: "2016-03-09"
dateModified: "2025-01-13"
displayAddition1: Fachbibliographie, Volltextdatenbank
filterDigital: "True"
filterMedium_mv: Datenbank
filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Das Verzeichnis der deutschsprachigen Liedflugschriften digital (VDLied) ergänzt die jahrhundertbezogenen nationalbibliographischen Verzeichnisse VD 16, VD 17 und VD 18 als medienspezifisches, jahrhundertübergreifendes Verzeichnis. In der Datenbank VDLied werden nur vollständig digitalisierte Drucke nachgewiesen. <br><br>\r\nVDLied erfasst sowohl die als Ephemera oft nur in wenigen Exemplaren erhaltenen populären Kleindrucke der Flugschriften als auch die in diesen Drucken enthaltenen Lieder (meist zwei oder mehr). Die Erschließung der Lieder umfasst neben dem Liedanfang auch Refrain und Melodienverweis sowie Strophen- und Zeilenzahl. <br><br>\r\nVon 2012 bis 2016 wurde das Projekt von der Deutschen Forschungsgemeinschaft (DFG) gefördert. In der Förderphase wurden die herausragenden Liedflugschriftensammlungen der Staatsbibliothek zu Berlin – Preußischer Kulturbesitz und des Zentrums für Populäre Kultur und Musik (Albert-Ludwigs-Universität Freiburg) mit den enthaltenen Liedern erfasst, die Drucke digitalisiert und die Daten in dem von der Verbundzentrale des GBV eingerichteten Portal VDLied zusammengeführt. Beteiligt ist außerdem das  Archiv des Österreichischen Volksliedwerkes Wien, das die Daten der dort bereits erschlossenen und digitalisierten Liedflugschriften dem Projekt zur Verfügung stellt.<br><br>\r\nVDLied weist derzeit ca. 30.000 Lieder aus ca. 14.000 digitalisierten Flugschriften bzw. Flugblättern nach. (Stand: April 2016)"
schemaVersion: 0.16.0
source: AK
