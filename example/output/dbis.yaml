noteContent_mv: "filmportal.de ist nicht allein ein Lexikon; ausgehend von aktuellen deutschen Produktionen lädt es auch ein zum themen- oder motivorientierten Flanieren durch die deutsche Filmgeschichte. Seine Themenwelten lenken den Blick auf entscheidende Aspekte der deutschen Filmgeschichte, ihre Entwicklung, ihre Brüche; auf die großen Erfolge wie die zu Unrecht vergessenen Titel; auf die Menschen vor und hinter der Kamera.<br>\r\nDie Titel- und Personeneinträge in der Datenbank sind über die Funktion Literatur mit der Suche im <a href= http://rzblx10.uni-regensburg.de/dbinfo/detail.php?bib_id=alle&colors=&ocolors=&lett=fs&tid=0&titel_id=930>KVK – Karlsruher Virtuellen Katalog</a> verknüpft. Damit enthält die Datenbank des Filmportals zum jeweiligen Personen- und Titeleintrag eine dynamische Literatur- und Videoliste, die mit dem Bestand der angeschlossenen Bibliotheken und Medienzentren wächst.<br>\r\nDer Schwerpunkt des Portals liegt auf dem deutschen Kinofilm."
