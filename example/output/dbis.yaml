noteContent_mv: |-
  ANNO ist der digitale Zeitungs- und Zeitschriftenlesesaal der Österreichischen Nationalbibliothek. Hier kann in historischen Zeitungen und Zeitschriften online geblättert, gelesen und bereits gesucht werden. <br />
  ANNO deckt den Zeitraum von 1568-1955 ab. Die integrierte Volltextsuche die Jahre 1689-1955 (Stand: Jänner 2026). <br />Der Einstieg ist über die Suche, über eine alphabetische Liste der Zeitungen und Zeitschriften, über eine Kalenderansicht/Jahresübersicht sowie über das Thema der Zeitung möglich. <br />
  Es können einzelne Seiten oder gesamte Ausgaben von einem bestimmten Tag gelesen, als PDF heruntergeladen und ausgedruckt werden.<br />
  Zu den digitalisierten Zeitungstiteln gehören zum Beispiel die Wiener Zeitung von 1703-1955, die Arbeiter Zeitung, der Pester Lloyd, das Prager Tagblatt, die Reichspost, die Neue Freie Presse und Die Presse.<br />
  Übersicht der mehr als 1.000 gescannten Zeitungen und Zeitschriften: <a href="https://anno.onb.ac.at/alph_list.htm">https://anno.onb.ac.at/alph_list.htm</a><br /><br />

  Den <b>thematischen Einstieg</b> finden Sie unter <a href="https://anno.onb.ac.at/them_einstieg.htm">https://anno.onb.ac.at/them_einstieg.htm</a>
