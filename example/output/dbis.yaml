noteContent_mv: "Daten zu Personen, welche einen Bezug zu Beständen und Sammlungsaufträgen der Sächsischen Landesbibliothek - Staat- und- Universitätsbibliothek (SLUB) haben.<br /><br />\n\nInnerhalb des SLUB-Personen-Wiki gibt es 2 Bereiche: \n<ul><li><a href=\"https://web.archive.org/web/20160730065941/http://personen-wiki.slub-dresden.de/index.php/Kategorie:SAXB\">Personen mit Bezug zu Sachsen</a>\n<br />eine ergänzende Dokumentation zur <a href=\"https://swb.bsz-bw.de/DB=2.304/?COOKIE=Us998,Pbszgast,I2017,B20728+,SY,NRecherche-DB,D2.304,E8a52f503-0,A,H,R132.187.247.23,FY\">Sächsischen Bibliographie</a>, die an der SLUB erarbeitet wird.</li>\n<li><a href=\"https://web.archive.org/web/20160824093647/http://personen-wiki.slub-dresden.de:80/index.php/Kategorie:BGTS\">Personen mit Bezug zur Geschichte der Technik</a>\n<br />Biogramme zu Personen, die im Zusammenhang mit der im Fachkatalog Technikgeschichte verzeichneten Literatur stehen.</li>\n</ul>"
noteRequirements_mv:
