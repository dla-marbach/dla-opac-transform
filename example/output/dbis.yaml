noteContent_mv: "Kostenlos verfügbar sind 28 zweisprachige Wörterbücher (mit Ausgangssprache Deutsch) und ein Fremdwörterbuch - die Online Wörterbücher von Langenscheidt entsprechen der Druckausgabe und bieten zusätzlich vertonte Stichwörter zum Anhören, mehr Beispielsätze, Links zu Synomen. \n<br />Enthalten sind:\n<ul>\n<li>Deutsch – Arabisch / Arabisch – Deutsch</li>\n<li>Deutsch - Bulgarisch / Bulgarisch - Deutsch</li>\n<li>Deutsch - Chinesisch / Chinesisch- Deutsch</li>\n<li>Deutsch – Dänisch / Dänisch – Deutsch</li>\n<li>Deutsch – Englisch / Englisch – Deutsch</li>\n<li>Deutsch - Finnisch / Finnisch - Deutsch</li>\n<li>Deutsch – Französisch / Französisch – Deutsch</li>\n<li>Deutsch – Griechisch / Griechisch – Deutsch</li>\n<li>Deutsch - Isländisch / Isländisch - Deutsch</li>\n<li>Deutsch – Italienisch / Italienisch – Deutsch</li>\n<li>Deutsch - Japanisch / Japanisch- Deutsch</li>\n<li>Deutsch - Kroatisch / Kroatisch- Deutsch</li>\n<li>Deutsch - Latein / Latein- Deutsch</li>\n<li>Deutsch – Niederländisch / Niederländisch – Deutsch</li>\n<li>Deutsch - Norwegisch / Norwegisch- Deutsch</li>\n<li>Deutsch - Persisch / Persisch- Deutsch</li>\n<li>Deutsch - Polnisch / Polnisch- Deutsch</li>\n<li>Deutsch - Portugiesisch / Portugiesisch - Deutsch</li>\n<li>Deutsch - Rumänisch / Rumänisch - Deutsch</li>\n<li>Deutsch – Russisch / Russisch – Deutsch</li>\n<li>Deutsch – Schwedisch / Schwedisch – Deutsch</li>\n<li>Deutsch - Serbisch / Serbisch - Deutsch</li>\n<li>Deutsch - Slowakisch / Slowakisch - Deutsch</li>\n<li>Deutsch - Slowenisch / Slowenisch - Deutsch</li>\n<li>Deutsch – Spanisch / Spanisch – Deutsch</li>\n<li>Deutsch – Tschechisch / Tschechisch – Deutsch</li>\n<li>Deutsch – Türkisch / Türkisch – Deutsch</li>\n<li>Deutsch – Ungarisch / Ungarisch  – Deutsch</li>\n<li><a href=\"https://dbis.ur.de/All/resources/6775\">Fremdwörterbuch </a> </li>\n</ul>"
