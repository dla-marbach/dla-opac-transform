noteContent_mv: "Die hier zur Verfügung gestellte Datenbank ist ein Projekt des IFB, mit dem Ziel eine umfassende deutschsprachige Onlinedatenbank für das Bibliographieren und Zitieren zahlreicher Primär-, Sekundär- und Tertiärquellen zu schaffen.<br>\r\n\r\nDie Basis bildet der Harvard Citation Style mit entsprechenden Kurzbelegen im Text und dem Prinzip Autor-Jahr in der Bibliographie. Die Vorschläge für die Bibliographie können allerdings auch in anderen Zitationsstilen, wie zum Beispiel der deutschen Zitation, dem Oxford Referencing Style, den Chicago Manual Style, APA  oder MLA Style Anwendung finden.<br>\r\n\r\nBiblioZit-Online richtet sich an Wissenschaftlerinnen und Wissenschaftler aller Disziplinen, aber auch fachübergreifend an Studierende, welche Hilfe für ein gutes, transparentes Quellenverzeichnis suchen. Der hier angewandte Stil soll in erster Linie als Leitfaden und Hilfestellung dienen und versteht sich daher ausdrücklich als Empfehlung. BiblioZit-Online erklärt vielmehr in welchen Situationen, welche Informationen in der Quellenangabe sinnvoll und notwendig sind."
