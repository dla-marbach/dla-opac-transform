display: Germersheimer Übersetzerlexikon
category: Digitale Nachschlagewerke
categoryMedium_mv: Online-Ressource
categoryPublication_mv: Wörterbuch, Enzyklopädie, Nachschlagwerk
country_mv:
  - Deutschland
