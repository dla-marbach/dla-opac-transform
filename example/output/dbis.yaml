noteContent_mv: |-
  Der Verlag Octavo hat seit 1996 viele wichtige und seltene Bücher aus Bibliotheken weltweit digitalisiert.
  In dieser kostenfreien Datenbank bietet er über 400 Titel in mittlerer Auflösung an, darunter Werke von Galileo, Newton, Copernicus, Kepler, Einstein und Darwin.<br />
  Außerdem sind die meisten von Shakespeares Quartos aus der  British Library, der Bodleian Library, der University of Edinburgh Library und der National Library of Scotland enthalten.<br />
  Auch einige Werke der Library of Congress wurden digitalisiert: Poor Richards Almanack von Benjamin Franklin, ein Exemplar der Gutenberg Bible von 1455, Thomas Harveys Buch über die Zirkulation des Blutes, Galileos Sidereus Nuncius sowie die ersten Drucke der United States Bill of Rights und der Magna Carta.<br />
  Manche dieser E-Books können in sehr hoher Auflösung auch auf CD-ROM erworben werden. (E-Book-Sammlung)
