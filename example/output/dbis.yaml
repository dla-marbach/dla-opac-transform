noteContent_mv: 'Das Lehnwortportal Deutsch des Instituts für Deutsche Sprache stellt Wörterbücher zu Entlehnungen aus dem Deutschen in andere Sprachen zur Verfügung. Diese Wörterbücher können als Einzelwerke konsultiert werden; die Datenbasis des Portals ist jedoch um Vernetzungen zwischen den Wörterbüchern angereichert, so dass sämtliche lexikographischen Informationen als komplexes, wörterbuchübergreifendes Netzwerk von Lehn- und Herkunftswörtern repräsentiert sind. Das Portal ist insbesondere als „umgekehrtes Lehnwörterbuch“ nutzbar: Im Wörterbuch der Herkunftswörter kann ausgehend von deutschen Wörtern in allen Wörterbüchern nach zugehörigen Lehnwörtern in anderen Sprachen gesucht werden. Für Experten bietet das Portal komplexe Suchfunktionen an, um Lehn- oder Herkunftswörter beispielsweise auch anhand von grammatischen Merkmalen oder zeitlich-dialektaler Zuordnung zu finden. Es sind derzeit drei Wörterbücher zu deutschen Lehnwörtern in verschiedenen slavischen Sprachen in das Portal integriert; das Portal wird beständig weiter ausgebaut.'
