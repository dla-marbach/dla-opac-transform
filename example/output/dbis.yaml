noteContent_mv: "Kirsten Boie ist eine der bekanntesten und erfolgreichsten Autorinnen deutschsprachiger Kinder- und Jugendliteratur. Seit 1985 schreibt sie Bilderbuch-Texte, Erstlese-Bücher, ernste und heitere Kindergeschichten, sozialkritische Studien für Jugendliche, Fantasy, historische Romane und sozialkritische Politthriller. \r\n<p>\r\nDas Werk von Kirsten Boie ist in zwei kombinierten Datenbanken des gratis zugänglichen freien Literaturverwaltungsprogramms ZOTERO erstmals vollständig aufgenommen und mit Schlagworten inhaltlich erschlossen worden.\r\n<p>\r\nDer Teil „Kirsten Boie. Primärliteratur und Medien“ umfasst die Datensätze aller Texte von Kirsten Boie einschließlich der Medienadaptionen, dazu auch ihre Beiträge zur Vermittlung und Theorie der Kinder- und Jugendliteratur.\r\n<p>\r\nDer Teil „Kirsten Boie. Fachliteratur“ verzeichnet und erschließt Rezensionen, Würdigungen, Beiträge in Fachpresse und wissenschaftlichen Hochschulschriften, Monographien und Sammelbänden. Besonders berücksichtigt wurden Unterrichtsmodelle."
schemaVersion: 0.16.0
source: AK
