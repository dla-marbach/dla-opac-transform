noteContent_mv: "Das KLG ist das anerkannte Standardwerk zur zeitgenössischen deutschsprachigen Literatur seit 1945. Das Lexikon beschreibt umfassend aktuelle literarische Entwicklungen und nimmt sich dabei auch junger Schriftstellerinnen und Schriftsteller an. \n<br />Das KLG enthält mehr als 880 Artikel über Leben und Werk herausragender deutschsprachiger Autorinnen und Autoren - das entspricht mehr als 14.000 Druckseiten. Biographie, Werk und Wirkung werden jeweils ausführlich vorgestellt, ergänzt durch umfangreiche Werkverzeichnisse und Sekundärbibliographien. \n<br />Das KLG wird laufend aktualisiert und erweitert. <br />Herausgegeben von Heinz Ludwig Arnold."
