noteContent_mv: "Bibliographie der deutschen Almanache und Taschenbücher, die neben der Erfassung der Reihen und ihrer Jahrgänge die Inhalte selbst erkennbar macht. In der Regel sollen folgende Merkmale erfasst werden und im Suchverfahren abrufbar sein:\r\n<ul>\r\n<li>Reihen- und Einzeltitel des Druckwerks sowie Strukturdarstellung des autopsierten Einzelbandes.</li>\r\n<li>Namen der Herausgeber und Verfasser, gegebenfalls zusätzlich Schreibvarianten oder Pseudonyme.</li>\r\n<li>Literarische Beiträge mit Titel und Incipit.</li>\r\n<li>Nichtliterarische Beiträge (Illustrationen, Musikbeilagen und andere Zutaten) werden als Vollbild gegeben.</li>\r\n</ul>\r\nErfasst werden in erster Linie die literarischen Taschenbücher, die von 1770 bis etwa 1870 erschienen sind. Das Projekt wird von der Theodor-Springmann-Stiftung betrieben und wird kontinuierlich weitergeführt."
