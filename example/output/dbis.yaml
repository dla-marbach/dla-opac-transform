noteContent_mv: |-
  Die Online-Datenbank Dataspace verzeichnet den Bestand von Infoläden und alternativen Archiven. Erfasst werden Bücher, Zeitschriften, Plakate, Filme, CDs, Aufsätze, Artikel usw.
  Es findet eine verschlagwortete Titelaufnahme statt.
  Bei den meisten Zeitschriften, die wir (Infoladen Leipzig) im Abo beziehen, erfassen wir auch die einzelnen Aufsätze (das gleiche gilt für Aufsätze in Sammelbänden).

  Bei den Zeitschriftenaufsätzen liegt das Hauptaugenmerk auf:
  * Zeitschriften von bundesweiter Bedeutung
  * Zeitschriften mit allgemeiner inhaltlicher Ausrichtung
  * Zeitschriften, die nicht über das Internet, ein Jahresregister oder per CD-Rom erfaßt und damit leicht durchsuchbar sind.

  Die Erfassung in der Datenbank erfolgt seit 1995, von einigen Zeitschriften wurden aber auch ältere Jahrgänge (ab 70er Jahre) erfasst.
