filterSource: Digitale Nachschlagewerke
filterType_mv: Daten
noteContent_mv: "Ziel des Projekts Dehmel digital ist die sukzessive wissenschaftliche Erschließung, Zugänglichmachung und Beforschung des umfangreichen Korrespondenznetzes von Ida und Richard Dehmel. In Kooperation mit der Staats- und Universitätsbibliothek Hamburg (SUB) werden die ca. 35.000 handschriftlichen Originalbriefe an das Ehepaar Dehmel sowie die archivierten Antworten der Dehmels, die sich im Dehmel-Archiv der SUB befinden, mit Hilfe computationeller Verfahren teilautomatisiert transkribiert und inhaltlich erschlossen. Die digitale Repräsentation soll verschiedene Lektüremodi und Nutzungsszenarien unterstützen. Das Portal bietet einen Überblick über das Korrespondenznetz, verschiedene Einstiegsmöglichkeiten über grafische Visualisierungen, spannende Zitate, Register und facettierte Suchen, die auch strukturierten und/oder spontanen Detaillektüren dienen. Die umfängliche Bereitstellung der im Projekt erzeugten Daten kann als Ausgangspunkt für computergestützte Anschlussforschungen dienen.\r\n\r\nDehmel digital erweckt das internationale Netzwerk bedeutender Künstler:innen, Kulturbetriebler:innen und Intellektueller um das Hamburger Künstlerehepaar Dehmel im virtuellen Raum zu neuem Leben. Das Projekt hat eine Anschubförderung durch die Fakultät für Geisteswissenschaften der Universität Hamburg erhalten und wird seit 2020 durch die Hermann Reemtsma Stiftung gefördert."
