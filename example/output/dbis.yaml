noteContent_mv: "Das Projekt CAB (Corpus Avesticum Berolinense), das am Institut für Iranistik der Freien Universität Berlin durchgeführt wird, stellt den ersten Versuch dar, das gesamte avestische zoroastrische Textkorpus in seinem rituellen Kontext zu bearbeiten. <br />\nDie editorischen Prinzipien, die bei dieser Neuausgabe der avestischen Ritualtexte zur Anwendung kommen, gründen auf den Vorarbeiten des Handschriftenarchivs „Avestan Digital Archive“ (ADA) sowie auf einer Revision der Rekonstruktion des Überlieferungsprozesses des Avesta. <br />\nZiel ist es, den Nutzer:innen einen vollständigen Überblick über den gesamten Editionsprozess zu bieten - von den Handschriften bis zur kritischen und kommentierten Edition. <br />\nVerschiedene Werkzeuge stehen den Nutzer:innen diesbezüglich zur Verfügung: \n<ul>\n       <li>eine Datenbank mit allen Handschriften, die zoroastrische Rituale in der avestischen Sprache enthalten,</li>\n       <li>ein Ceremony-Generator, mit dem die Nutzer:innen jeden gewünschten zoroastrischen Ritualtext in Avestisch mit den dazugehörigen Ritualanweisungen in Pahlavi generieren und die kontextuellen Parameter (Datum und Tageszeit, Gottheit, an die die Zeremonie adressiert ist) auswählen können,</li>\n       <li>ein Stanza-Analyser für jedes Textstück, mit kritischen rituellen und metarituellen Kommentaren,</li>\n       <li>sowie einen textkritischen Apparatus, der mit dem Tool des Partnerprojekts „Textual Communities“ erstellt wurde.</li>\n</ul>\nDarüber hinaus bietet die Website des Projekts vollständige oder partielle Transliterationen von etwa 60 Handschriften, eine Verknüpfung mit den Bildern im „Avestan Digital Archive“ und einen Zugang zu einer digitalen Version von Bartholomaes „Altiranisches Wörterbuch“."
