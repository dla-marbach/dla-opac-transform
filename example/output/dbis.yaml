noteContent_mv: |-
  Das Archivportal, ein Teilprojekt der Deutschen Digitalen Bibliothek, ermöglicht eine deutschlandweit archivübergreifende Recherche in allen Findmitteln der teilnehmenden Archiveinrichtungen. Archivische Erschließungsleistungen sowie digitalisiertes und digitales Archivgut werden - soweit vorhanden - für die Nutzung bereitgestellt.<br />
  Neben der Auswahlmöglichkeit nach Bundesland und Anfangsbuchstabe bietet das Archivportal auch einen spartenspezifischen Zugang zu den Daten der Deutschen Digitalen Bibliothek. Folgende Sparten stehen dabei zur Verfügung: Staatliche Archive; Kommunale Archive; Kirchliche Archive; Herrschafts- und Familienarchive; Wirtschaftsarchive; Archive der Parlamente, politischen Parteien, Stiftungen und Verbände; Medienarchive; Archive der Hochschulen sowie wissenschaftlichen Institutionen; Sonstige Archive.<br />
  Das inhaltliche Angebot wird durch die Gewinnung neuer Datenlieferanten sukzessive ausgebaut.
