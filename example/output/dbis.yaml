noteContent_mv: "Das Digitalisierungsprojekt präsentiert den Zeitraum 1945,21. Mai - 1993,31.Dez. (zzt. bis 1990,31.Dez. verfügbar). Die Datenbank mit Originaldigitalisaten bietet eine Volltextsuche sowie eine Kalenderblattfunktion. Sie ist Teil des Portals DDR-Presse und befindet sich noch im Aufbau. \n\nDie bereits am 21. Mai 1945 erstmals erschienene Berliner Zeitung nahm eine besondere Rolle in der Presselandschaft der DDR ein. Sie ist heute die älteste ohne Unterbrechung erscheinende Tageszeitung Berlins. Als regionale Zeitung für Berlin konnte die „Berliner Zeitung“ trotz ihrer Nähe zur  SED  stets ein eigenes Profil behaupten, so trat der Berliner Verlag als Herausgeber auf.  Die Berichterstattung war häufig offener und auch kritischer als beim Neuen Deutschland. Der historische Bestand umfasst von Mai 1945 bis Oktober 1990 ca. 168.000 einzelne Zeitungsseiten."
noteRequirements_mv:
