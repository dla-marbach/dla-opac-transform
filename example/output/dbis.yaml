noteContent_mv: "Das Digitale Lexikon Fremdsprachendidaktik versammelt und erklärt wichtige Fachbegriffe der Fremdsprachendidaktik und ihrer Bezugsdisziplinen. Es ist frei zugänglich, eine Registrierung ist nicht vorgesehen. Das Lexikon fungiert auch als Glossar für die Buchreihe Kompendium Deutsch als Fremdsprache/Deutsch als Zweitsprache, das im Gunter Narr Verlag in Tübingen erschienen ist, und für die online-Module der Studiengänge und Weiterbildungsangebote des Instituts für Deutsch als Fremdsprache der LMU und der Multilingua Akademie. Es handelt sich um ein dynamisches Lexikon, das ständig erweitert und aktualisiert wird. \nNutzer haben die Möglichkeit, der Redaktion über eine Kommentarfunktion Erweiterungen zu melden."
