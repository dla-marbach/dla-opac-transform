noteContent_mv: "Das BAS speichert komplette Sammlungen von Aufnahmen gesprochener Sprache als Video- oder Sounddateien, zusammen mit linguistischen Annotationen (minimal eine Schriftform des Gesprochenen). Die meisten dieser Sprachkorpora entstanden in wissenschaftlichen Untersuchungen zu gesprochener Sprache, z.B. Sprache unter Alkoholeinfluss, Sprache von Cochlear-Implantierten, Interaktion zwischen Mensch und Maschine, Diktiersprache, Konversationssprache, Vorlesesprache, Sprache von Kindern, Sprache über Telefonkanal etc.\r\nSprachsignale und Annotationen können mit Hilfe einer Suchmaske zu individuellen Datenpaketen zusammengefasst und dann als Paket heruntergeladen werden. Oder es können einzelne Aufnahmen bis hin zu kompletten Sammlungen heruntergeladen werden. Alle Daten sind online abhörbar bzw. lesbar."
