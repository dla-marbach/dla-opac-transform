noteContent_mv: Der Südwestdeutsche Sprachatlas (SSA) wurde in den Jahren 1974-2013 am Deutschen Seminar der Universität Freiburg erarbeitet. Seine Aufgabe ist es, die Mundarten im Südwesten Deutschlands zu erkunden und darzustellen. Zu diesem Zweck wurden in einem Gebiet zwischen Karlsruhe - Ulm - Lindau - Lörrach in ca. 600 Orten Sprachaufnahmen durchgeführt. MitarbeiterInnen des Projekts (ExploratorIn) besuchten pro Ort 1-3 Gewährspersonen, die kompetent über ihre Mundart Auskunft geben konnten. Je Ort wurden ca. 2000 Fragen aus einem Fragebuch gestellt. Die Antworten wurden in einer speziellen Lautschrift notiert. Sie bildeten die Grundlage für die Sprachkarten.
