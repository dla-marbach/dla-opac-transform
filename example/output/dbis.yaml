filterType_mv: Daten
noteContent_mv: |-
  Gefördert mit Mitteln der Landesarchivdirektion Baden-Württemberg wurden die Jahre 1848 bis 1944 der satirischen Wochenzeitung Kladderadatsch an der Universitätsbibliothek Heidelberg digitalisiert und sind über eine Browserfunktion suchbar.

  Der Kladderadatsch das einzige Berliner politische Witzblatt, das nicht nur die Revolutionszeit 1848/1849 überlebte, sondern - nachdem es ins liberal-konservative Lager übergegangen war - länger als neun Jahrzehnte bestand.
  Die Redakteure verstanden es, der Sprache ihrer witzig-kritischen Beiträge, ihrer Glossen und Parodien ein so unverwechselbares Lokalkolorit zu geben, daß die Zeitung in der zweiten Hälfte des 19. Jahrhunderts schnell zum Liebling der Berliner wurde.
