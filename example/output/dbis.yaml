noteContent_mv: "Ziel des Projekts ist die Erschließung, Analyse und Digitalisierung der Theatrum-Literatur, eines zentralen Segments der frühneuzeitlichen, abendländischen Wissensliteratur. Hunderte von Titeln, die sich der räumlichen Theatermetapher zur Konstruktion, Modellierung und Kommunikation von Wissen bedienen, erschienen zwischen 1500 und 1800 in lateinischen und volkssprachlichen Ausgaben.\nDas Repertorium erfasst etwa 200 ausgewählte lateinische und volkssprachliche Werke, die die Kriterien von Repräsentativität, Forschungsrelevanz und wissenschaftlicher Nachfrage erfüllen. \nAlle im Repertorium erfassten Theatra werden digitalisiert und mit strukturellen Metadaten erschlossen."
