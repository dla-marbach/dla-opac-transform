noteContent_mv: "Die Webseite ist Teil der gleichnamigen Kampagne „EU versus Disinformation“, die von der East StratCom Task Force des Europäischen Auswärtigen Dienstes (EEAS) durchgeführt wird. Ziel der im März 2015 vom Europäischen Rat initiierten Task Force ist es, laufenden Desinformationskampagnen Russlands (sogenannten „Fake News“) entgegenzuwirken. Zwischen Januar 2015 und September 2017 wurden über 3300 Falschmeldungen in 18 verschiedenen Sprachen identifiziert, die in einer Datenbank („Disinfo Cases“) recherchiert werden können. Daneben wird im „News and Analysis“-Bereich detaillierter auf einzelne Falschmeldungen eingegangen.<br><br> \r\nDie Webseite wird auf Englisch, Russisch und Deutsch angeboten und erfuhr im September 2017 einen Relaunch."
