noteContent_mv: Clipland ist eine seit über 20 Jahren frei im Netz recherchierbare Datenbank für Hintergrundinformationen zu den kurzen Filmformen Musikvideo, Werbespot und Kurzfilm. Sie deckt damit den Bereich ab, der üblicher Weise in anderen Filmdatenbanken nur am Rande recherchierbar ist. Clipland enthält beteiligte Personen (teilweise mit Kurzbiographien und Filmographien bzw. Videographien), Querverweise zu anderen Datenbanken sowie in vielen Fällen einen Link zu einem Video-on-Demand des vorliegenden Werkes. So ist es beispielsweise möglich, den Werdegang einzelner Filmschaffender von den Anfängen im Kurzfilm bis zum Langfilm zu beleuchten.
