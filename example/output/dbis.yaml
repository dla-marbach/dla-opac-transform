noteContent_mv: |-
  <ul>
  <li>Die Anthologie enthält ca. 53.000 Gedichte (weltliche und geistliche Dichtung), d.h. ca. 500 Gedichtsammlungen von 207 Autoren.</li>
  <li>Sie setzt ein mit den ersten neuhochdeutschen Dichtungen und dem frühesten Vertreter der Kirchenlieddichtung, Martin Luther, Anfang des 16. Jh.</li>
  <li>Sie schließt mit Vertretern des Symbolismus wie Rainer Maria Rilke und Hugo von Hofmannsthal.</li>
  <li>Die nachfolgenden und teilweise gleichzeitigen Strömungen des Expressionismus oder Dadaismus werden nur beispielhaft durch einzelne Autoren wie Hugo Ball, Georg Heym oder Ludwig Rubiner beleuchtet.</li>
  </ul>
