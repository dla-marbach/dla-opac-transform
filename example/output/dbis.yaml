noteContent_mv: "Diese CD-ROM »Heinrich Heine: Werke« enthält:\n<ul>\n<li>Gedichte: Buch der Lieder - Neue Gedichte - Romanzero \n- Gedichte. 1853 und 1854 - Nachlese zu den Gedichten</li>\n<li>Versepen: Atta Troll - Deutschland. Ein Wintermärchen</li>\n<li>Dramen: Almansor - William Ratcliff </li>\n<li>Tanzpoeme: Die Göttin Diana - Der Doctor Faust</li>\n<li>Reisebilder und Reisebriefe: Briefe aus Berlin - Über Polen - Reisebilder (Die Harzreise, Die Nordsee, Ideen. Das Buch Le Grand, Die Bäder von Lucca, Englische Fragmente u.a.)</li>\n<li>Erzählende Prosa: Aus den Memoiren des Herren von Schnabelewopski - Florentinische Nächte - Der Rabbi von Bacherach</li>\n<li>Essays über Deutschland: Die romantische Schule - Zur \nGeschichte der Religion und Philosophie in Deutschland - Elementargeister</li>\n<li>Essays über Frankreich: Französische Maler - \nFranzösische Zustände - Über die französische Bühne - Lutetia</li>\n<li>Aufsätze und Streitschriften: Verschiedenartige \nGeschichtsauffassung - Die Götter im Exil - Schriftstellernöten - Ludwig Börne. Eine Denkschrift - Shakespeares Mädchen und Frauen u.a.</li>\n<li>Autobiographische Prosa: Geständnisse - Memoiren - Testament</li>\n</ul>\nEnthält auch die Monographie Heinrich Heine von Christian Liedtke.<br />\n(Digitale Bibliothek ; 7)"
