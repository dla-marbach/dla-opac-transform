noteContent_mv: "Die Datenbank ›Deutschsprachige illustrierte Handschriften des Mittelalters‹ hat das Ziel, alle bis ca. 1520 entstandenen Handschriften zu beschreiben, in denen deutsche Texte gemeinsam mit Bildern überliefert sind. Insgesamt wird sie etwa 2.500 Handschriften erfassen. Sie basiert auf dem gedruckten ›Katalog der deutschsprachigen illustrierten Handschriften des Mittelalters‹ (KdiH), der seit 1991 in Kommission beim Verlag C.H.Beck erscheint (<a href = https://kdih.badw.de/das-projekt.html>zur Projektwebsite</a>). Gegenüber der Print-Version werden hier (in grüner Farbe) Fehler korrigiert und Vereinheitlichungen im Format sowie Verlinkungen vorgenommen.\r\nDerzeit umfasst die Datenbank die Bände 1–7 des KdiH; das Angebot wird laufend erweitert."
