noteContent_mv: |-
  Manuscripta.pl ist ein Portal, das mittelalterliche Handschriften in öffentlichen und privaten polnischen Sammlungen verzeichnet, mit einem zeitlichen Schwerpunkt auf Texten, die bis ca. 1530 entstanden sind. Erfasst sind außerdem erhaltene Fragmente von Handschriften, Polonika – also in ausländischen Sammlungen aufbewahrte polnische Schriftdenkmäler – sowie Informationen über verloren gegangene Manuskripte. 4.790 Titel sind online verfügbar (Stand 2025). Das Portal bietet eine umfangreiche Browsing-Funktion, sodass sich die erfassten Handschriften leicht nach Aufbewahrungsort, Repositorium, Entstehungszeit, Sprache, Material oder der Verfügbarkeit einer digitalen Kopie durchsuchen lassen.
  In das Portal ist außerdem ein Blog integriert, der über Aktuelles aus der Handschriftenforschung in Polen informiert.
