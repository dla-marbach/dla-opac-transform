noteContent_mv: "Das Digitale Wörterbuch (DWDS) ist ein Projekt der Berlin-Brandenburgischen Akademie der Wissenschaften (BBAW). Ziel ist die Schaffung eines „Digitalen Lexikalischen Systems“ - eines umfassenden, jedem Benutzer über das Internet zugänglichen Wortinformationssystems, das Auskunft über den deutschen Wortschatz in Vergangenheit und Gegenwart gibt.\n<br />\nDas gegenwartssprachliche DWDS-Wörterbuch bietet Informationen zu Form und Bedeutung von über 260'000 Wörtern der deutschen Sprache. Das Wörterbuch basiert auf der digitalisierten Fassung des \"Wörterbuchs der deutschen Gegenwartssprache\", welches zwischen 1952 und 1977 veröffentlicht wurde und daher in seinem Stichwortbestand teilweise veraltet ist. Es wird ergänzt durch Teile des \"Großen Wörterbuchs der deutschen Sprache\" (3. Aufl., 1999). Diese Artikel werden durch die Projektgruppe des DWDS und ZDL (Zentrum für digitale Lexikographie der deutschen Sprache) laufend überarbeitet. Zusätzlich werden neue Wörter von der Projektgruppe korpusbasiert ermittelt und lexikografisch beschrieben. Zudem wurde das DWDS-Wörterbuch 2025 um 1'600 Artikel aus WAHRIG Deutsches Wörterbuch erweitert. "
