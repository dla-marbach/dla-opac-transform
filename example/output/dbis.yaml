noteContent_mv: "Die digitale Faustedition bietet eine Wiedergabe und editorische Erschließung der vollständigen Überlieferung von Goethes ‚Faust‘ und seiner 60-jährigen Entstehungsgeschichte nach den Standards historisch-kritischer Ausgaben. Sie besteht aus einem Archiv der Handschriften und der zu Lebzeiten erschienenen textkritisch relevanten Drucke zum ‚Faust‘, einem konstituierten Text des ‚Faust I‘ und des ‚Faust II‘ sowie Visualisierungen zur Genese des Werks.<br><br>\r\nSie ist Teil einer Hybridausgabe. Die Buchpublikation, die den konstituierten Text des ‚Faust‘ und ein Faksimile von 2 H mit Transkription enthält, ist im Oktober 2018 erschienen. Im Dezember 2018 ist eine zweite, durchgesehene Auflage des konstituierten Textes erschienen.<br><br>\r\nDas Projekt wurde von Prof. Dr. Anne Bohnenkamp-Renken (Freies Deutsches Hochstift), Dr. Silke Henke (Goethe- und Schiller-Archiv) und Prof. Dr. Fotis Jannidis (Universität Würzburg) geleitet und von 2009 bis 2015 von der Deutschen Forschungsgemeinschaft gefördert."
