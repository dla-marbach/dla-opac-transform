noteContent_mv: "<b>Archivierte Korpora</b>\r\n<p>Aus urheberrechtlichen Gründen ist leider nur ein Teil der archivierten Korpora öffentlich, die übrigen sind nur IDS-intern zugänglich. Generell dürfen die IDS-Korpora nur zu wissenschaftlichen, nichtkommerziellen Zwecken genutzt werden. Welche\r\nMöglichkeiten Ihnen dafür zur Verfügung stehen, erfahren Sie auf der Seite Hinweise zur Verfügbarkeit.</p>\r\n<b>Archiv öffentlich zugänglicher  Korpora geschriebener Sprache</b>\r\n<ul>\r\n <li>Berliner Morgenpost (bmp / 1997-1999)</li>\r\n <li>Bonner Zeitungskorpus (bzk)</li>\r\n <li>COMPUTER ZEITUNG (cz; deutsch / 1993-1998)</li>\r\n <li>Die Presse (dpr; österreichisch / 1991-2000)</li>\r\n <li>Frankfurter Rundschau (ffr / 1997-1999)</li>\r\n <li>Goethe-Korpus (goe)</li>\r\n <li>Grammatik-Korpus (gr1)</li>\r\n <li>GRIMM-Korpus (gri)</li>\r\n <li>Handbuchkorpora (hbk)\r\n <dl>\r\n   <dd>gesondert nach Jahrgängen: h85, h86, h87, h88</dd>\r\n </dl>\r\n </li>\r\n <li>Kleine Zeitung (klz; österreichisch / 1996-2000)</li>\r\n <li>LIMAS-Korpus (lim / auch morphosyntaktisch\r\n annotiert)</li>\r\n <li>Korpus-Kartei der Gesellschaft für deutsche\r\n Sprache, Wiesbaden (gfds)</li>\r\n <li>Korpus Magazin Lufthansa Bordbuch (mld /\r\n 1995-1997)</li>\r\n <li>Mannheimer Korpora (mk)\r\n <dl>\r\n   <dd>Mannheimer Korpus 1 (mk1), Mannheimer Korpus 2 (mk2)</dd>\r\n </dl>\r\n </li>\r\n <li>Mannheimer Morgen</a> (mmm / 1989, 1991, 1994-2003\r\n / teilweise morphosyntaktisch annotiert) </li>\r\n <li>Marx-Engels-Korpora\r\n <dl>\r\n   <dd>Marx-Engels-Gesamtausgabe - ausgewählte Texte (meg)</dd>\r\n   <dd>Marx-Engels-Werke - ausgewählte Texte (mew)</dd>\r\n   <dd>Herausgeber-Anmerkungstexte zu mew (mwa)</dd>\r\n </dl>\r\n </li>\r\n <li>Neue Kronen-Zeitung (nkz; österreichisch / 1994-2000)</li>\r\n <li>Oberösterreichische Nachrichten (oon / 1996-2000)</li>\r\n <li>Salzburger Nachrichten (sbn / 1991-2000)</li>\r\n <li>St. Galler Tagblatt (sgt; schweizerisch / 1997-2001)</li>\r\n <li>Tiroler Tageszeitung (ttz / 1996-2000)</li>\r\n <li>Vorarlberger Nachrichten (van / 1997-2000)</li>\r\n <li>Wendekorpus (wk)\r\n <dl>\r\n   <dd>Wendekorpus West (wkb; Bundesrepublik Deutschland)</dd>\r\n   <dd>Wendekorpus Ost (wkd; DDR)</dd>\r\n   <dd>Wendekorpus Vereinigung (wkv)</dd>\r\n </dl>\r\n </li>\r\n <li>Züricher Tagesanzeiger (zta / 1996-2000)</li>\r\n</ul>\r\n<b>Nur IDS-intern zugängliche Korpora geschriebener Sprache</b>\r\n<ul>\r\n <li>Belletristik des 20. Jahrhunderts; diverse Schriftsteller (loz-div)</li>\r\n <li>Belletristik des 20. Jahrhunderts; Martin Walser (loz-wam)</li>\r\n <li>Belletristik des 20. Jahrhunderts; Stefan Heym (loz-hes)</li>\r\n <li>Belletristik des 20. Jahrhunderts; Siegfried Lenz (loz-les)</li>\r\n <li>Berliner Zeitung (b97-b03 / 1997 - 2003)</li>\r\n <li>Biografische Literatur (bio) </li>\r\n <li>Der Spiegel (s93, s94 / 1993 - 1994 / auch morphosyntaktisch annotiert)</li>\r\n <li>Die Zeit (z94-z99 / 1994 - 1999)</li>\r\n <li>die tageszeitung (t86-t03 / 1986 - 2003)</li>\r\n <li>Fachsprachen-Korpus 1 (fsp)</li>\r\n <li>Fachsprachen-Korpus 2: Gentechnologie (dkg)</li>\r\n <li>Frankfurter Allgemeine (f93, f95 / 1993 und 1995)</li>\r\n <li>Herausgebertexte zum Korpus bio (bih)</li>\r\n <li>Historisches Korpus 1 (hi1)</li>\r\n <li>Historisches Korpus 2 (hi2)</li>\r\n <li>Interview-Korpus (iko)</li>\r\n <li>Süddeutsche Zeitung<sup>1</sup> (u95-u99 / 1995 - 1999)</li>\r\n <li>Thomas-Mann-Korpus (thm)</li>\r\n</ul>\r\n<p><sup>1</sup> Für diese Korpora gelten besondere Nutzungsauflagen. Zugang nur IDS-intern und nur auf Anfrage.</p>"
