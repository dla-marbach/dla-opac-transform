noteContent_mv: "Das Estnisch-Finnische Wörterbuch enthält 50.000 Stichwörter. \nWortartikel für die häufigsten Wörter werden vorrangig bearbeitet. Besondere Berücksichtigung finden neue Wörter, Ausdrücke, Abkürzungen sowie Ortsnamen und andere Eigennamen. Zusätzlich enthält das Wörterbuch die Möglichkeit, nach estnischen Verben in beiden Infinitiven (ma- und da-Infinitive) sowie nach Äquivalenten und Übersetzungen auch aus der entgegengesetzten Richtung, dem Finnisch-Estnischen Wörterbuch, zu suchen.\n\nZum Zeitpunkt der Veröffentlichung 2019 umfasst das estnisch-finnische Wörterbuch ca. 39.000 Wörter und Phrasen. Noch nicht rezensierte Einträge sind gekennzeichnet. Das Wörterbuch wird fortlaufend ergänzt und bearbeitet. "
