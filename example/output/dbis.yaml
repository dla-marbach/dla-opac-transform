noteContent_mv: "DORES verzeichnet Publikationen, Pressemeldungen, Gerichtsentscheide, Veranstaltungshinweise <ul>\r\n\t<li>zum interdisziplinären Themenbereich Recht und Sprache, das heisst zu den vielfältigen Berührungspunkten und Schnittstellen von Recht und Sprache, Rechts- und Sprachwissenschaft, seien das:\r\n\t\t<ul>\r\n\t\t\t<li>die Gesetzgebung</li>\r\n\t\t\t<li>das Sprachenrecht</li>\r\n\t\t\t<li>Fragen der Auslegung und Anwendung von Recht</li>\r\n\t\t\t<li>rechtlichen Regelungen von Sprache und Kommunikation</li>\r\n\t\t\t<li>die Verständigung im Rechtsbereich</li>\r\n\t\t</ul>\r\n\t</li>\r\n\t<li>zur Sprachsituation (mit Schwerpunkt Schweiz), seien das:\r\n\t\t<ul>\r\n\t\t\t<li>das Sprachenrecht</li>\r\n\t\t\t<li>die Sprach- und Sprachenpolitik</li>\r\n\t\t\t<li>die Sprachentwicklung</li>\r\n\t\t\t<li>Sprachkritik, Sprachpflege</li>\r\n\t\t</ul>\r\n\t</li>\r\n</ul>\r\nDerzeit werden mehr als 800 bibliographische Einträge angeboten."
