noteContent_mv: "Die Datenbank \"Personenlexika von Baader und Lipowsky\" verzeichnet Biographien bedeutender bayerischer Künstler, Musiker und Schriftsteller. Folgende zu Beginn des 19.  Jahrhunderts erschienen Lexika wurden vollständig gescannt und können so gemeinsam oder einzeln durchsucht werden:\r\n<ul><li>Felix Joseph Lipowsky: Baierisches Künstlerlexikon. München, 1810</<li>\r\n<li>Felix Joseph Lipowsky: Baierisches Musik-Lexikon. München, 1811</li>\r\n<li>Clemens Alois Baader: Das gelehrte Baiern oder Lexikon aller Schriftsteller, welche Baiern im achtzehnten Jahrhunderte erzeugte oder ernährte. Erster Band. A-K.. Nürnberg und Sulzbach, 1804</li>\r\n<li> Clemens Alois Baader: Lexikon verstorbener Baierischer Schrifteller des achtzehenten und neunzehenten Jahrhunderts. Augsburg und Leipzig, 1824-1825</li></ul>\r\nNeben einer Schnellsuche gibt es für eine möglichst gezielte Suche auch die Optionen \"erweiterte Suche\" und \"verknüpfte Suche\". Darüber hinaus stehen Indices zu Personen, Orten und Tätigkeiten zur Verfügung. Jeder Personeneintrag wurde mit einer individualisierten ID aus der Gemeinsamen Normdatei (GND) versehen. Darüber hinaus verfügen die Einträge über Informationen zu Name und Geschlecht, Lebensdaten, Orten (Geburt, Tod, Wirkung), Tätigkeiten und Berufen, Beziehungen zu anderen Personen (Mutter, Lehrmeister etc.) und Organisationen."
