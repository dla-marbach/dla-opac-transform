# Bündelung aller Urheber in einem Feld
# aus personBy, corporationBy, corporationByConference und corporationByTerritory
# wenn das zugehörige _creator Feld "creator" beinhaltet
# Vorgehen:
# 1. id und role zusammen mit Trennzeichen ␝ in creator_tmp
# 2. daraus Felder _id und _role extrahieren
# 3. aus _id via cross _display bilden
- op: core/column-addition
  engineConfig:
    facets: []
    mode: row-based
  baseColumnName: id
  expression: |
    grel:
    forNonBlank(
      [
        forNonBlank(
          cells['personBy_creator_mv'].value,
          x,
          forEachIndex(
            x.split('␟'),
            i,
            v,
            if(
              v == 'creator',
              forNonBlank(
                cells['personBy_id_mv'].value.split('␟')[i],
                y,
                y + forNonBlank(
                  cells['personBy_role_mv'].value.split('␟')[i],
                  y,
                  '␝' + y,
                  '␝' + '␣'
                ),
                null
              ),
              null
            )
          ).join('␟'),
          null
        ),
        forNonBlank(
          cells['corporationBy_creator_mv'].value,
          x,
          forEachIndex(
            x.split('␟'),
            i,
            v,
            if(
              v == 'creator',
              forNonBlank(
                cells['corporationBy_id_mv'].value.split('␟')[i],
                y,
                y + forNonBlank(
                  cells['personBy_role_mv'].value.split('␟')[i],
                  y,
                  '␝' + y,
                  '␝' + '␣'
                ),
                null
              ),
              null
            )
          ).join('␟'),
          null
        ),
        forNonBlank(
          cells['corporationByConference_creator_mv'].value,
          x,
          forEachIndex(
            x.split('␟'),
            i,
            v,
            if(
              v == 'creator',
              forNonBlank(
                cells['corporationByConference_id_mv'].value.split('␟')[i],
                y,
                y + forNonBlank(
                  cells['personBy_role_mv'].value.split('␟')[i],
                  y,
                  '␝' + y,
                  '␝' + '␣'
                ),
                null
              ),
              null
            )
          ).join('␟'),
          null
        ),
        forNonBlank(
          cells['corporationByTerritory_creator_mv'].value,
          x,
          forEachIndex(
            x.split('␟'),
            i,
            v,
            if(
              v == 'creator',
              forNonBlank(
                cells['corporationByTerritory_id_mv'].value.split('␟')[i],
                y,
                y + forNonBlank(
                  cells['personBy_role_mv'].value.split('␟')[i],
                  y,
                  '␝' + y,
                  '␝' + '␣'
                ),
                null
              ),
              null
            )
          ).join('␟'),
          null
        )
      ].join('␟'),
      z,
      filter(
        z.split('␟'),
        f,
        f[0] != '␣␝␣'
      ).uniques().join('␟'),
      null
    )
  newColumnName: creator_tmp
  columnInsertIndex: 2
- op: core/column-addition
  engineConfig:
    facets: []
    mode: row-based
  baseColumnName: creator_tmp
  expression: |
    grel:
    forNonBlank(
      forEach(
        value.split('␟'),
        v,
        v.split('␝')[0]
      ).join('␟'),
      x,
      x,
      null
    )
  newColumnName: creator_id_mv
  columnInsertIndex: 2
- op: core/column-addition
  engineConfig:
    facets: []
    mode: row-based
  baseColumnName: creator_tmp
  expression: |
    grel:
    forNonBlank(
      forEach(
        value.split('␟'),
        v,
        v.split('␝')[1]
      ).join('␟'),
      x,
      if(
        isNonBlank(x.replace(/␟|␣/,'')),
        x,
        null
      ),
      null
    )
  newColumnName: creator_role_mv
  columnInsertIndex: 2
- op: core/column-removal
  columnName: creator_tmp
- op: core/column-addition
  engineConfig:
    facets: []
    mode: row-based
  baseColumnName: creator_id_mv
  expression: |
    grel:
    forNonBlank(
      forEach(
        value.split('␟'),
        id,
        forNonBlank(
          if(
            id.startsWith('KS'),
            id.cross('ks','id')[0].cells['display'].value,
            if(
              id.startsWith('PE'),
              id.cross('pe','id')[0].cells['display'].value,
              if(
                id.startsWith('TH'),
                id.cross('th','id')[0].cells['display'].value,
                id
              )
            )
          ),
          x,
          x,
          id
        )
      ).join('␟'),
      x,
      x,
      null
    )
  newColumnName: creator_display_mv
  columnInsertIndex: 2
